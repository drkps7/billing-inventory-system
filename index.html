/* APP SHELL */
// ── URL Routing (hash-based — works on any static host) ──────────
const ROUTES={
  'dashboard':'#/','new-bill':'#/billing/new','bills':'#/bills',
  'quotations':'#/quotations','credit-notes':'#/credit-notes',
  'parties':'#/parties','outstanding':'#/outstanding',
  'products':'#/products','barcodes':'#/barcodes',
  'stock-in':'#/stock-in','reports':'#/reports',
  'users':'#/users','settings':'#/settings',
};
// Map hash paths back to screen names
const HASH_TO_SCREEN={
  '/':'dashboard','/billing/new':'new-bill','/bills':'bills',
  '/quotations':'quotations','/credit-notes':'credit-notes',
  '/parties':'parties','/outstanding':'outstanding',
  '/products':'products','/barcodes':'barcodes',
  '/stock-in':'stock-in','/reports':'reports',
  '/users':'users','/settings':'settings',
};
const getScreenFromHash=()=>{
  const h=window.location.hash.slice(1)||'/'; // remove leading #
  return HASH_TO_SCREEN[h]||HASH_TO_SCREEN['/'+h.split('/').slice(1).join('/')]||'dashboard';
};

function AppShell({user,ud,sid}){
  const[screen,setScreenRaw]=useState(()=>getScreenFromHash());
  const[prevScreen,setPrevScreen]=useState(null);
  const[showSess,setShowSess]=useState(false);
  const[darkMode,setDarkMode]=useState(()=>localStorage.getItem('dm')==='1');
  const[prefill,setPrefill]=useState(null);
  const[nbKey,setNbKey]=useState(0); // increments to force NewBillScreen remount
  const[sidebarOpen,setSidebarOpen]=useState(()=>{
    if(window.innerWidth<768)return false; // mobile: start with sidebar closed
    return localStorage.getItem('sb')!=='0';
  });
  const[isMobile,setIsMobile]=useState(()=>window.innerWidth<768);
  const touchRef=React.useRef(null);
  const[toast,setToast]=useState(null); // {msg, type: 'error'|'success'|'warn'}
  const showToast=useCallback((msg,type='error')=>{setToast({msg,type});setTimeout(()=>setToast(null),4500);},[]);
  const isOwner=ud.role==='owner';

  const setScreen=useCallback(s=>{setPrevScreen(screen);setScreenRaw(s);if(s!=='new-bill')setPrefill(null);},[screen]);
  const goBack=()=>{if(prevScreen){setScreenRaw(prevScreen);setPrevScreen(null);}};
  useEffect(()=>localStorage.setItem('dm',darkMode?'1':'0'),[darkMode]);
  useEffect(()=>localStorage.setItem('sb',sidebarOpen?'1':'0'),[sidebarOpen]);

  // ── Mobile: track viewport size ────────────────────────────────
  useEffect(()=>{
    const onResize=()=>setIsMobile(window.innerWidth<768);
    window.addEventListener('resize',onResize);
    return()=>window.removeEventListener('resize',onResize);
  },[]);

  // ── Swipe gestures ────────────────────────────────────────────
  const onTouchStart=React.useCallback(e=>{
    const t=e.touches[0];
    touchRef.current={x:t.clientX,y:t.clientY};
  },[]);
  const onTouchEnd=React.useCallback(e=>{
    if(!touchRef.current)return;
    const t=e.changedTouches[0];
    const dx=t.clientX-touchRef.current.x;
    const dy=Math.abs(t.clientY-touchRef.current.y);
    touchRef.current=null;
    if(dy>Math.abs(dx)*0.8||Math.abs(dx)<40)return; // vertical or tiny
    if(window.innerWidth>=768)return; // desktop: skip
    if(dx>0)setSidebarOpen(true);   // swipe right → open
    if(dx<0)setSidebarOpen(false);  // swipe left → close
  },[]);

  // ── URL routing — sync screen ↔ hash ────────────────────────
  useEffect(()=>{
    const hash=ROUTES[screen]||'#/';
    if(window.location.hash!==hash)
      window.location.hash=hash;
  },[screen]);
  useEffect(()=>{
    const onHash=()=>setScreenRaw(getScreenFromHash());
    window.addEventListener('hashchange',onHash);
    return()=>window.removeEventListener('hashchange',onHash);
  },[]);
  useEffect(()=>{
    const handler=e=>setToast(e.detail);
    window.addEventListener('app-toast',handler);
    return()=>window.removeEventListener('app-toast',handler);
  },[]);
  const logout=useCallback(async()=>{await endSession(sid);auth.signOut();},[sid]);
  const{warn,reset}=useIdleTimer(!isOwner,logout);
  useEffect(()=>{const t=setInterval(()=>heartbeat(sid),5*60*1000);return()=>clearInterval(t);},[sid]);
  useEffect(()=>{if(!sid)return;return db.collection('sessions').doc(sid).onSnapshot(s=>{if(s.exists&&s.data().isActive===false)auth.signOut();});},[sid]);

  const nav=NAV[ud.role]||NAV.warehouse;
  const av=ini(ud.name||ud.email);
  const renderScreen=()=>{
    if(screen==='dashboard')return<DashboardScreen setScreen={setScreen}/>;
    if(screen==='settings')return<SettingsScreen darkMode={darkMode} setDarkMode={setDarkMode}/>;
    if(screen==='users')return<UsersScreen myUid={user.uid}/>;
    if(screen==='products'||screen==='stock')return<ProductsScreen role={ud.role} onNavigate={setScreen}/>;
    if(screen==='parties')return<PartiesScreen role={ud.role}/>;
    if(screen==='new-bill')return<NewBillScreen role={ud.role} prefill={prefill} onBack={prevScreen?goBack:null}/>;
    if(screen==='bills')return<BillsListScreen filterType="invoice" role={ud.role} setScreen={setScreen} setPrefill={setPrefill}/>;
    if(screen==='quotations')return<BillsListScreen filterType="quotation" role={ud.role} setScreen={setScreen} setPrefill={setPrefill}/>;
    if(screen==='outstanding')return<OutstandingScreen/>;
    if(screen==='credit-notes')return<CreditNotesScreen role={ud.role}/>;
    if(screen==='reports')return<ReportsScreen role={ud.role}/>;
    if(screen==='barcodes')return<BarcodesScreen/>;
    return<PlaceholderScreen id={screen}/>;
  };

  return(<div className={`shell${darkMode?' dark':''}`} onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>
    {isMobile&&sidebarOpen&&<div onClick={()=>setSidebarOpen(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:499,animation:"fadeIn .15s"}}/>}
    <nav className={`sidebar${!isMobile&&!sidebarOpen?" sb-collapsed":""}${isMobile&&sidebarOpen?" mob-open":""}`}>
      <div className="sb-top" style={{position:'relative',overflow:'visible'}}>
        {sidebarOpen&&<LogoMark size={28} color="#FFFFFF"/>}
        {sidebarOpen&&<div className="sb-top-txt"><h2>{COMPANY.name}</h2></div>}
        <button onClick={()=>setSidebarOpen(o=>!o)}
          title={sidebarOpen?'Collapse sidebar':'Expand sidebar'}
          style={{position:'absolute',right:-14,top:'50%',transform:'translateY(-50%)',
            width:28,height:28,borderRadius:'50%',
            background:'var(--orange)',border:'2px solid var(--card)',
            color:'#fff',cursor:'pointer',fontSize:12,fontWeight:900,
            display:'flex',alignItems:'center',justifyContent:'center',
            zIndex:200,boxShadow:'var(--shadow2)',lineHeight:1,flexShrink:0}}>
          {sidebarOpen?'‹':'›'}
        </button>
      </div>
      {nav.map(sec=>(<div className="sb-section" key={sec.section}>
        {sidebarOpen&&<div className="sb-sec-label">{sec.section}</div>}
        {sec.items.map(id=>(<div key={id} className={`sb-item${screen===id?' active':''}`} onClick={()=>{if(id==='new-bill'){setNbKey(k=>k+1);setPrefill(null);}setScreen(id);}}>
          <span className="sb-icon" title={!sidebarOpen?SCREEN[id]?.label:""}>{SCREEN[id]?.icon}</span>{sidebarOpen&&SCREEN[id]?.label}
        </div>))}
      </div>))}
      <div className="sb-foot">
        <div className="user-tile" onClick={logout} title="Click to logout">
          <div className="u-av">{av}</div>
          <div style={{flex:1,minWidth:0}}><div className="u-name">{ud.name||ud.email}</div><div className="u-role">{ud.role} · logout →</div></div>
        </div>
      </div>
    </nav>
    <div className="main">
      <header className="topbar">
        <div className="tb-left">
        {isMobile&&<button className="mob-menu-btn" onClick={()=>setSidebarOpen(s=>!s)}>☰</button>}
          {prevScreen&&<button className="tb-btn" onClick={goBack}>← Back</button>}
          <span className="tb-title">{SCREEN[screen]?.label||screen}</span>
        </div>
        <div className="tb-right">
          <span className={`role-pill ${ud.role}`}>{ud.role}</span>
          {isOwner&&<button className="tb-btn" onClick={()=>setShowSess(true)}>◉ Sessions</button>}
          <button className="tb-btn danger" onClick={logout}>⎋ Logout</button>
        </div>
      </header>
      <main className="content"><div key={screen} className="screen-enter">{renderScreen()}</div></main>
    </div>
    {showSess&&<SessionsModal mySid={sid} onClose={()=>setShowSess(false)}/>}
    {toast&&(
      <div style={{position:'fixed',top:20,right:20,zIndex:1000,maxWidth:340,
        background:toast.type==='success'?'#F0FDF4':toast.type==='warn'?'#FFFBEB':'#FEF2F2',
        border:`1.5px solid ${toast.type==='success'?'#BBF7D0':toast.type==='warn'?'#FDE68A':'#FCA5A5'}`,
        borderRadius:12,padding:'14px 18px',boxShadow:'var(--shadow2)',
        display:'flex',alignItems:'flex-start',gap:10,animation:'slideIn .2s ease-out both'}}>
        <span style={{fontSize:18,flexShrink:0}}>{toast.type==='success'?'✓':toast.type==='warn'?'⚠':'✕'}</span>
        <div style={{flex:1}}>
          <div style={{fontSize:13,fontWeight:700,color:toast.type==='success'?'#166534':toast.type==='warn'?'#92400E':'#991B1B',lineHeight:1.5}}>{toast.msg}</div>
        </div>
        <button onClick={()=>setToast(null)} style={{background:'none',border:'none',fontSize:16,cursor:'pointer',color:'var(--txt3)',padding:0,flexShrink:0}}>✕</button>
      </div>
    )}
    {warn&&(<div className="idle-toast">
      <strong>⏱ Session expiring in 2 min</strong>
      <p>Auto-logout due to inactivity.</p>
      <div className="idle-btns"><button className="i-stay" onClick={reset}>Stay</button><button className="i-leave" onClick={logout}>Logout</button></div>
    </div>)}
  </div>);
}

function App(){

function StockInScreen({db, user}) {
  const today = new Date().toISOString().slice(0,10);
  const [tab, setTab]         = useState('list');
  const [entries, setEntries] = useState([]);
  const [products, setProducts]= useState([]);
  const [parties, setParties] = useState([]);
  const [loading, setLoading] = useState(false);
  const [expanded, setExpanded]= useState(null);
  const [toast, setToast]     = useState('');
  const showToast = (msg) => { setToast(msg); setTimeout(()=>setToast(''), 3000); };
  const emptyItem = () => ({_id:Date.now()+Math.random(), productId:'', productName:'', search:'', qty:'', unitCost:'', totalCost:0, showDrop:false});
  const [form, setForm]       = useState({date:today, challan:'', supplier:'', supplierId:'', notes:''});
  const [items, setItems]     = useState([emptyItem()]);
  const [saving, setSaving]   = useState(false);
  const [lkSearch, setLkSearch]   = useState('');
  const [lkProductId, setLkProductId] = useState('');
  const [lkName, setLkName]       = useState('');
  const [lkHistory, setLkHistory] = useState([]);
  const [lkLoading, setLkLoading] = useState(false);
  const [lkShowDrop, setLkShowDrop] = useState(false);

  useEffect(()=>{ loadProducts(); loadParties(); }, []);
  useEffect(()=>{ if(tab==='list') loadEntries(); }, [tab]);

  const loadEntries = async () => {
    setLoading(true);
    try {
      const snap = await db.collection('purchases').orderBy('date','desc').limit(300).get();
      setEntries(snap.docs.map(d=>({...d.data(),id:d.id})));
    } catch(e){ console.error(e); }
    setLoading(false);
  };
  const loadProducts = async () => {
    try {
      const snap = await db.collection('products').where('isActive','==',true).get();
      setProducts(snap.docs.map(d=>({...d.data(),id:d.id})));
    } catch(e){ console.error(e); }
  };
  const loadParties = async () => {
    try {
      const snap = await db.collection('parties').where('isActive','==',true).get();
      setParties(snap.docs.map(d=>({...d.data(),id:d.id})));
    } catch(e){ console.error(e); }
  };
  const updItem = (idx, field, val) => {
    setItems(prev=>prev.map((it,i)=>{
      if(i!==idx) return it;
      const u={...it,[field]:val};
      if(field==='qty'||field==='unitCost'){
        const q=parseFloat(field==='qty'?val:it.qty)||0;
        const c=parseFloat(field==='unitCost'?val:it.unitCost)||0;
        u.totalCost=r2(q*c);
      }
      return u;
    }));
  };
  const selProduct = (idx, prod) => {
    setItems(prev=>prev.map((it,i)=>i!==idx?it:{
      ...it, productId:prod.id,
      productName:prod.fullSkuName||prod.id,
      search:prod.fullSkuName||prod.id, showDrop:false
    }));
  };
  const filteredProds = (search) => !search ? [] :
    products.filter(p=>(p.fullSkuName||p.id).toLowerCase().includes(search.toLowerCase())).slice(0,8);
  const grandTotal = r2(items.reduce((s,it)=>s+(it.totalCost||0),0));

  const savePurchase = async () => {
    const valid = items.filter(it=>it.productId&&parseFloat(it.qty)>0);
    if(!valid.length){ showToast('Add at least one product with quantity'); return; }
    setSaving(true);
    try {
      const pItems = valid.map(it=>({
        productId:it.productId, productName:it.productName,
        qty:parseFloat(it.qty), unitCost:parseFloat(it.unitCost)||0,
        totalCost:r2((parseFloat(it.qty)||0)*(parseFloat(it.unitCost)||0))
      }));
      const doc = {
        date:form.date, challanNumber:form.challan.trim(),
        supplierName:form.supplier.trim(), supplierId:form.supplierId||'',
        notes:form.notes.trim(), items:pItems,
        totalItems:pItems.length,
        totalQty:r2(pItems.reduce((s,it)=>s+it.qty,0)),
        totalValue:r2(pItems.reduce((s,it)=>s+it.totalCost,0)),
        status:'saved', createdBy:user.uid, createdAt:new Date()
      };
      const batch = db.batch();
      const ref = db.collection('purchases').doc();
      batch.set(ref, doc);
      pItems.forEach(it=>batch.update(db.collection('products').doc(it.productId),
        {currentStock:firebase.firestore.FieldValue.increment(it.qty)}));
      await batch.commit();
      setForm({date:today,challan:'',supplier:'',supplierId:'',notes:''});
      setItems([emptyItem()]);
      showToast('\u2713 Stock entry saved \u2014 '+pItems.length+' product(s) updated');
      setTimeout(()=>setTab('list'), 1800);
    } catch(e){ console.error(e); showToast('Error: '+e.message); }
    setSaving(false);
  };

  const delEntry = async (entry) => {
    if(!confirm('Delete this stock entry?\nStock will be reversed for '+entry.totalItems+' product(s).')) return;
    try {
      const batch = db.batch();
      batch.delete(db.collection('purchases').doc(entry.id));
      (entry.items||[]).forEach(it=>batch.update(db.collection('products').doc(it.productId),
        {currentStock:firebase.firestore.FieldValue.increment(-it.qty)}));
      await batch.commit();
      setEntries(prev=>prev.filter(e=>e.id!==entry.id));
      showToast('Entry deleted \u2014 stock reversed');
    } catch(e){ console.error(e); }
  };

  const loadLookup = async (productId, name) => {
    setLkProductId(productId); setLkName(name); setLkLoading(true); setLkHistory([]);
    try {
      const snap = await db.collection('purchases').orderBy('date','desc').get();
      const hist = [];
      snap.docs.forEach(d=>{
        const e={...d.data(),id:d.id};
        const it=(e.items||[]).find(x=>x.productId===productId);
        if(it) hist.push({date:e.date, challan:e.challanNumber, supplier:e.supplierName,
          qty:it.qty, unitCost:it.unitCost, totalCost:it.totalCost, entryId:d.id});
      });
      setLkHistory(hist);
    } catch(e){ console.error(e); }
    setLkLoading(false);
  };

  const lkFiltered = !lkSearch ? [] :
    products.filter(p=>(p.fullSkuName||p.id).toLowerCase().includes(lkSearch.toLowerCase())).slice(0,8);
  const lkTotalQty   = r2(lkHistory.reduce((s,h)=>s+h.qty,0));
  const lkTotalValue = r2(lkHistory.reduce((s,h)=>s+(h.totalCost||0),0));
  const lkAvgCost    = lkHistory.length&&lkTotalQty ? r2(lkTotalValue/lkTotalQty) : 0;
  const lkLastPrice  = lkHistory.length ? lkHistory[0].unitCost : 0;

  return (
    <div style={{padding:'0 0 40px'}}>
      {toast&&<div style={{position:'fixed',top:16,right:16,zIndex:9999,background:'#111',color:'#fff',
        padding:'10px 18px',borderRadius:10,fontSize:13,fontWeight:600,boxShadow:'0 4px 20px rgba(0,0,0,.25)'}}>
        {toast}</div>}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          {onBack&&<button onClick={onBack}
            style={{padding:'7px 14px',background:'var(--bg)',border:'1px solid var(--card-b)',
              borderRadius:9,fontSize:12.5,fontWeight:600,color:'var(--txt2)',cursor:'pointer',
              display:'flex',alignItems:'center',gap:6,transition:'all .15s'}}>
            ← Products
          </button>}
          <div>
            <h2 style={{fontWeight:800,fontSize:20,margin:0}}>Bulk Stock Entry</h2>
            <div style={{fontSize:12,color:'var(--txt3)',marginTop:2}}>Add stock for multiple products in one entry</div>
          </div>
        </div>
        <button onClick={()=>setTab('new')} style={{background:'var(--orange)',color:'#fff',
          border:'none',borderRadius:9,padding:'9px 18px',fontWeight:700,fontSize:13,cursor:'pointer'}}>
          + New Entry
        </button>
      </div>
      <div style={{display:'flex',gap:4,marginBottom:20,background:'var(--bg)',
        border:'1px solid var(--card-b)',borderRadius:10,padding:4,width:'fit-content'}}>
        {[['list','All Entries'],['new','+ New Entry'],['lookup','Product History']].map(([t,l])=>(
          <button key={t} onClick={()=>setTab(t)}
            style={{padding:'7px 16px',borderRadius:7,border:'none',cursor:'pointer',
              fontWeight:tab===t?700:500,fontSize:12.5,
              background:tab===t?'var(--white)':'transparent',
              color:tab===t?'var(--orange)':'var(--txt2)',
              boxShadow:tab===t?'0 1px 4px rgba(0,0,0,.08)':'none'}}>{l}</button>
        ))}
      </div>

      {tab==='list'&&(
        <div style={{background:'var(--white)',border:'1px solid var(--card-b)',borderRadius:14,overflow:'hidden'}}>
          {loading?<div style={{padding:40,textAlign:'center',color:'var(--txt3)'}}>Loading...</div>
          :entries.length===0?<div style={{padding:40,textAlign:'center'}}>
              <div style={{fontSize:32,marginBottom:12}}>📥</div>
              <div style={{fontWeight:700,marginBottom:6}}>No stock entries yet</div>
              <div style={{color:'var(--txt3)',fontSize:13}}>Click + New Entry to record your first stock intake</div>
            </div>:(
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
              <thead>
                <tr style={{borderBottom:'2px solid var(--card-b)',background:'var(--bg)'}}>
                  {['Date','Challan #','Supplier','Items','Total Qty','Total Value',''].map((h,i)=>(
                    <th key={i} style={{padding:'10px 14px',textAlign:i>=4?'right':'left',
                      fontSize:11,fontWeight:700,color:'var(--txt3)',textTransform:'uppercase',letterSpacing:'.5px'}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {entries.map(e=>(
                  <React.Fragment key={e.id}>
                    <tr style={{borderBottom:'1px solid var(--card-b)',cursor:'pointer'}}
                      onClick={()=>setExpanded(expanded===e.id?null:e.id)}>
                      <td style={{padding:'10px 14px',fontWeight:600}}>{e.date}</td>
                      <td style={{padding:'10px 14px',fontFamily:'monospace',fontSize:12,color:'var(--txt2)'}}>
                        {e.challanNumber||<span style={{color:'var(--txt3)',fontStyle:'italic'}}>--</span>}
                      </td>
                      <td style={{padding:'10px 14px'}}>{e.supplierName||<span style={{color:'var(--txt3)',fontStyle:'italic'}}>--</span>}</td>
                      <td style={{padding:'10px 14px',color:'var(--txt2)'}}>{e.totalItems} {e.totalItems===1?'product':'products'}</td>
                      <td style={{padding:'10px 14px',textAlign:'right',fontWeight:700,color:'var(--green)'}}>+{e.totalQty}</td>
                      <td style={{padding:'10px 14px',textAlign:'right',fontWeight:700,color:'var(--orange)'}}>
                        {e.totalValue>0?inr(e.totalValue):<span style={{color:'var(--txt3)'}}>--</span>}
                      </td>
                      <td style={{padding:'10px 14px',textAlign:'right'}}>
                        <div style={{display:'flex',gap:6,justifyContent:'flex-end',alignItems:'center'}}>
                          <span style={{fontSize:11,color:'var(--txt3)'}}>{expanded===e.id?'▲':'▼'}</span>
                          {user.role==='owner'&&<button onClick={ev=>{ev.stopPropagation();delEntry(e);}}
                            style={{padding:'3px 9px',background:'#FEF2F2',border:'1px solid #FCA5A5',
                              borderRadius:6,fontSize:11,fontWeight:700,color:'#991B1B',cursor:'pointer'}}>
                            Del
                          </button>}
                        </div>
                      </td>
                    </tr>
                    {expanded===e.id&&(
                      <tr>
                        <td colSpan={7} style={{padding:'0 14px 16px',background:'var(--bg)'}}>
                          {e.notes&&<div style={{padding:'8px 12px',background:'var(--white)',
                            border:'1px solid var(--card-b)',borderRadius:8,fontSize:12,
                            color:'var(--txt2)',marginBottom:10}}>
                            Notes: {e.notes}
                          </div>}
                          <table style={{width:'100%',borderCollapse:'collapse',fontSize:12,background:'var(--white)',borderRadius:8,overflow:'hidden',border:'1px solid var(--card-b)'}}>
                            <thead><tr style={{background:'var(--bg)',borderBottom:'1px solid var(--card-b)'}}>
                              <th style={{padding:'7px 12px',textAlign:'left',fontWeight:700,color:'var(--txt3)',fontSize:11}}>Product</th>
                              <th style={{padding:'7px 12px',textAlign:'center',fontWeight:700,color:'var(--txt3)',fontSize:11}}>Qty In</th>
                              <th style={{padding:'7px 12px',textAlign:'right',fontWeight:700,color:'var(--txt3)',fontSize:11}}>Cost/Unit</th>
                              <th style={{padding:'7px 12px',textAlign:'right',fontWeight:700,color:'var(--txt3)',fontSize:11}}>Total Cost</th>
                            </tr></thead>
                            <tbody>
                              {(e.items||[]).map((it,ii)=>(
                                <tr key={ii} style={{borderBottom:'1px solid var(--card-b)'}}>
                                  <td style={{padding:'7px 12px',fontWeight:500}}>{it.productName}</td>
                                  <td style={{padding:'7px 12px',textAlign:'center',fontWeight:800,color:'#16A34A',fontSize:14}}>+{it.qty}</td>
                                  <td style={{padding:'7px 12px',textAlign:'right'}}>
                                    {it.unitCost?inr(it.unitCost):<span style={{color:'var(--txt3)',fontStyle:'italic',fontSize:11}}>not recorded</span>}
                                  </td>
                                  <td style={{padding:'7px 12px',textAlign:'right',fontWeight:600}}>
                                    {it.totalCost?inr(it.totalCost):'--'}
                                  </td>
                                </tr>
                              ))}
                            </tbody>
                          </table>
                        </td>
                      </tr>
                    )}
                  </React.Fragment>
                ))}
              </tbody>
            </table>
          )}
        </div>
      )}

      {tab==='new'&&(
        <div style={{maxWidth:820}}>
          <div style={{background:'var(--white)',border:'1px solid var(--card-b)',borderRadius:14,padding:20,marginBottom:16}}>
            <div style={{fontWeight:700,fontSize:14,marginBottom:16,color:'var(--txt)'}}>Entry Details</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,marginBottom:12}}>
              <div>
                <div style={{fontSize:11,fontWeight:700,color:'var(--txt3)',marginBottom:5,textTransform:'uppercase'}}>Date *</div>
                <input type="date" value={form.date}
                  onChange={e=>setForm(f=>({...f,date:e.target.value}))}
                  style={{width:'100%',padding:'9px 10px',border:'1px solid var(--card-b)',borderRadius:8,fontSize:13,background:'var(--bg)'}}/>
              </div>
              <div>
                <div style={{fontSize:11,fontWeight:700,color:'var(--txt3)',marginBottom:5,textTransform:'uppercase'}}>Challan / Invoice #</div>
                <input placeholder="Optional" value={form.challan}
                  onChange={e=>setForm(f=>({...f,challan:e.target.value}))}
                  style={{width:'100%',padding:'9px 10px',border:'1px solid var(--card-b)',borderRadius:8,fontSize:13,background:'var(--bg)'}}/>
              </div>
              <div style={{position:'relative'}}>
                <div style={{fontSize:11,fontWeight:700,color:'var(--txt3)',marginBottom:5,textTransform:'uppercase'}}>Supplier</div>
                <input placeholder="Optional — type or select from parties"
                  value={form.supplier}
                  onChange={e=>setForm(f=>({...f,supplier:e.target.value,supplierId:''}))}
                  style={{width:'100%',padding:'9px 10px',border:'1px solid var(--card-b)',borderRadius:8,fontSize:13,background:'var(--bg)'}}/>
                {form.supplier&&!form.supplierId&&parties.filter(p=>p.name.toLowerCase().includes(form.supplier.toLowerCase())).length>0&&(
                  <div style={{position:'absolute',top:'100%',left:0,right:0,background:'var(--white)',
                    border:'1px solid var(--card-b)',borderRadius:8,zIndex:100,
                    boxShadow:'0 4px 16px rgba(0,0,0,.1)',maxHeight:160,overflowY:'auto'}}>
                    {parties.filter(p=>p.name.toLowerCase().includes(form.supplier.toLowerCase())).slice(0,5).map(p=>(
                      <div key={p.id} onClick={()=>setForm(f=>({...f,supplier:p.name,supplierId:p.id}))}
                        style={{padding:'8px 12px',cursor:'pointer',fontSize:12,borderBottom:'1px solid var(--card-b)'}}
                        onMouseEnter={e=>e.currentTarget.style.background='var(--bg)'}
                        onMouseLeave={e=>e.currentTarget.style.background='var(--white)'}>
                        {p.name}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
            <div>
              <div style={{fontSize:11,fontWeight:700,color:'var(--txt3)',marginBottom:5,textTransform:'uppercase'}}>Notes</div>
              <input placeholder="Optional — any remarks about this delivery"
                value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))}
                style={{width:'100%',padding:'9px 10px',border:'1px solid var(--card-b)',borderRadius:8,fontSize:13,background:'var(--bg)'}}/>
            </div>
          </div>
          <div style={{background:'var(--white)',border:'1px solid var(--card-b)',borderRadius:14,padding:20,marginBottom:16}}>
            <div style={{fontWeight:700,fontSize:14,marginBottom:16,color:'var(--txt)'}}>Products Received *</div>
            {items.map((it,idx)=>(
              <div key={it._id} style={{display:'grid',gridTemplateColumns:'1fr 90px 120px 120px 34px',
                gap:8,alignItems:'end',marginBottom:12,paddingBottom:12,
                borderBottom:'1px solid var(--card-b)'}}>
                <div style={{position:'relative'}}>
                  {idx===0&&<div style={{fontSize:10.5,fontWeight:700,color:'var(--txt3)',marginBottom:5,textTransform:'uppercase'}}>Product *</div>}
                  <input placeholder="Search by name or code..."
                    value={it.search}
                    onChange={e=>{ updItem(idx,'search',e.target.value);
                      setItems(prev=>prev.map((x,i)=>i===idx?{...x,showDrop:true,productId:'',productName:''}:x)); }}
                    onFocus={()=>setItems(prev=>prev.map((x,i)=>i===idx?{...x,showDrop:true}:x))}
                    onBlur={()=>setTimeout(()=>setItems(prev=>prev.map((x,i)=>i===idx?{...x,showDrop:false}:x)),200)}
                    style={{width:'100%',padding:'8px 10px',border:'1px solid var(--card-b)',
                      borderRadius:8,fontSize:12,background:'var(--bg)',
                      borderColor:it.productId?'var(--green)':'var(--card-b)'}}/>
                  {it.showDrop&&filteredProds(it.search).length>0&&(
                    <div style={{position:'absolute',top:'100%',left:0,right:0,background:'var(--white)',
                      border:'1px solid var(--card-b)',borderRadius:8,zIndex:200,
                      boxShadow:'0 4px 16px rgba(0,0,0,.12)',maxHeight:220,overflowY:'auto'}}>
                      {filteredProds(it.search).map(p=>(
                        <div key={p.id} onMouseDown={()=>selProduct(idx,p)}
                          style={{padding:'8px 12px',cursor:'pointer',fontSize:12,borderBottom:'1px solid var(--card-b)'}}>
                          <span style={{fontFamily:'monospace',fontSize:10,color:'var(--orange)',marginRight:8}}>{p.id}</span>
                          {p.fullSkuName||p.id}
                          <span style={{marginLeft:8,fontSize:10.5,color:'var(--txt3)'}}>Stock: {p.currentStock||0}</span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
                <div>
                  {idx===0&&<div style={{fontSize:10.5,fontWeight:700,color:'var(--txt3)',marginBottom:5,textTransform:'uppercase'}}>Qty *</div>}
                  <input type="number" min="0" placeholder="0" value={it.qty}
                    onChange={e=>updItem(idx,'qty',e.target.value)}
                    style={{width:'100%',padding:'8px 8px',border:'1px solid var(--card-b)',
                      borderRadius:8,fontSize:14,fontWeight:700,textAlign:'center',background:'var(--bg)'}}/>
                </div>
                <div>
                  {idx===0&&<div style={{fontSize:10.5,fontWeight:700,color:'var(--txt3)',marginBottom:5,textTransform:'uppercase'}}>Cost / Unit ₹</div>}
                  <input type="number" min="0" placeholder="Optional" value={it.unitCost}
                    onChange={e=>updItem(idx,'unitCost',e.target.value)}
                    style={{width:'100%',padding:'8px 8px',border:'1px solid var(--card-b)',
                      borderRadius:8,fontSize:13,textAlign:'right',background:'var(--bg)'}}/>
                </div>
                <div>
                  {idx===0&&<div style={{fontSize:10.5,fontWeight:700,color:'var(--txt3)',marginBottom:5,textTransform:'uppercase'}}>Line Total</div>}
                  <div style={{padding:'8px',border:'1px solid var(--card-b)',borderRadius:8,
                    fontSize:13,fontWeight:700,textAlign:'right',background:'var(--bg)',
                    color:it.totalCost>0?'var(--txt)':'var(--txt3)'}}>
                    {it.totalCost>0?inr(it.totalCost):'--'}
                  </div>
                </div>
                {items.length>1?<button onClick={()=>setItems(prev=>prev.filter((_,i)=>i!==idx))}
                  style={{background:'transparent',border:'none',fontSize:18,cursor:'pointer',
                    color:'var(--txt3)',padding:'4px 0'}}>✕</button>:<div/>}
              </div>
            ))}
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:8}}>
              <button onClick={()=>setItems(prev=>[...prev,emptyItem()])}
                style={{padding:'8px 18px',background:'var(--bg)',border:'1px dashed var(--card-b)',
                  borderRadius:8,fontSize:12,fontWeight:600,cursor:'pointer',color:'var(--txt2)'}}>
                + Add Another Product
              </button>
              {grandTotal>0&&(
                <div style={{textAlign:'right'}}>
                  <div style={{fontSize:11,color:'var(--txt3)',marginBottom:2}}>TOTAL VALUE</div>
                  <div style={{fontSize:22,fontWeight:900,color:'var(--orange)'}}>{inr(grandTotal)}</div>
                </div>
              )}
            </div>
          </div>
          <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
            <button onClick={()=>{setTab('list');setItems([emptyItem()]);setForm({date:today,challan:'',supplier:'',supplierId:'',notes:''}); }}
              style={{padding:'10px 22px',background:'var(--bg)',border:'1px solid var(--card-b)',
                borderRadius:9,fontSize:13,fontWeight:600,cursor:'pointer',color:'var(--txt2)'}}>
              Cancel
            </button>
            <button onClick={savePurchase} disabled={saving}
              style={{padding:'10px 28px',background:'var(--orange)',color:'#fff',border:'none',
                borderRadius:9,fontSize:13,fontWeight:700,cursor:'pointer',opacity:saving?.6:1}}>
              {saving?'Saving...':'Save & Update Stock'}
            </button>
          </div>
        </div>
      )}

      {tab==='lookup'&&(
        <div style={{maxWidth:820}}>
          <div style={{background:'var(--white)',border:'1px solid var(--card-b)',borderRadius:14,padding:20,marginBottom:16}}>
            <div style={{fontWeight:700,fontSize:14,marginBottom:12}}>Product History Lookup</div>
            <div style={{position:'relative'}}>
              <input placeholder="Type product name or fixed code to see full intake history..."
                value={lkSearch}
                onChange={e=>{ setLkSearch(e.target.value); setLkShowDrop(true); setLkProductId(''); setLkHistory([]); }}
                onFocus={()=>setLkShowDrop(true)}
                onBlur={()=>setTimeout(()=>setLkShowDrop(false),200)}
                style={{width:'100%',padding:'11px 14px',border:'1px solid var(--card-b)',
                  borderRadius:10,fontSize:14,background:'var(--bg)'}}/>
              {lkShowDrop&&lkFiltered.length>0&&(
                <div style={{position:'absolute',top:'100%',left:0,right:0,background:'var(--white)',
                  border:'1px solid var(--card-b)',borderRadius:10,zIndex:200,
                  boxShadow:'0 4px 20px rgba(0,0,0,.12)',maxHeight:300,overflowY:'auto'}}>
                  {lkFiltered.map(p=>(
                    <div key={p.id} onMouseDown={()=>{setLkSearch(p.fullSkuName||p.id);loadLookup(p.id,p.fullSkuName||p.id);}}
                      style={{padding:'10px 16px',cursor:'pointer',fontSize:13,borderBottom:'1px solid var(--card-b)'}}>
                      <span style={{fontFamily:'monospace',fontSize:11,color:'var(--orange)',marginRight:10}}>{p.id}</span>
                      {p.fullSkuName||p.id}
                      <span style={{marginLeft:10,fontSize:11,color:'var(--txt3)'}}>Current stock: {p.currentStock||0}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
          {lkLoading&&<div style={{padding:40,textAlign:'center',color:'var(--txt3)'}}>Loading history...</div>}
          {lkProductId&&!lkLoading&&(
            <div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:16}}>
                {[
                  {l:'Total Entries',v:String(lkHistory.length),c:'var(--txt)'},
                  {l:'Total Qty Received',v:String(lkTotalQty),c:'#16A34A'},
                  {l:'Avg Cost / Unit',v:lkAvgCost?inr(lkAvgCost):'--',c:'var(--orange)'},
                  {l:'Last Purchase Price',v:lkLastPrice?inr(lkLastPrice):'--',c:'var(--blue)'},
                ].map((s,i)=>(
                  <div key={i} style={{background:'var(--white)',border:'1px solid var(--card-b)',
                    borderRadius:12,padding:'16px'}}>
                    <div style={{fontSize:10.5,fontWeight:700,color:'var(--txt3)',textTransform:'uppercase',
                      letterSpacing:'.5px',marginBottom:8}}>{s.l}</div>
                    <div style={{fontSize:24,fontWeight:900,color:s.c}}>{s.v}</div>
                  </div>
                ))}
              </div>
              {lkHistory.length===0?(
                <div style={{background:'var(--white)',border:'1px solid var(--card-b)',borderRadius:14,
                  padding:'40px',textAlign:'center',color:'var(--txt3)'}}>
                  No intake records found for this product.
                </div>
              ):(
                <div style={{background:'var(--white)',border:'1px solid var(--card-b)',borderRadius:14,overflow:'hidden'}}>
                  <div style={{padding:'14px 20px',borderBottom:'1px solid var(--card-b)',fontWeight:700,fontSize:13}}>
                    Intake History \u2014 {lkName}
                  </div>
                  <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
                    <thead><tr style={{background:'var(--bg)',borderBottom:'2px solid var(--card-b)'}}>
                      {['Date','Challan #','Supplier','Qty Received','Cost / Unit','Total Cost'].map((h,i)=>(
                        <th key={i} style={{padding:'9px 14px',textAlign:i>=3?'right':'left',
                          fontSize:11,fontWeight:700,color:'var(--txt3)',textTransform:'uppercase'}}>{h}</th>
                      ))}
                    </tr></thead>
                    <tbody>
                      {lkHistory.map((h,i)=>(
                        <tr key={i} style={{borderBottom:'1px solid var(--card-b)'}}>
                          <td style={{padding:'10px 14px',fontWeight:600}}>{h.date}</td>
                          <td style={{padding:'10px 14px',fontFamily:'monospace',fontSize:12,color:'var(--txt2)'}}>
                            {h.challan||<span style={{color:'var(--txt3)',fontStyle:'italic'}}>--</span>}
                          </td>
                          <td style={{padding:'10px 14px'}}>{h.supplier||<span style={{color:'var(--txt3)',fontStyle:'italic'}}>--</span>}</td>
                          <td style={{padding:'10px 14px',textAlign:'right',fontWeight:900,color:'#16A34A',fontSize:15}}>+{h.qty}</td>
                          <td style={{padding:'10px 14px',textAlign:'right'}}>
                            {h.unitCost?<span style={{fontWeight:700}}>{inr(h.unitCost)}</span>

                          </td>
                          <td style={{padding:'10px 14px',textAlign:'right',fontWeight:700}}>
                            {h.totalCost?inr(h.totalCost):'--'}

                        </tr>
                      ))}
                    </tbody>
                    <tfoot>
                      <tr style={{background:'var(--bg)',borderTop:'2px solid var(--card-b)'}}>

                        <td style={{padding:'10px 14px',textAlign:'right',fontWeight:900,color:'#16A34A',fontSize:15}}>{lkTotalQty}</td>
                        <td style={{padding:'10px 14px',textAlign:'right',fontSize:12,color:'var(--txt2)'}}>avg {lkAvgCost?inr(lkAvgCost):'--'}</td>
                        <td style={{padding:'10px 14px',textAlign:'right',fontWeight:900,color:'var(--orange)'}}>{lkTotalValue?inr(lkTotalValue):'--'}</td>
                      </tr>
                    </tfoot>
                  </table>
                </div>
              )}
            </div>
          )}
          {!lkProductId&&!lkLoading&&<div style={{background:'var(--white)',border:'1px solid var(--card-b)',
            borderRadius:14,padding:60,textAlign:'center'}}>
            <div style={{fontSize:36,marginBottom:12}}>🔍</div>
            <div style={{fontWeight:700,marginBottom:6}}>Search a product above</div>
            <div style={{color:'var(--txt3)',fontSize:13}}>See the complete intake history — when it came, at what quantity, and at what cost</div>
          </div>}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
