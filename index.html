<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Prakash Electricals — Billing</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ══ DESIGN TOKENS ══════════════════════════════════════════════ */
:root{
  /* Sidebar — always dark, never touched by dark mode */
  --sb:#111111;--sb2:#1A1A1A;--sb3:#252525;--sb-b:#242424;
  --sb-sec:#3A3A3A;--sb-txt:#666666;--sb-txt-h:#999999;--sb-txt-a:#F5F5F5;
  /* Accent */
  --orange:#F97316;--orange2:#E86910;
  /* Semantic — light mode */
  --green:#16A34A;--red:#DC2626;--amber:#D97706;--blue:#1D4ED8;
  /* Content — light mode */
  --bg:#F5F5F5;--white:#FFFFFF;--card-b:#E8E8E8;
  --txt:#111111;--txt2:#555555;--txt3:#999999;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --shadow2:0 4px 24px rgba(0,0,0,.09);
  /* Legacy aliases — sidebar/auth reuse these */
  --navy:var(--sb);--navy2:var(--sb2);--navy3:var(--sb3);
  --border:var(--sb-b);--muted:var(--sb-txt);--dim:var(--sb-txt-h);
  --txt-side:var(--sb-txt-h);--txt-act:var(--sb-txt-a);
}
/* Dark mode — ONLY content tokens change. Sidebar stays #111 in both. */
.dark{
  --bg:#121212;--white:#1C1C1E;--card-b:#2A2A2A;
  --txt:#F5F5F5;--txt2:#888888;--txt3:#383838;
  --green:#22C55E;--red:#EF4444;--amber:#F59E0B;--blue:#60A5FA;
  --shadow:0 1px 4px rgba(0,0,0,.5),0 1px 2px rgba(0,0,0,.3);
  --shadow2:0 8px 32px rgba(0,0,0,.7);
}

/* ══ BASE ══════════════════════════════════════════════════════ */
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.5}
button{font-family:inherit;cursor:pointer}input,select,textarea{font-family:inherit}

/* ══ AUTH ══════════════════════════════════════════════════════ */
.loading-root{min-height:100vh;background:var(--sb);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
.loader-ring{width:40px;height:40px;border:2.5px solid rgba(249,115,22,.2);border-top-color:var(--orange);border-radius:50%;animation:spin .7s linear infinite}
.loading-root p{color:var(--sb-txt-h);font-size:13px;font-weight:500}
@keyframes spin{to{transform:rotate(360deg)}}
.auth-root{min-height:100vh;background:var(--sb);display:flex;align-items:center;justify-content:center;padding:24px}
.auth-card{background:var(--sb2);border:1px solid var(--sb-b);border-radius:20px;padding:44px 40px;width:100%;max-width:400px;box-shadow:0 40px 80px rgba(0,0,0,.5)}
.auth-logo{text-align:center;margin-bottom:36px}
.auth-logo h1{color:var(--sb-txt-a);font-size:20px;font-weight:700;margin-top:12px;letter-spacing:-.2px}
.auth-logo p{color:var(--sb-txt-h);font-size:12.5px;margin-top:5px;font-weight:400}
.a-label{display:block;font-size:10.5px;font-weight:700;color:var(--sb-txt-h);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px}
.a-input{width:100%;padding:11px 14px;background:var(--sb3);border:1.5px solid var(--sb-b);border-radius:10px;color:var(--sb-txt-a);font-size:14px;font-weight:400;outline:none;transition:border-color .18s;margin-bottom:16px}
.a-input:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(249,115,22,.15)}
.a-input::placeholder{color:var(--sb-sec)}
.a-btn{width:100%;padding:13px;background:var(--orange);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;transition:background .15s;box-shadow:0 4px 16px rgba(249,115,22,.3)}
.a-btn:hover:not(:disabled){background:var(--orange2)}
.a-btn:disabled{opacity:.5;cursor:not-allowed;box-shadow:none}
.a-err{background:rgba(220,38,38,.12);border:1px solid rgba(220,38,38,.3);color:#FCA5A5;padding:11px 14px;border-radius:8px;font-size:12.5px;font-weight:500;margin-bottom:16px}
.a-ok{background:rgba(22,163,74,.12);border:1px solid rgba(22,163,74,.3);color:#86EFAC;padding:11px 14px;border-radius:8px;font-size:12.5px;font-weight:500;margin-bottom:16px}
.auth-foot{text-align:center;margin-top:22px;color:var(--sb-txt);font-size:11.5px;font-weight:400}

/* ══ LAYOUT ════════════════════════════════════════════════════ */
.shell{display:flex;height:100vh;overflow:hidden}
.sb-collapsed{width:56px!important;min-width:56px!important}
.sb-collapsed .sb-foot{padding:8px 4px}
.sb-collapsed .sb-item{justify-content:center;padding:10px 0}
.sb-collapsed .sb-icon{margin:0;font-size:18px}
.sb-collapsed .sb-top{justify-content:center;padding:14px 0 18px}
.sb-collapsed .sb-sec-label{display:none}

/* ══ SIDEBAR — always dark ═════════════════════════════════════ */
.sidebar{width:224px;flex-shrink:0;background:var(--sb);border-right:1px solid var(--sb-b);display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;transition:width .2s}
.sidebar::-webkit-scrollbar{width:0}
.sb-top{padding:18px 16px 16px;border-bottom:1px solid var(--sb-b);flex-shrink:0;display:flex;align-items:center;gap:10px}
.sb-top-txt h2{color:var(--sb-txt-a);font-size:13px;font-weight:700;line-height:1.35;letter-spacing:-.1px}
.sb-top-txt p{color:var(--sb-txt-h);font-size:10.5px;font-weight:400;margin-top:2px}
.sb-section{padding:16px 0 4px}
.sb-sec-label{padding:0 14px 7px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--sb-sec)}
.sb-item{display:flex;align-items:center;gap:9px;padding:7px 14px;cursor:pointer;font-size:12.5px;font-weight:500;color:var(--sb-txt);border-left:2px solid transparent;transition:background .1s,color .1s;user-select:none}
.sb-item:hover{background:rgba(255,255,255,.05);color:var(--sb-txt-h);border-left-color:rgba(255,255,255,.1)}
.sb-item.active{background:rgba(249,115,22,.1);color:var(--orange);border-left-color:var(--orange);font-weight:600}
.sb-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.sb-foot{margin-top:auto;padding:12px;border-top:1px solid var(--sb-b);flex-shrink:0}
.user-tile{display:flex;align-items:center;gap:10px;padding:9px;border-radius:10px;cursor:pointer;transition:background .15s}
.user-tile:hover{background:rgba(255,255,255,.05)}
.u-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--orange2),var(--orange));display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;flex-shrink:0}
.u-name{color:var(--sb-txt-a);font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.u-role{color:var(--sb-txt-h);font-size:10px;font-weight:400;margin-top:1px;text-transform:capitalize}

/* ══ MAIN CONTENT ══════════════════════════════════════════════ */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:var(--white);border-bottom:1px solid var(--card-b);height:56px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tb-left{display:flex;align-items:center;gap:10px}
.tb-title{font-size:15px;font-weight:700;color:var(--txt);letter-spacing:-.2px}
.tb-right{display:flex;align-items:center;gap:8px}
.role-pill{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.role-pill.owner{background:#FFF4EC;color:#C2410C;border:1px solid #FED7AA}
.role-pill.billing{background:#EFF6FF;color:#1D4ED8;border:1px solid #BFDBFE}
.role-pill.warehouse{background:#F0FDF4;color:#166534;border:1px solid #BBF7D0}
.dark .role-pill.owner{background:rgba(249,115,22,.12);color:#FDBA74;border-color:rgba(249,115,22,.25)}
.dark .role-pill.billing{background:rgba(96,165,250,.12);color:#93C5FD;border-color:rgba(96,165,250,.25)}
.dark .role-pill.warehouse{background:rgba(34,197,94,.12);color:#86EFAC;border-color:rgba(34,197,94,.25)}
.tb-sess{display:flex;align-items:center;gap:5px;padding:5px 11px;background:var(--bg);border:1px solid var(--card-b);border-radius:20px;font-size:11.5px;font-weight:600;color:var(--txt2);cursor:pointer;transition:all .15s}
.tb-sess:hover{border-color:var(--orange);color:var(--txt)}
.tb-logout{display:flex;align-items:center;gap:5px;padding:5px 12px;border:1px solid #FCA5A5;border-radius:20px;font-size:11.5px;font-weight:600;color:var(--red);background:transparent;cursor:pointer;transition:all .15s}
.tb-logout:hover{background:var(--red);color:#fff;border-color:var(--red)}
.content{flex:1;overflow-y:auto;padding:24px}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-thumb{background:var(--card-b);border-radius:8px}

/* ══ CARDS & STATS ═════════════════════════════════════════════ */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:20px}
.s-card{background:var(--white);border:1px solid var(--card-b);border-radius:14px;padding:20px;box-shadow:var(--shadow)}
.sc-l{font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.08em}
.sc-v{font-size:30px;font-weight:800;color:var(--txt);margin-top:10px;letter-spacing:-.5px}
.sc-s{font-size:11px;color:var(--txt3);margin-top:4px;font-weight:400}
.phase-card{background:var(--white);border:1px solid var(--card-b);border-radius:14px;padding:22px;box-shadow:var(--shadow)}
.phase-card h3{font-size:13px;font-weight:700;color:var(--txt);margin-bottom:18px}
.ph-row{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--card-b)}
.ph-row:last-child{border-bottom:none}
.ph-dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.ph-dot.done{background:#DCFCE7;color:#166534}
.ph-dot.next{background:#FFF4EC;color:#C2410C;border:2px solid var(--orange)}
.ph-dot.pending{background:var(--card-b);color:var(--txt3)}
.ph-name{font-size:13px;font-weight:600;color:var(--txt)}
.ph-sub{font-size:10.5px;color:var(--txt3);font-weight:400;margin-top:1px}
.ph-stat{font-size:10px;font-weight:700;letter-spacing:.04em}
.ph-stat.done{color:var(--green)}.ph-stat.next{color:var(--orange)}.ph-stat.pending{color:var(--card-b)}
.dark .ph-dot.done{background:rgba(34,197,94,.15);color:#86EFAC}
.dark .ph-dot.next{background:rgba(249,115,22,.12);color:#FDBA74;border-color:var(--orange)}
.pm-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px}
.pm-stat{background:var(--white);border:1px solid var(--card-b);border-radius:12px;padding:14px 16px;box-shadow:var(--shadow)}
.psl{font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.07em}
.psv{font-size:26px;font-weight:800;color:var(--txt);margin-top:6px;letter-spacing:-.4px}
.pss{font-size:11px;color:var(--txt3);margin-top:2px;font-weight:400}
.ph-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:62vh;text-align:center;padding:40px}
.ph-icon-big{font-size:52px;margin-bottom:18px;opacity:.35}
.ph-screen h3{font-size:18px;font-weight:700;color:var(--txt2);margin-bottom:9px}
.ph-screen p{font-size:13.5px;color:var(--txt3);max-width:360px;line-height:1.65;font-weight:400}

/* ══ OVERLAY & MODAL ═══════════════════════════════════════════ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:600;padding:20px}
.modal{background:var(--white);border-radius:18px;padding:28px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 40px 80px rgba(0,0,0,.35)}
.modal-box{background:var(--white);border-radius:16px;padding:24px;box-shadow:0 24px 60px rgba(0,0,0,.25)}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
.modal-head h3{font-size:16px;font-weight:700;color:var(--txt)}
.modal-x{width:30px;height:30px;border-radius:8px;background:var(--bg);border:1px solid var(--card-b);font-size:16px;color:var(--txt3);display:flex;align-items:center;justify-content:center;transition:all .15s}
.modal-x:hover{background:var(--card-b);color:var(--txt)}

/* ══ FORMS ═════════════════════════════════════════════════════ */
.f-label{display:block;font-size:10.5px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px}
.f-input,.f-select{width:100%;padding:10px 13px;border:1.5px solid var(--card-b);border-radius:9px;font-size:13.5px;font-weight:400;color:var(--txt);background:var(--white);outline:none;transition:border-color .15s,box-shadow .15s}
.f-input:focus,.f-select:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(249,115,22,.1)}
.f-group{margin-bottom:16px}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.f-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.modal-foot{display:flex;justify-content:flex-end;gap:10px;margin-top:22px;padding-top:18px;border-top:1px solid var(--card-b)}
.f-readonly{padding:9px 12px;background:var(--bg);border:1.5px solid var(--card-b);border-radius:9px;font-size:13px;color:var(--txt2);font-weight:500}
.f-readonly.code{font-family:'Courier New',monospace;color:var(--orange);background:rgba(249,115,22,.06)}
.section-divider{font-size:10.5px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.08em;margin:16px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--card-b)}

/* ══ BUTTONS ═══════════════════════════════════════════════════ */
.btn-cancel{padding:9px 20px;background:var(--bg);border:1px solid var(--card-b);border-radius:9px;font-size:13px;font-weight:600;color:var(--txt2);transition:all .15s}
.btn-cancel:hover{background:var(--card-b)}
.btn-confirm{padding:9px 22px;background:var(--orange);border:none;border-radius:9px;font-size:13px;font-weight:700;color:#fff;box-shadow:0 3px 10px rgba(249,115,22,.3);transition:all .15s}
.btn-confirm:hover:not(:disabled){background:var(--orange2)}
.btn-confirm:disabled{opacity:.5;cursor:not-allowed;box-shadow:none}
.btn-add{display:flex;align-items:center;gap:7px;padding:9px 17px;background:var(--orange);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;box-shadow:0 3px 12px rgba(249,115,22,.25);transition:all .15s}
.btn-add:hover{background:var(--orange2)}
.btn-edit{padding:4px 11px;background:var(--bg);border:1px solid var(--card-b);border-radius:7px;font-size:11.5px;font-weight:600;color:var(--txt2);transition:all .15s}
.btn-edit:hover{background:var(--card-b);color:var(--txt)}
.btn-sm{padding:4px 11px;border-radius:7px;font-size:11.5px;font-weight:700;border:1.5px solid;cursor:pointer;transition:all .15s}
.btn-sm.deact{background:transparent;border-color:#FCA5A5;color:var(--red)}
.btn-sm.deact:hover{background:var(--red);color:#fff;border-color:var(--red)}
.btn-sm.react{background:#F0FDF4;border-color:#BBF7D0;color:#166534}
.btn-sm.react:hover{background:#DCFCE7}
.dark .btn-sm.react{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.3);color:#86EFAC}
.tb-btn{display:flex;align-items:center;gap:6px;padding:7px 13px;background:var(--bg);border:1px solid var(--card-b);border-radius:8px;font-size:12px;font-weight:600;color:var(--txt2);transition:all .15s}
.tb-btn:hover{background:var(--card-b);color:var(--txt)}
.tb-btn.danger{background:#FEF2F2;color:var(--red);border-color:#FCA5A5}
.tb-btn.danger:hover{background:var(--red);color:#fff}
.btn-import{padding:9px 20px;background:var(--orange);color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;box-shadow:0 3px 10px rgba(249,115,22,.25);transition:all .15s}
.btn-import:hover:not(:disabled){background:var(--orange2)}
.btn-import:disabled{opacity:.5;cursor:not-allowed;box-shadow:none}

/* ══ TOOLBAR ═══════════════════════════════════════════════════ */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.tb-search{flex:1;min-width:180px;padding:9px 13px;border:1.5px solid var(--card-b);border-radius:9px;font-size:13px;font-family:inherit;color:var(--txt);background:var(--white);outline:none;transition:border-color .15s}
.tb-search:focus{border-color:var(--orange)}
.tb-select{padding:8px 11px;border:1.5px solid var(--card-b);border-radius:9px;font-size:12.5px;font-family:inherit;color:var(--txt);background:var(--white);outline:none;cursor:pointer;font-weight:500}
.tb-select:focus{border-color:var(--orange)}
.tb-refresh{padding:8px 13px;background:var(--bg);border:1px solid var(--card-b);border-radius:9px;font-size:12px;font-weight:600;color:var(--txt2);cursor:pointer;transition:all .15s}
.tb-refresh:hover{background:var(--card-b)}

/* ══ TABLES ════════════════════════════════════════════════════ */
.pt-wrap{background:var(--white);border:1px solid var(--card-b);border-radius:14px;overflow:visible;box-shadow:var(--shadow)}
.pt-table{width:100%;border-collapse:collapse;font-size:12.5px}
.pt-table th{padding:9px 12px;text-align:left;background:var(--bg);font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.08em;border-bottom:1.5px solid var(--card-b);white-space:nowrap}
.pt-table td{padding:10px 12px;border-bottom:1px solid var(--card-b);vertical-align:middle}
.pt-table tr:last-child td{border-bottom:none}
.pt-table tr:hover td{background:var(--bg)}
.table-card{background:var(--white);border:1px solid var(--card-b);border-radius:14px;overflow:hidden;box-shadow:var(--shadow)}
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table th{padding:9px 14px;text-align:left;background:var(--bg);font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.08em;border-bottom:1.5px solid var(--card-b)}
.data-table td{padding:12px 14px;border-bottom:1px solid var(--card-b);vertical-align:middle}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:var(--bg)}
.pagination{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-top:1px solid var(--card-b);background:var(--bg)}
.pg-info{font-size:12px;color:var(--txt3);font-weight:500}
.pg-btns{display:flex;gap:6px}
.pg-btn{padding:5px 13px;background:var(--white);border:1px solid var(--card-b);border-radius:7px;font-size:12px;font-weight:600;color:var(--txt2);cursor:pointer;transition:all .15s}
.pg-btn:hover:not(:disabled){background:var(--card-b)}
.pg-btn:disabled{opacity:.4;cursor:not-allowed}
.pg-count{font-size:11px;color:var(--txt3);font-weight:500;padding:0 4px}
.no-results{text-align:center;padding:48px 20px;color:var(--txt3)}
.nr-icon{font-size:40px;margin-bottom:12px;opacity:.3}
.no-results p{font-size:13.5px;font-weight:500}
.inactive-row td{opacity:.45}

/* ══ BADGES & CHIPS ════════════════════════════════════════════ */
.pt-code{font-family:'Courier New',monospace;font-size:11px;font-weight:700;color:var(--orange);background:rgba(249,115,22,.08);padding:2px 7px;border-radius:5px;white-space:nowrap}
.dark .pt-code{background:rgba(249,115,22,.12)}
.pt-name{font-size:12.5px;color:var(--txt);font-weight:600;max-width:300px}
.pt-brand{font-size:11px;color:var(--txt3);margin-top:1px;font-weight:400}
.gst-pill{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700;background:rgba(29,78,216,.08);color:var(--blue)}
.dark .gst-pill{background:rgba(96,165,250,.12);color:#93C5FD}
.stock-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700;white-space:nowrap}
.stock-badge.good{background:#DCFCE7;color:#166534}
.stock-badge.low{background:#FEF3C7;color:#92400E}
.stock-badge.zero{background:#FEE2E2;color:#991B1B}
.dark .stock-badge.good{background:rgba(34,197,94,.15);color:#86EFAC}
.dark .stock-badge.low{background:rgba(245,158,11,.15);color:#FDE68A}
.dark .stock-badge.zero{background:rgba(239,68,68,.15);color:#FCA5A5}
.bill-status{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:12px;font-size:10.5px;font-weight:700}
.bill-status.unpaid{background:#FEE2E2;color:#991B1B}
.bill-status.partial{background:#FEF3C7;color:#92400E}
.bill-status.paid{background:#DCFCE7;color:#166534}

.dark .bill-status.unpaid{background:rgba(239,68,68,.15);color:#FCA5A5}
.dark .bill-status.partial{background:rgba(245,158,11,.15);color:#FDE68A}
.dark .bill-status.paid{background:rgba(34,197,94,.15);color:#86EFAC}
.badge-role{padding:3px 9px;border-radius:20px;font-size:10.5px;font-weight:700;text-transform:capitalize}
.badge-role.owner{background:#FFF4EC;color:#C2410C;border:1px solid #FED7AA}
.badge-role.billing{background:#EFF6FF;color:#1D4ED8;border:1px solid #BFDBFE}
.badge-role.warehouse{background:#F0FDF4;color:#166534;border:1px solid #BBF7D0}
.dark .badge-role.owner{background:rgba(249,115,22,.12);color:#FDBA74;border-color:rgba(249,115,22,.25)}
.dark .badge-role.billing{background:rgba(96,165,250,.12);color:#93C5FD;border-color:rgba(96,165,250,.25)}
.dark .badge-role.warehouse{background:rgba(34,197,94,.12);color:#86EFAC;border-color:rgba(34,197,94,.25)}
.party-type-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;text-transform:capitalize}
.party-type-pill.customer{background:#EFF6FF;color:#1D4ED8;border:1px solid #BFDBFE}
.party-type-pill.supplier{background:#FFF4EC;color:#C2410C;border:1px solid #FED7AA}
.dark .party-type-pill.customer{background:rgba(96,165,250,.12);color:#93C5FD;border-color:rgba(96,165,250,.25)}
.dark .party-type-pill.supplier{background:rgba(249,115,22,.12);color:#FDBA74;border-color:rgba(249,115,22,.25)}
.gstin-mono{font-family:'Courier New',monospace;font-size:11.5px;color:var(--blue);background:rgba(29,78,216,.07);padding:2px 7px;border-radius:5px;letter-spacing:.04em}
.dark .gstin-mono{background:rgba(96,165,250,.12);color:#93C5FD}
.credit-chip{font-size:11px;font-weight:700;color:var(--green)}
.bal-chip{font-size:12px;font-weight:700}
.bal-chip.owing{color:var(--red)}.bal-chip.clear{color:var(--green)}
.live-dot{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--green)}
.live-dot::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1.5s ease infinite}
.this-dev{font-size:10px;color:var(--orange);font-weight:700;margin-top:1px}

/* ══ BILLING SPECIFIC ══════════════════════════════════════════ */
.bill-header-card{background:var(--white);border:1px solid var(--card-b);border-radius:14px;padding:18px 20px;margin-bottom:16px;box-shadow:var(--shadow)}
.bill-header-row{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end}
.bh-group{display:flex;flex-direction:column;gap:5px;min-width:140px}
.bh-group.wide{flex:2}
.prod-dropdown{position:fixed;background:var(--white);border:1.5px solid var(--orange);border-radius:10px;box-shadow:var(--shadow2);z-index:9999;max-height:260px;overflow-y:auto}
.prod-option{padding:10px 13px;cursor:pointer;border-bottom:1px solid var(--card-b);transition:background .1s}
.prod-option:last-child{border-bottom:none}
.prod-option:hover{background:rgba(249,115,22,.06)}
.dark .prod-option:hover{background:rgba(249,115,22,.1)}
.bill-num-input{width:100%;padding:7px 9px;border:1.5px solid var(--card-b);border-radius:8px;font-size:13px;text-align:center;font-family:inherit;font-weight:600;outline:none;background:var(--white);color:var(--txt);transition:border-color .15s}
.bill-num-input:focus{border-color:var(--orange)}
.bill-gst-sel{width:100%;padding:6px;border:1.5px solid var(--card-b);border-radius:8px;font-size:12px;font-family:inherit;background:var(--white);color:var(--txt);outline:none}
.del-row{background:none;border:none;color:var(--txt3);font-size:16px;cursor:pointer;padding:0 4px;transition:color .15s}
.del-row:hover{color:var(--red)}
.bill-totals-box{background:var(--white);border:1px solid var(--card-b);border-radius:14px;padding:16px 20px;min-width:260px;box-shadow:var(--shadow)}
.bt-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:13px;color:var(--txt2);border-bottom:1px solid var(--card-b)}
.bt-row.sub{font-size:12px;color:var(--txt3);padding:3px 0 3px 12px}
.bt-row.grand{font-size:16px;font-weight:800;color:var(--txt);border-top:2px solid var(--card-b);border-bottom:none;padding-top:10px;margin-top:4px}
.pay-mode-btn{padding:8px 14px;border:1.5px solid var(--card-b);border-radius:9px;font-size:12.5px;font-weight:600;color:var(--txt2);background:var(--white);cursor:pointer;transition:all .15s}
.pay-mode-btn.sel{background:var(--orange);color:#fff;border-color:var(--orange)}
.pay-mode-btn:hover:not(.sel){border-color:var(--orange);color:var(--orange)}

/* ══ TABS ══════════════════════════════════════════════════════ */
.s-tabs{display:flex;gap:4px;border-bottom:1px solid var(--card-b);margin-bottom:20px}
.s-tab{padding:9px 18px;border:none;background:none;font-size:13px;font-weight:600;color:var(--txt3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.s-tab.active{color:var(--orange);border-bottom-color:var(--orange)}

/* ══ SETTINGS ══════════════════════════════════════════════════ */
.settings-block{background:var(--white);border:1px solid var(--card-b);border-radius:14px;margin-bottom:16px;box-shadow:var(--shadow);overflow:hidden}
.settings-head{padding:14px 20px;border-bottom:1px solid var(--card-b)}
.settings-head h3{font-size:13px;font-weight:700;color:var(--txt)}
.settings-head p{font-size:11.5px;color:var(--txt3);margin-top:2px;font-weight:400}
.toggle-wrap{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--card-b)}
.toggle-wrap:last-child{border-bottom:none}
.toggle-label{font-size:13px;font-weight:500;color:var(--txt)}
.toggle-sub{font-size:11.5px;color:var(--txt3);margin-top:2px}
.toggle-btn{width:44px;height:24px;border-radius:12px;border:none;cursor:pointer;transition:background .2s;position:relative;flex-shrink:0}
.toggle-btn.on{background:var(--orange)}.toggle-btn.off{background:var(--card-b)}
.toggle-btn::after{content:'';position:absolute;top:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left .2s}
.toggle-btn.on::after{left:22px}.toggle-btn.off::after{left:2px}

/* ══ SESSIONS ══════════════════════════════════════════════════ */
.sess-tbl{width:100%;border-collapse:collapse;font-size:12.5px}
.sess-tbl th{padding:8px 12px;text-align:left;background:var(--bg);font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.08em;border-bottom:1.5px solid var(--card-b)}
.sess-tbl td{padding:11px 12px;border-bottom:1px solid var(--card-b);vertical-align:middle}
.sess-tbl tr:last-child td{border-bottom:none}

/* ══ IMPORT & PROGRESS ═════════════════════════════════════════ */
.import-panel{background:#FFF4EC;border:1.5px solid #FED7AA;border-radius:12px;padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.import-panel p{font-size:13px;color:#92400E;font-weight:500;flex:1;line-height:1.5}
.dark .import-panel{background:rgba(249,115,22,.08);border-color:rgba(249,115,22,.2)}
.dark .import-panel p{color:#FDBA74}
.progress-wrap{width:100%;background:rgba(249,115,22,.15);border-radius:8px;height:6px;margin-top:8px;overflow:hidden}
.progress-bar{height:100%;background:var(--orange);border-radius:8px;transition:width .3s}

/* ══ IDLE WARNING ══════════════════════════════════════════════ */
.idle-toast{position:fixed;top:20px;right:20px;z-index:999;background:var(--white);border:1.5px solid #FDE68A;border-radius:14px;padding:16px 18px;box-shadow:var(--shadow2);max-width:300px}
.idle-toast strong{display:block;font-size:13.5px;font-weight:700;color:#92400E;margin-bottom:5px}
.idle-toast p{font-size:12.5px;color:#78350F;font-weight:400;line-height:1.5}
.idle-btns{display:flex;gap:8px;margin-top:13px}
.idle-btns button{flex:1;padding:8px;border-radius:8px;font-size:12.5px;font-weight:700;border:none;cursor:pointer}
.idle-btns .i-stay{background:var(--orange);color:#fff}
.idle-btns .i-leave{background:#FEF2F2;color:var(--red)}
.dark .idle-toast{border-color:rgba(245,158,11,.3)}
.dark .idle-toast strong{color:#FDE68A}
.dark .idle-toast p{color:#FDE68A}

/* ══ MISC COMPONENTS ═══════════════════════════════════════════ */
.role-sel{padding:4px 8px;background:var(--bg);border:1px solid var(--card-b);border-radius:7px;font-size:12px;font-weight:500;color:var(--txt);cursor:pointer;outline:none}
.modal-lg{max-width:680px}
.info-note{background:rgba(29,78,216,.06);border:1px solid rgba(29,78,216,.15);border-radius:10px;padding:12px 16px;font-size:12.5px;color:#1E40AF;font-weight:500;margin-bottom:16px;line-height:1.6}
.dark .info-note{background:rgba(96,165,250,.08);border-color:rgba(96,165,250,.2);color:#93C5FD}
.decoder-panel{background:var(--bg);border:1px solid var(--card-b);border-radius:12px;padding:16px 18px;margin-bottom:16px}
.decoder-panel h4{font-size:12.5px;font-weight:700;color:var(--txt);margin-bottom:12px}
.decoder-row{display:flex;gap:10px;align-items:center}
.decoder-input{flex:1;padding:9px 13px;border:1.5px solid var(--card-b);border-radius:9px;font-family:'Courier New',monospace;font-size:13px;color:var(--txt);background:var(--white);outline:none;transition:border-color .15s}
.decoder-input:focus{border-color:var(--orange)}
.decoder-result{margin-top:12px;display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px}
.dr-item{background:var(--white);border:1px solid var(--card-b);border-radius:9px;padding:10px 14px}
.drl{font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.drv{font-size:16px;font-weight:800;color:var(--txt)}.drv.cost{color:var(--orange);font-size:20px}
.barcode-label{border:1px solid var(--card-b);border-radius:8px;padding:12px;background:var(--white);display:flex;flex-direction:column;align-items:center;gap:8px}
.bl-name{font-size:11px;font-weight:600;color:var(--txt);text-align:center;line-height:1.3}
.bl-serial{font-family:'Courier New',monospace;font-size:10px;color:var(--txt3);font-weight:600}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@media print{.no-print{display:none!important}body{background:white!important}}

/* ══ PHASE 3 — TRANSITIONS & MICRO-INTERACTIONS ════════════════ */

/* Page enter animation */
.screen-enter{animation:screenFadeUp .18s ease-out both}
@keyframes screenFadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Toast slide in from right */
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(20px)}}
.toast-enter{animation:slideIn .2s ease-out both}
.toast-exit{animation:slideOut .18s ease-in both}

/* Modal entrance */
@keyframes modalIn{from{opacity:0;transform:scale(.97) translateY(-6px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal,.modal-box{animation:modalIn .2s cubic-bezier(.16,1,.3,1) both}
.overlay{animation:fadeIn .15s ease both}

/* Button press — physical feel */
.btn-confirm:not(:disabled):active,.btn-add:active,.btn-import:active{transform:scale(.96);transition:transform .08s,background .15s,box-shadow .15s}
.btn-cancel:active,.btn-edit:active,.btn-sm:active,.tb-btn:active,.tb-refresh:active{transform:scale(.97);transition:transform .08s}
.a-btn:not(:disabled):active{transform:scale(.98)}
.sb-item:active{transform:scale(.98)}
.pay-mode-btn:not(.sel):active{transform:scale(.97)}

/* Smooth transitions on interactive elements */
.btn-confirm,.btn-add,.btn-cancel,.btn-edit,.btn-sm,.btn-import,.tb-btn,.tb-refresh{transition:background .15s,border-color .15s,box-shadow .15s,transform .08s,color .15s}
.f-input,.f-select,.tb-search,.tb-select,.bill-num-input,.decoder-input{transition:border-color .15s,box-shadow .15s}
.sb-item{transition:background .12s,color .12s,border-left-color .12s,transform .08s}
.toggle-btn::after{transition:left .2s cubic-bezier(.4,0,.2,1)}
.pg-btn{transition:background .12s,color .12s,transform .08s}
.pg-btn:not(:disabled):active{transform:scale(.95)}
.modal-x{transition:background .12s,color .12s,transform .08s}
.modal-x:active{transform:scale(.9)}

/* Card hover lift */
.s-card{transition:box-shadow .2s,transform .2s}
.s-card:hover{box-shadow:var(--shadow2);transform:translateY(-1px)}
.pm-stat{transition:box-shadow .2s,transform .2s}
.pm-stat:hover{box-shadow:var(--shadow2);transform:translateY(-1px)}

/* Table row highlight */
.pt-table tr,.data-table tr,.sess-tbl tr{transition:background .1s}

/* Sidebar collapse toggle */
.sidebar{transition:width .2s cubic-bezier(.4,0,.2,1)}

/* Skeleton loading shimmer */
.skeleton{background:linear-gradient(90deg,var(--card-b) 25%,var(--bg) 50%,var(--card-b) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px;display:inline-block}
@keyframes shimmer{from{background-position:200% 0}to{background-position:-200% 0}}
.skeleton-line{height:13px;margin-bottom:8px;border-radius:6px}
.skeleton-line.wide{width:80%}.skeleton-line.med{width:55%}.skeleton-line.short{width:35%}
.skeleton-circle{border-radius:50%}

/* Topbar show-hide transition */
.topbar{transition:border-color .2s}

/* Phase card row */
.ph-row{transition:background .1s}
.ph-row:hover{background:var(--bg);border-radius:8px}

/* Floating toggle button */
.float-toggle{transition:background .15s,transform .15s,box-shadow .15s}
.float-toggle:hover{transform:translateY(-1px);box-shadow:var(--shadow2)}
.float-toggle:active{transform:scale(.93)}


/* ══ PHASE 4 — MOBILE & GESTURES ═══════════════════════════════ */
@media(max-width:768px){

  /* Sidebar: overlay mode */
  .sidebar{
    position:fixed!important;top:0;left:0;height:100vh;
    transform:translateX(-100%);
    transition:transform .25s cubic-bezier(.4,0,.2,1)!important;
    z-index:500;width:224px!important;box-shadow:4px 0 32px rgba(0,0,0,.4);
  }
  .sidebar.mob-open{transform:translateX(0)}
  .sb-collapsed{width:224px!important} /* no collapse on mobile */

  /* Main takes full width */
  .main{width:100%!important;margin-left:0}

  /* Compact topbar */
  .topbar{padding:0 14px;height:52px}
  .tb-title{font-size:14px}
  .tb-right{gap:6px}
  .role-pill{display:none} /* hide on mobile */

  /* Content padding */
  .content{padding:14px}

  /* Prevent iOS input zoom — font-size must be >= 16px */
  input,select,textarea{font-size:16px!important}
  .f-input,.f-select,.tb-search,.tb-select,.bill-num-input,.decoder-input,
  .a-input{font-size:16px!important}

  /* Tables — horizontal scroll */
  .pt-wrap,.table-card,.table-card>*{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .pt-table,.data-table,.sess-tbl{min-width:540px}

  /* Stack form grids to single column */
  .f-row,.f-row-3,.bill-header-row{grid-template-columns:1fr!important;flex-direction:column}

  /* Bottom-sheet modals */
  .overlay{align-items:flex-end;padding:0}
  .modal{border-radius:20px 20px 0 0;max-width:100%!important;
    width:100%!important;margin:0;max-height:90vh;
    animation:sheetUp .25s cubic-bezier(.16,1,.3,1) both}
  .modal-box{border-radius:20px 20px 0 0;max-width:100%!important;
    width:100%!important;animation:sheetUp .25s cubic-bezier(.16,1,.3,1) both}

  /* Larger tap targets */
  .sb-item{min-height:44px;display:flex;align-items:center}
  .btn-confirm,.btn-add,.a-btn{min-height:44px}
  .tb-btn,.btn-cancel{min-height:40px}
  .pg-btn{min-height:36px;padding:6px 14px}

  /* Stat grid 2-cols on mobile */
  .stat-grid{grid-template-columns:1fr 1fr}
  .pm-stats{grid-template-columns:1fr 1fr}

  /* Bill totals full width */
  .bill-totals-box{min-width:unset;width:100%}

  /* Float toggle bigger target */
  .float-toggle{width:34px;height:34px}

  /* Hamburger menu button for mobile */
  .mob-menu-btn{display:flex;align-items:center;justify-content:center;
    width:36px;height:36px;border-radius:9px;background:var(--bg);
    border:1px solid var(--card-b);cursor:pointer;font-size:16px}
}
@keyframes sheetUp{
  from{transform:translateY(100%)}
  to{transform:translateY(0)}
}

/* Hide mobile menu btn on desktop */
.mob-menu-btn{display:none}

function useAuth(){
  const[s,setS]=useState({user:null,ud:null,loading:true,sid:null});
  useEffect(()=>auth.onAuthStateChanged(async u=>{
    if(!u){setS({user:null,ud:null,loading:false,sid:null});return;}
    try{
      const doc=await db.collection('users').doc(u.uid).get();
      if(doc.exists){const sid=await startSession(u.uid,u.email);setS({user:u,ud:doc.data(),loading:false,sid});audit('LOGIN',{email:u.email});}
      else setS({user:u,ud:null,loading:false,sid:null});
    }catch{setS({user:u,ud:null,loading:false,sid:null});}
  }),[]);
  return s;
}

function useIdleTimer(enabled,onLogout){
  const wT=useRef(null),lT=useRef(null);
  const[warn,setWarn]=useState(false);
  const reset=useCallback(()=>{
    if(!enabled)return;
    clearTimeout(wT.current);clearTimeout(lT.current);setWarn(false);
    wT.current=setTimeout(()=>{setWarn(true);lT.current=setTimeout(onLogout,IDLE_OUT-IDLE_WARN);},IDLE_WARN);
  },[enabled,onLogout]);
  useEffect(()=>{
    if(!enabled)return;
    const evts=['mousedown','keydown','touchstart','wheel'];
    evts.forEach(e=>window.addEventListener(e,reset,true));reset();
    return()=>{evts.forEach(e=>window.removeEventListener(e,reset,true));clearTimeout(wT.current);clearTimeout(lT.current);};
  },[enabled,reset]);
  return{warn,reset};
}

/* BILLING UTILS */
async function generateInvNumber(type){
  const d=new Date();
  const key=`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
  return await db.runTransaction(async t=>{
    const ref=db.collection('counters').doc(key);
    const doc=await t.get(ref);
    const cnt=doc.exists?((doc.data()[type]||0)+1):1;
    t.set(ref,{[type]:cnt},{merge:true});
    const yy=String(d.getFullYear()).slice(-2).split('').reverse().join('');
    const mm=String(d.getMonth()+1).padStart(2,'0');
    const dd=String(d.getDate()).padStart(2,'0').split('').reverse().join('');
    const nnn=String(cnt).padStart(3,'0').split('').reverse().join('');
    const pfx={tax_invoice:'INV',retail_invoice:'INV',quotation:'QTN',quotations_bill:'QTN',credit_note:'CN'};
    return `${pfx[type]||'INV'}-${yy}${mm}${dd}${nnn}`;
  });
}
const isInterState=gstin=>gstin?gstin.slice(0,2)!=='27':false;
function calcLine(item,gstExcl,inter){
  const qty=parseFloat(item.qty)||0,price=parseFloat(item.unitPrice)||0;
  const disc=parseFloat(item.discountPct)||0,gstR=parseFloat(item.gstRate)||0;
  const gross=qty*price,discA=gross*disc/100,after=gross-discA;
  let taxable,gstAmt,lineTotal;
  if(gstExcl){taxable=after;gstAmt=taxable*gstR/100;lineTotal=after+gstAmt;}
  else{taxable=after*100/(100+gstR);gstAmt=after-taxable;lineTotal=after;}
  return{gross,discA,taxable,cgst:inter?0:gstAmt/2,sgst:inter?0:gstAmt/2,igst:inter?gstAmt:0,lineTotal};
}
function calcTotals(items,gstExcl,inter){
  const c=items.map(i=>calcLine(i,gstExcl,inter));
  const s=f=>c.reduce((a,x)=>a+(x[f]||0),0);
  return{lines:c,subtotal:s('gross'),discount:s('discA'),taxable:s('taxable'),cgst:s('cgst'),sgst:s('sgst'),igst:s('igst'),grandTotal:s('lineTotal')};
}

  <table><thead><tr><th>#</th><th>Description</th><th>HSN</th><th>Qty</th><th>Rate</th>${gstHdr}<th align="right">Amount</th></tr></thead>

  ${bill.notes?`<div style="clear:both;background:#FFFBEB;border:1px solid #FDE68A;border-radius:4px;padding:8px 12px;font-size:10.5px;margin-bottom:12px"><b>Notes:</b> ${bill.notes}</div>`:''}
  ${bill.amountPaid>0?`<div style="clear:both;margin-bottom:12px;font-size:11px;font-weight:700;color:#166534">Amount Paid: ${inr(bill.amountPaid)} | Balance Due: ${inr(bill.balanceDue)}</div>`:''}
  <div class="ft"><div>
    <div style="font-size:9px;font-weight:800;text-transform:uppercase;color:#666;margin-bottom:4px">Terms & Conditions</div>
    <div style="font-size:9px;color:#555;line-height:1.5">${coInfo.terms||'Subject to Ambajogai jurisdiction.'}</div>
    ${coInfo.bank?`<div style="margin-top:6px;font-size:9.5px;font-weight:600">${coInfo.bank}</div>`:''}
  </div>
  <div style="text-align:right">
    <div style="font-size:9px;font-weight:800;text-transform:uppercase;color:#666">For ${coInfo.name}</div>
    <div class="sig-line">Authorised Signatory</div>
  </div></div>
  <script>window.onload=()=>setTimeout(()=>window.print(),400);<\/script>
  </body></html>`;
  // Blob URL approach — works in all modern browsers
  try{
    const blob=new Blob([html],{type:'text/html;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const w=window.open(url,'_blank');
    if(!w){window.__toast('Allow popups for this site to print. Check your browser settings.','warn');}
    setTimeout(()=>URL.revokeObjectURL(url),30000);
  }catch(e){console.error('Print error:',e);window.__toast('Print error: '+e.message);}
}

/* DASHBOARD */
function DashboardScreen({setScreen}){
  const today=new Date().toISOString().slice(0,10);
  const[stats,setStats]=useState({todayBills:0,todayAmount:0,outstanding:0,lowStock:0,parties:0,monthAmount:0,monthBills:0,recentBills:[]});
  const[loading,setLoading]=useState(true);

  useEffect(()=>{loadDash();},[]);

  const loadDash=async()=>{
    setLoading(true);
    try{
      const firstOfMonth=new Date(new Date().getFullYear(),new Date().getMonth(),1).toISOString().slice(0,10);
      const[billSnap,prodSnap,partySnap,payDSnap,cnDSnap]=await Promise.all([
        db.collection('bills').get(),
        db.collection('products').get(),
        db.collection('parties').where('isActive','==',true).get(),
        db.collection('payments').get(),
        db.collection('credit_notes').get(),
      ]);
      const bills=billSnap.docs.map(d=>({...d.data(),id:d.id})).filter(b=>b.status!=='superseded'&&b.status!=='deleted');
      const prods=prodSnap.docs.map(d=>({...d.data(),id:d.id}));

      // Exclude quotations and Q-Bills from sales figures
      const salesBills=bills.filter(b=>b.type!=='quotation'); // Q-Bills count as real sales
      const todayBills=salesBills.filter(b=>b.date===today);
      const monthBills=salesBills.filter(b=>b.date>=firstOfMonth);
      const unpaidBills=bills.filter(b=>b.paymentStatus!=='paid'&&b.partyId!=='CASH'&&b.type!=='quotation');

      const recent=[...bills].sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0)).slice(0,6);

      // Compute credit balances for dashboard indicator
      const dBilled={},dPaid={},dCN={};
      bills.filter(b=>b.partyId!=='CASH'&&b.type!=='quotation').forEach(b=>{dBilled[b.partyId]=(dBilled[b.partyId]||0)+b.grandTotal;});
      payDSnap.docs.forEach(d=>{const p=d.data();if(!p.deleted&&p.amount>0&&p.partyId!=='CASH')dPaid[p.partyId]=(dPaid[p.partyId]||0)+p.amount;});
      cnDSnap.docs.forEach(d=>{const cn=d.data();if(cn.partyId&&cn.partyId!=='CASH')dCN[cn.partyId]=(dCN[cn.partyId]||0)+(cn.creditAmount||0);});
      let totalCreditBal=0,creditPartyCount=0;
      partySnap.docs.forEach(d=>{
        const pid=d.id;
        const net=r2((dBilled[pid]||0)-(dPaid[pid]||0)-(dCN[pid]||0));
        if(net<0){totalCreditBal+=Math.abs(net);creditPartyCount++;}
      });
      setStats({
        todayBills:todayBills.length,
        todayAmount:r2(todayBills.reduce((s,b)=>s+b.grandTotal,0)),
        outstanding:r2(unpaidBills.reduce((s,b)=>s+(b.balanceDue||0),0)),
        lowStock:prods.filter(p=>p.isActive&&p.currentStock<=10&&p.currentStock>=0).length,
        zeroStock:prods.filter(p=>p.isActive&&p.currentStock===0).length,
        parties:partySnap.size,
        monthAmount:r2(monthBills.reduce((s,b)=>s+b.grandTotal,0)),
        monthBills:monthBills.length,
        recentBills:recent,
        totalCreditBal:r2(totalCreditBal),
        creditPartyCount,
      });
    }catch(e){console.error(e);}
    setLoading(false);
  };

  const fmt=n=>n>=100000?`₹${(n/100000).toFixed(1)}L`:n>=1000?`₹${(n/1000).toFixed(1)}K`:`₹${n}`;

  if(loading)return<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'60vh',flexDirection:'column',gap:16}}><div className="loader-ring"/><p style={{color:'var(--txt3)',fontSize:13,fontWeight:600}}>Loading dashboard…</p></div>;

  return(
    <div>
      {/* Stats row */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:14,marginBottom:20}}>
        {[
          {l:"Today's Sales",v:fmt(stats.todayAmount),s:`${stats.todayBills} bill${stats.todayBills!==1?'s':''}`,c:'var(--orange)',bg:'#FFF7ED',border:'#FED7AA'},
          {l:"This Month",v:fmt(stats.monthAmount),s:`${stats.monthBills} bills`,c:'#1D4ED8',bg:'#EFF6FF',border:'#BFDBFE'},
          {l:"Outstanding",v:fmt(stats.outstanding),
            s:stats.outstanding>0?'unpaid balance':'All clear',
            c:stats.outstanding>0?'var(--red)':'var(--green)',
            bg:stats.outstanding>0?'#FEF2F2':'#F0FDF4',
            border:stats.outstanding>0?'#FCA5A5':'#BBF7D0',
            extra:stats.totalCreditBal>0?{label:'ADV CREDIT',value:fmt(stats.totalCreditBal),sub:`${stats.creditPartyCount} party overpaid`}:null},
          {l:"Low Stock",v:stats.lowStock,s:`${stats.zeroStock} zero`,c:stats.zeroStock>0?'var(--red)':'#92400E',bg:'#FFF7ED',border:'#FED7AA'},
          {l:"Active Parties",v:stats.parties,s:'customers & suppliers',c:'var(--txt)',bg:'var(--white)',border:'var(--card-b)'},
        ].map((c,i)=>(
          <div key={i} style={{background:c.bg,border:`1px solid ${c.border}`,borderRadius:14,padding:'18px 20px',boxShadow:'var(--shadow)'}}>
            <div style={{fontSize:10.5,fontWeight:800,color:c.c,textTransform:'uppercase',letterSpacing:'.07em',opacity:.8}}>{c.l}</div>
            <div style={{fontSize:28,fontWeight:900,color:c.c,margin:'8px 0 4px',fontVariantNumeric:'tabular-nums'}}>{c.v}</div>
            <div style={{fontSize:11.5,color:c.c,fontWeight:600,opacity:.7}}>{c.s}</div>
            {c.extra&&<div style={{marginTop:8,paddingTop:8,borderTop:`1px solid ${c.border}`}}>
              <div style={{fontSize:9.5,fontWeight:800,color:'#166534',textTransform:'uppercase',letterSpacing:'.05em'}}>{c.extra.label}</div>
              <div style={{fontSize:16,fontWeight:900,color:'#166534'}}>{c.extra.value}</div>
              <div style={{fontSize:10,color:'#166534',opacity:.8}}>{c.extra.sub}</div>
            </div>}
          </div>
        ))}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        {/* Recent Bills */}
        <div style={{background:'var(--white)',border:'1px solid var(--card-b)',borderRadius:14,overflow:'hidden',boxShadow:'var(--shadow)'}}>
          <div style={{padding:'14px 18px',borderBottom:'1px solid var(--card-b)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <h3 style={{fontWeight:800,fontSize:14,color:'var(--txt)'}}>Recent Bills</h3>
            <button className="btn-edit" onClick={()=>setScreen&&setScreen('bills')}>View All</button>
          </div>
          {stats.recentBills.length===0
            ?<div className="no-results" style={{padding:32}}><p>No bills yet.</p></div>
            :<table className="pt-table">
              <thead><tr><th>Bill #</th><th>Party</th><th style={{textAlign:'right'}}>Amount</th><th>Status</th></tr></thead>
              <tbody>
                {stats.recentBills.map(b=>(
                  <tr key={b.id}>
                    <td><span className="pt-code" style={{fontSize:10}}>{b.billNumber}</span></td>
                    <td style={{fontSize:12.5,fontWeight:600,maxWidth:120,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{b.partyName}</td>
                    <td style={{textAlign:'right',fontWeight:800,fontSize:13}}><div>{inr(b.grandTotal)}</div>
                      {b.paymentStatus==='partial'&&<div style={{marginTop:2}}>
                        <span style={{fontSize:10.5,color:'var(--green)',fontWeight:600}}>✓{inr(b.amountPaid||0)} </span>
                        <span style={{fontSize:10.5,color:'var(--red)',fontWeight:700}}>● {inr(b.balanceDue||0)} due</span>
                      </div>}
                    </td>
                    <td>
  {b.type==='quotation'
    ?<span style={{fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:10,background:'#F0F9FF',color:'#0284C7',border:'1px solid #BAE6FD'}}>quotation</span>
    :<span className={`bill-status ${b.paymentStatus||'unpaid'}`} style={{fontSize:10}}>{b.paymentStatus||'unpaid'}</span>
  }
</td>
                  </tr>
                  ))}
              </tbody>
            </table>
          }
        </div>

        {/* Quick Actions */}
        <div style={{background:'var(--white)',border:'1px solid var(--card-b)',borderRadius:14,padding:'18px',boxShadow:'var(--shadow)'}}>
          <h3 style={{fontWeight:800,fontSize:14,color:'var(--txt)',marginBottom:16}}>Quick Actions</h3>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            {[
              {icon:'🧾',label:'New Bill',screen:'new-bill',color:'var(--orange)',bg:'#FFF7ED'},
              {icon:'👥',label:'Add Party',screen:'parties',color:'#1D4ED8',bg:'#EFF6FF'},
              {icon:'💰',label:'Outstanding',screen:'outstanding',color:'var(--red)',bg:'#FEF2F2'},
              {icon:'📊',label:'Sales Report',screen:'reports',color:'#166534',bg:'#F0FDF4'},
              {icon:'📦',label:'Stock',screen:'stock',color:'#92400E',bg:'#FFF7ED'},
              {icon:'▤',label:'Barcodes',screen:'barcodes',color:'var(--txt2)',bg:'var(--bg)'},
            ].map((a,i)=>(
              <button key={i} onClick={()=>{if(a.screen==='new-bill'){setNbKey(k=>k+1);setPrefill(null);}setScreen&&setScreen(a.screen);}}
                style={{padding:'14px',border:`1.5px solid ${a.bg==='var(--bg)'?'var(--card-b)':a.bg}`,borderRadius:12,background:a.bg,cursor:'pointer',textAlign:'left',transition:'all .15s'}}>
                <div style={{fontSize:20,marginBottom:6}}>{a.icon}</div>
                <div style={{fontSize:12.5,fontWeight:800,color:a.color}}>{a.label}</div>
              </button>
            ))}
          </div>
          <button className="tb-refresh" style={{width:'100%',marginTop:12,textAlign:'center'}} onClick={loadDash}>↻ Refresh Dashboard</button>
        </div>
      </div>
    </div>
  );
}

async function seedTestData(setLog){
  const log=(msg,type='info')=>{setLog(l=>[...l,{msg,type,t:new Date().toLocaleTimeString()}]);};
  // Helper: build a bill item using calcLine (same engine as real billing)
  const makeItem=(productId,productName,qty,unitPrice,gstRate)=>{
    const stub={productId,productName,unit:'Nos',qty:String(qty),unitPrice,discountPct:0,gstRate};
    const lc=calcLine(stub,true,false); // gstExcl=true, intra-state
    return{...stub,qty:String(qty),hsnCode:'',gross:lc.gross,discA:0,taxable:lc.taxable,
      cgst:lc.cgst,sgst:lc.sgst,igst:0,lineTotal:lc.lineTotal};
  };
  const sumBill=(items)=>{
    const sub=r2(items.reduce((s,i)=>s+i.taxable,0));
    const cgst=r2(items.reduce((s,i)=>s+i.cgst,0));
    const sgst=r2(items.reduce((s,i)=>s+i.sgst,0));
    return{subtotal:sub,taxable:sub,cgst,sgst,igst:0,grandTotal:r2(sub+cgst+sgst)};
  };
  try{
    log('Clearing existing data...');
    for(const c of ['bills','parties','payments','credit_notes','counters']){
      const snap=await db.collection(c).limit(300).get();
      const b=db.batch();snap.docs.forEach(d=>b.delete(d.ref));
      if(snap.docs.length>0)await b.commit();
    }
    log('Cleared','success');

    log('Creating parties...');
    const rajRef=await db.collection('parties').add({name:'Rajesh Electronics',type:'customer',phone:'9876543210',gstin:'27RAJXX0001A1ZB',address:'Shop 5, Market Yard, Pune',creditLimit:50000,outstandingBalance:0,isActive:true,createdAt:new Date()});

    log(`Bill 1: ${b1n} — 1,180 cash paid`,'success');

  const runNewImport=async()=>{
    if(!window.confirm('Import new products from new_products.json?\n\nSafe to run multiple times:\n• New products → added with stock from file\n• Existing products → metadata updated, stock preserved'))return;
    setNewImportSt({done:0,total:0,error:null,status:'Checking existing products…'});
    try{
      const resp=await fetch('/new_products.json');
      if(!resp.ok)throw new Error('new_products.json not found — make sure it is deployed alongside index.html');
      const data=await resp.json();
      setNewImportSt({done:0,total:data.length,error:null,status:'Checking existing products…'});
      const existSnap=await db.collection('products').get();
      const existingIds=new Set(existSnap.docs.map(d=>d.id));
      const CHUNK=25;const now=new Date();let done=0;let added=0;let updated=0;
      for(let i=0;i<data.length;i+=CHUNK){
        const chunk=data.slice(i,i+CHUNK);
        const batch=db.batch();
        chunk.forEach(p=>{
          const ref=db.collection('products').doc(p.fixedCode);
          if(existingIds.has(p.fixedCode)){
            const{currentStock,...meta}=p;
            batch.set(ref,{...meta,updatedAt:now},{merge:true});
            updated++;
          }else{
            batch.set(ref,{...p,createdAt:now,updatedAt:now});
            added++;
          }
        });
        await batch.commit();
        done+=chunk.length;
        setNewImportSt({done,total:data.length,error:null});
        await new Promise(r=>setTimeout(r,80));
      }
      setNewImportSt('done');
      alert('Import complete:\n• '+added+' new products added\n• '+updated+' existing products updated (stock preserved)');
    }catch(e){
      console.error(e);
      setNewImportSt({done:0,total:0,error:e.message});

  };

  const[stockUpdateSt,setStockUpdateSt]=useState(null);
  const runStockUpdate=async()=>{
    if(!window.confirm('Run 1 Jun 06 stock update?\n\n• 23 category fixes\n• 12 stock increments\n• 21 new products\n\nThis cannot be undone.'))return;

      setStockUpdateSt({done:0,total,error:null,status:'Fixing categories…'});

      // 1. Category fixes — batch update, merge:true (preserves stock)
      const CHUNK=25;
      const fixes=data.category_fixes||[];
      for(let i=0;i<fixes.length;i+=CHUNK){
        const batch=db.batch();
        fixes.slice(i,i+CHUNK).forEach(f=>{
          batch.set(db.collection('products').doc(f.fixedCode),
            {category:f.category,fullSkuName:f.fullSkuName,updatedAt:now},{merge:true});
        });
        await batch.commit();
        done+=Math.min(CHUNK,fixes.length-i);
        setStockUpdateSt({done,total,error:null,status:'Fixing categories…'});
        await new Promise(r=>setTimeout(r,60));
      }

      // 2. Stock increments — atomic FieldValue.increment
      setStockUpdateSt({done,total,error:null,status:'Incrementing stock…'});
      const incs=data.increments||[];
      for(let i=0;i<incs.length;i+=CHUNK){
        const batch=db.batch();
        incs.slice(i,i+CHUNK).forEach(inc=>{
          batch.update(db.collection('products').doc(inc.fixedCode),
            {currentStock:firebase.firestore.FieldValue.increment(inc.addQty),updatedAt:now});
        });
        await batch.commit();
        done+=Math.min(CHUNK,incs.length-i);
        setStockUpdateSt({done,total,error:null,status:'Incrementing stock…'});
        await new Promise(r=>setTimeout(r,60));

      // 3. New products — create fresh

      const newProds=data.new_products||[];

        done+=Math.min(CHUNK,newProds.length-i);

        await new Promise(r=>setTimeout(r,60));

function decodeSerial(raw){
  if(!raw||raw.trim().length<5)return null;
  let fc='',cc=raw.trim();
  if(raw.includes('-')){const p=raw.split('-');fc=p[0];cc=p[1]||'';}
  if(cc.length<5)return null;
  const mm=cc.slice(0,2),yy=cc.slice(-2),enc=cc.slice(2,-2);
  const cost=parseFloat(enc)/2;
  const mN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return{fixedCode:fc,month:mN[parseInt(mm)-1]||mm,year:`20${yy}`,cost:isNaN(cost)?'?':cost};
}

  useEffect(()=>{ loadParties(); },[]);

  const openSiModal=(p)=>{
    setSiModal({productId:p.id,productName:p.fullSkuName||p.id,currentStock:p.currentStock||0});
    setSiForm({date:siToday,challan:'',supplier:'',supplierId:'',qty:'',cost:''});
  };

  const saveStockIn=async()=>{
    if(!siModal||!siForm.qty||parseFloat(siForm.qty)<=0) return;
    setSiSaving(true);
    try{
      const qty=parseFloat(siForm.qty);
      const cost=parseFloat(siForm.cost)||0;
      const pItem={productId:siModal.productId,productName:siModal.productName,
        qty,unitCost:cost,totalCost:r2(qty*cost)};
      const doc={date:siForm.date,challanNumber:siForm.challan.trim(),
        supplierName:siForm.supplier.trim(),supplierId:siForm.supplierId||'',
        notes:'',items:[pItem],totalItems:1,totalQty:qty,
        totalValue:r2(qty*cost),status:'saved',
        createdAt:new Date()};
      const batch=db.batch();
      const ref=db.collection('purchases').doc();
      batch.set(ref,doc);
      batch.update(db.collection('products').doc(siModal.productId),
        {currentStock:firebase.firestore.FieldValue.increment(qty)});
      await batch.commit();
      // Update local products list
      setProducts(prev=>prev.map(p=>p.id===siModal.productId
        ?{...p,currentStock:r2((p.currentStock||0)+qty)}:p));
      // Refresh history if open for this product
      if(histExpanded===siModal.productId)
        loadHistory(siModal.productId, true);
      setSiModal(null);
    }catch(e){alert('Error: '+e.message);}
    setSiSaving(false);
  };

  const loadHistory=async(productId, forceRefresh=false)=>{
    if(histData[productId]&&!forceRefresh){ setHistExpanded(productId); return; }
    setHistLoading(h=>({...h,[productId]:true}));
    setHistExpanded(productId);
    try{
      const snap=await db.collection('purchases').orderBy('date','desc').get();
      const hist=[];
      snap.docs.forEach(d=>{
        const e={...d.data(),id:d.id};
        const it=(e.items||[]).find(x=>x.productId===productId);
        if(it) hist.push({date:e.date,challan:e.challanNumber,
          supplier:e.supplierName,qty:it.qty,unitCost:it.unitCost,
          totalCost:it.totalCost,id:d.id});
      });
      setHistData(h=>({...h,[productId]:hist}));
    }catch(e){}
    setHistLoading(h=>({...h,[productId]:false}));
  };

  const toggleHistory=(productId)=>{
    if(histExpanded===productId){ setHistExpanded(null); return; }
    loadHistory(productId);
  };

  // ── Smart code system ────────────────────────────────────
  const[brandCodes,setBrandCodes]=useState({}); // {Havells:'HAV', GM:'GM'}
  const[catCodes,setCatCodes]=useState({});      // {MCB:'MCB', Switches:'SWT'}
  // Add brand/cat modals
  const[addBrandOpen,setAddBrandOpen]=useState(false);
  const[addCatOpen,setAddCatOpen]=useState(false);
  const[newBrand,setNewBrand]=useState({name:'',code:''});
  const[newCat,setNewCat]=useState({name:'',code:''});

  const BLANK={fixedCode:'',brand:'',category:'',series:'',product:'',
    fullSkuName:'',unit:'',hsnCode:'',gstRate:18,mrp:'',currentStock:'',
    floorLocation:'',reorderLevel:'',notes:'',isActive:true};
  const[addForm,setAddForm]=useState(BLANK);
  const[codeGenerated,setCodeGenerated]=useState(false); // gate for Save

  // ── Derive brand/cat codes from existing fixedCodes ──────
  const deriveCodes=(prods)=>{
    const bc={},cc={};
    prods.forEach(p=>{
      if(!p.fixedCode||!p.fixedCode.includes('-'))return;
      const parts=p.fixedCode.split('-');
      if(parts.length>=2){
        if(p.brand&&!bc[p.brand])bc[p.brand]=parts[0].toUpperCase();
        if(p.category&&!cc[p.category])cc[p.category]=parts[1].toUpperCase();
      }
    });
    // Also check settings for user-added codes
    db.collection('settings').doc('product_codes').get().then(d=>{
      if(d.exists){
        const saved=d.data();
        setBrandCodes({...bc,...(saved.brandCodes||{})});
        setCatCodes({...cc,...(saved.catCodes||{})});
      } else {
        setBrandCodes(bc);setCatCodes(cc);
      }
    }).catch(()=>{setBrandCodes(bc);setCatCodes(cc);});
  };

  // ── Auto-generate next Fixed Code ───────────────────────
  const generateCode=(brand,category)=>{
    if(!brand||!category)return '';
    const bc=brandCodes[brand]||brand.replace(/\s+/g,'').substring(0,4).toUpperCase();
    const cc=catCodes[category]||category.replace(/\s+/g,'').substring(0,3).toUpperCase();
    const prefix=`${bc}-${cc}`;
    const nums=products
      .filter(p=>p.fixedCode?.startsWith(prefix+'-'))
      .map(p=>{const pts=p.fixedCode.split('-');return parseInt(pts[pts.length-1])||0;})
      .filter(n=>!isNaN(n));
    const next=nums.length>0?Math.max(...nums)+1:1;
    return `${prefix}-${String(next).padStart(3,'0')}`;
  };

  // ── Save a new brand + code ──────────────────────────────
  const saveBrand=async()=>{
    if(!newBrand.name.trim()||!newBrand.code.trim())return;
    const updated={...brandCodes,[newBrand.name.trim()]:newBrand.code.trim().toUpperCase()};
    setBrandCodes(updated);
    setAddForm(f=>({...f,brand:newBrand.name.trim(),fixedCode:'',series:''}));
    setCodeGenerated(false);
    // Persist
    db.collection('settings').doc('product_codes').set({brandCodes:updated,catCodes},{merge:true}).catch(()=>{});
    setAddBrandOpen(false);setNewBrand({name:'',code:''});
  };

  // ── Save a new category + code ───────────────────────────
  const saveCat=async()=>{
    if(!newCat.name.trim()||!newCat.code.trim())return;
    const updated={...catCodes,[newCat.name.trim()]:newCat.code.trim().toUpperCase()};
    setCatCodes(updated);
    setAddForm(f=>({...f,category:newCat.name.trim(),fixedCode:'',series:''}));
    setCodeGenerated(false);
    db.collection('settings').doc('product_codes').set({brandCodes,catCodes:updated},{merge:true}).catch(()=>{});
    setAddCatOpen(false);setNewCat({name:'',code:''});
  };

  // ── Suggest code when brand name typed ───────────────────
  const suggestCode=(name)=>{
    if(!name)return '';
    const words=name.trim().split(/\s+/);
    if(words.length>1)return words.map(w=>w[0]).join('').toUpperCase().substring(0,4);
    return name.replace(/\s+/g,'').substring(0,4).toUpperCase();
  };

  useEffect(()=>{checkImport();},[]);
  const checkImport=async()=>{
    try{const s=await db.collection('settings').doc('import').get();
      if(s.exists&&s.data().productsImported){setImported(true);loadProducts();}
      else{setImported(false);setLoading(false);}
    }catch{setImported(false);setLoading(false);}
  };
  const loadProducts=async()=>{
    setLoading(true);
    try{const snap=await db.collection('products').get();
      const prods=snap.docs.map(d=>({...d.data(),id:d.id}));
      prods.sort((a,b)=>(a.brand+a.fullSkuName).localeCompare(b.brand+b.fullSkuName));
      setProducts(prods);
      deriveCodes(prods);
    }catch(e){console.error(e);}
    setLoading(false);
  };
  const runImport=async()=>{
    setImportSt({done:0,total:1120,error:null});
    try{
      setImportSt({done:0,total:1120,error:null,status:'Fetching product data…'});
      const resp=await fetch('/sku_seed.json');
      if(!resp.ok)throw new Error('Could not load sku_seed.json — make sure it is uploaded alongside index.html');
      const seedData=await resp.json();
      const CHUNK=50;const now=new Date();let done=0;
      for(let i=0;i<seedData.length;i+=CHUNK){
        const chunk=seedData.slice(i,i+CHUNK);
        const batch=db.batch();
        chunk.forEach(p=>{const ref=db.collection('products').doc(p.fixedCode);batch.set(ref,{...p,createdAt:now,updatedAt:now,isActive:true});});
        await Promise.race([batch.commit(),new Promise((_,rej)=>setTimeout(()=>rej(new Error('Timeout')),15000))]);
        done+=chunk.length;setImportSt({done,total:seedData.length,error:null});
        await new Promise(r=>setTimeout(r,80));
      }
      await db.collection('settings').doc('import').set({productsImported:true,importedAt:now,count:done});
      setImported(true);setImportSt('done');loadProducts();
    }catch(e){console.error(e);setImportSt({done:0,total:1120,error:e.message});}
  };


  const saveEdit=async()=>{
    if(!editP)return;setSaving(true);
    const{id,...data}=editP;data.updatedAt=new Date();
    data.fullSkuName=[data.brand,data.category,data.series,data.product].filter(Boolean).join(' | ');
    await db.collection('products').doc(id).update(data);
    setProducts(ps=>ps.map(p=>p.id===id?{...p,...data}:p));
    setEditP(null);setSaving(false);
  };
  const saveAdd=async()=>{
    if(!addForm.fixedCode||!addForm.brand||!addForm.category||!codeGenerated)return;
    setSaving(true);
    // Check duplicate code
    const exists=products.find(p=>p.fixedCode===addForm.fixedCode);
    if(exists){window.__toast(`Code ${addForm.fixedCode} already exists`,'warn');setSaving(false);return;}
    const data={...addForm,createdAt:new Date(),updatedAt:new Date()};
    data.gstRate=parseFloat(data.gstRate)||0;
    data.mrp=parseFloat(data.mrp)||0;
    data.currentStock=parseFloat(data.currentStock)||0;
    data.fullSkuName=[data.brand,data.category,data.series,data.product].filter(Boolean).join(' | ');
    await db.collection('products').doc(addForm.fixedCode).set(data);
    setProducts(ps=>[...ps,{id:addForm.fixedCode,...data}].sort((a,b)=>(a.brand+a.fullSkuName).localeCompare(b.brand+b.fullSkuName)));
    setShowAdd(false);setAddForm(BLANK);setCodeGenerated(false);setSaving(false);
    window.__toast(`${data.fullSkuName} added`,'success');
  };
  const toggleActive=async p=>{
    const val=!p.isActive;
    await db.collection('products').doc(p.id).update({isActive:val,updatedAt:new Date()});
    setProducts(ps=>ps.map(x=>x.id===p.id?{...x,isActive:val}:x));
  };
  const filtered=products.filter(p=>{
    if(fStatus==='active'&&!p.isActive)return false;
    if(fStatus==='inactive'&&p.isActive)return false;
    if(fBrand&&p.brand!==fBrand)return false;
    if(fCat&&p.category!==fCat)return false;
    if(fStock==='low'&&!(p.currentStock>0&&p.currentStock<=10))return false;
    if(fStock==='zero'&&p.currentStock!==0)return false;
    return multiSearch(search,p,PSRCH);
  });
  const totalPages=Math.max(1,Math.ceil(filtered.length/PAGE_SZ));
  const paginated=filtered.slice((page-1)*PAGE_SZ,page*PAGE_SZ);
  // Include brands/cats from brandCodes (newly added) + from existing products
  const brands=[...new Set([...products.map(p=>p.brand),...Object.keys(brandCodes)].filter(Boolean))].sort();
  const cats=[...new Set([...products.map(p=>p.category),...Object.keys(catCodes)].filter(Boolean))].sort();
  // Filtered series for selected brand+category
  const seriesOptions=[...new Set(products.filter(p=>p.brand===addForm.brand&&p.category===addForm.category).map(p=>p.series).filter(Boolean))].sort();
  const stats={total:products.length,active:products.filter(p=>p.isActive).length,
    low:products.filter(p=>p.currentStock>0&&p.currentStock<=10).length,
    zero:products.filter(p=>p.currentStock===0).length};
  const SB=qty=>qty===0?<span className="stock-badge zero">0</span>:qty<=10?<span className="stock-badge low">{qty}</span>:<span className="stock-badge ok">{qty}</span>;
  const ep=k=>e=>setEditP(p=>({...p,[k]:e.target.type==='number'?(e.target.value===''?null:parseFloat(e.target.value)):e.target.value}));

  if(loading)return<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'60vh',flexDirection:'column',gap:16}}><div className="loader-ring"/></div>;

  return(<div>
    <div className="pm-stats">
      <div className="pm-stat"><div className="psl">Total</div><div className="psv">{stats.total.toLocaleString('en-IN')}</div></div>
      <div className="pm-stat"><div className="psl">Active</div><div className="psv">{stats.active.toLocaleString('en-IN')}</div></div>
      <div className="pm-stat"><div className="psl">Low Stock</div><div className="psv" style={{color:'var(--orange)'}}>{stats.low}</div></div>
      <div className="pm-stat"><div className="psl">Zero Stock</div><div className="psv" style={{color:'var(--red)'}}>{stats.zero}</div></div>
      <div className="pm-stat" style={{cursor:'pointer',borderColor:'#BBF7D0',background:'#F0FDF4'}}
        onClick={()=>setShowBulkModal(true)}
        onMouseEnter={e=>e.currentTarget.style.background='#DCFCE7'}
        onMouseLeave={e=>e.currentTarget.style.background='#F0FDF4'}>
        <div className="psl" style={{color:'#166534'}}>↑ Add Stock</div>
        <div className="psv" style={{fontSize:13,color:'#166534',fontWeight:700}}>Bulk Entry</div>
      </div>
    </div>

    {isOwner&&imported===false&&(
      <div className="import-panel">
        <div style={{flex:1}}>
          <p>⚡ <strong>1,120 SKUs ready to import.</strong> One-time setup.</p>
          {typeof importSt==='object'&&importSt!==null&&!importSt.error&&(<div><div style={{fontSize:12,marginBottom:4}}>{importSt.status||`Importing ${importSt.done}/${importSt.total}…`}</div></div>)}
          {typeof importSt==='object'&&importSt?.error&&<div style={{fontSize:12,color:'var(--red)',marginTop:4}}>Error: {importSt.error}</div>}
        </div>
        <button className="btn-import" onClick={runImport} disabled={typeof importSt==='object'&&importSt!==null&&!importSt.error}>
          {typeof importSt==='object'&&importSt!==null&&!importSt.error?'Importing…':'⚡ Import SKU Master'}
        </button>
      </div>
    )}

    

    {imported&&(<div className="toolbar">
      <input className="tb-search" value={search} onChange={e=>{setSearch(e.target.value);setPage(1);}} placeholder="Search code, brand, product…"/>
      <select className="tb-select" value={fBrand} onChange={e=>{setFBrand(e.target.value);setPage(1);}}>
        <option value="">All Brands</option>{brands.map(b=><option key={b}>{b}</option>)}
      </select>
      <select className="tb-select" value={fCat} onChange={e=>{setFCat(e.target.value);setPage(1);}}>
        <option value="">All Categories</option>{cats.map(c=><option key={c}>{c}</option>)}
      </select>
      <select className="tb-select" value={fStatus} onChange={e=>{setFStatus(e.target.value);setPage(1);}}>
        <option value="all">All</option><option value="active">Active</option><option value="inactive">Inactive</option>
      </select>
      <select className="tb-select" value={fStock} onChange={e=>{setFStock(e.target.value);setPage(1);}}>
        <option value="all">All Stock</option><option value="low">Low (≤10)</option><option value="zero">Zero</option>
      </select>
      <button className="tb-refresh" onClick={loadProducts}>↻</button>
      {isOwner&&<button className="btn-add" onClick={()=>{setShowAdd(true);setAddForm(BLANK);setCodeGenerated(false);}}>＋ Add</button>}


    </div>)}

    {imported&&(<div className="pt-wrap">
      <table className="pt-table">
        <thead><tr><th>Code</th><th>Product</th><th style={{textAlign:'center'}}>Stock</th><th style={{textAlign:'center'}}>Unit</th><th style={{textAlign:'center'}}>GST</th><th style={{textAlign:'right'}}>MRP</th>{isOwner&&<th style={{textAlign:'center'}}>Edit</th>}</tr></thead>
        <tbody>
          {paginated.length===0?<tr><td colSpan={isOwner?7:6}><div className="no-results"><div className="nr-icon">📦</div><p>No products found.</p></div></td></tr>
          :paginated.map(p=>(<React.Fragment key={p.id}><tr className={!p.isActive?'inactive-row':''}>
            <td><span className="pt-code">{p.fixedCode}</span></td>
            <td><div className="pt-name">{p.fullSkuName}</div><div className="pt-brand">{p.brand} · {p.category}</div></td>
            <td style={{textAlign:'center'}}>{SB(p.currentStock||0)}</td>
            <td style={{textAlign:'center',color:'var(--txt3)',fontSize:12,fontWeight:600}}>{p.unit||'—'}</td>
            <td style={{textAlign:'center'}}>{p.gstRate!=null?<span className="gst-pill">{p.gstRate}%</span>:'—'}</td>
            <td style={{textAlign:'right',fontWeight:700,fontSize:12}}>{p.mrp?`₹${p.mrp}`:'—'}</td>
            {isOwner&&<td style={{textAlign:'center'}}><button className="btn-edit" onClick={()=>setEditP({...p})}>Edit</button></td>}
            <td style={{textAlign:'center',whiteSpace:'nowrap'}}>
              <button onClick={()=>openSiModal(p)}
                style={{padding:'3px 9px',background:'#F0FDF4',border:'1px solid #BBF7D0',
                  borderRadius:6,fontSize:11,fontWeight:700,color:'#166534',cursor:'pointer',marginRight:4}}>
                ↑ Stock
              </button>
              <button onClick={()=>toggleHistory(p.id)}
                style={{padding:'3px 9px',background:histExpanded===p.id?'#EFF6FF':'var(--bg)',
                  border:'1px solid '+(histExpanded===p.id?'#BFDBFE':'var(--card-b)'),
                  borderRadius:6,fontSize:11,fontWeight:600,
                  color:histExpanded===p.id?'#1D4ED8':'var(--txt2)',cursor:'pointer'}}>
                {histExpanded===p.id?'▲':'▼'} History
              </button>
            </td>
          </tr>
          {histExpanded===p.id&&(
            <tr>
              <td colSpan={isOwner?9:8} style={{padding:'0 0 12px',background:'#F8FAFF',borderBottom:'1px solid var(--card-b)'}}>
                {histLoading[p.id]?<div style={{padding:'16px 24px',color:'var(--txt3)',fontSize:12}}>Loading history...</div>:(
                  histData[p.id]&&histData[p.id].length===0?(
                    <div style={{padding:'16px 24px',color:'var(--txt3)',fontSize:12}}>
                      No stock intake recorded yet. Click ↑ Stock to add the first entry.
                    </div>
                  ):(
                    <div style={{padding:'8px 16px'}}>
                      <div style={{fontSize:11,fontWeight:700,color:'var(--txt3)',textTransform:'uppercase',
                        letterSpacing:'.5px',marginBottom:8}}>
                        Stock Intake History — {p.fullSkuName||p.id}
                      </div>
                      <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                        <thead><tr style={{borderBottom:'1px solid var(--card-b)'}}>
                          {['Date','Challan #','Supplier','Qty In','Cost/Unit','Total Cost'].map((h,hi)=>(
                            <th key={hi} style={{padding:'5px 10px',textAlign:hi>=3?'right':'left',
                              fontWeight:700,color:'var(--txt3)',fontSize:11}}>{h}</th>
                          ))}
                        </tr></thead>
                        <tbody>
                          {(histData[p.id]||[]).map((h,hi)=>(
                            <tr key={hi} style={{borderBottom:'1px solid var(--card-b)'}}>
                              <td style={{padding:'6px 10px',fontWeight:600}}>{h.date}</td>
                              <td style={{padding:'6px 10px',fontFamily:'monospace',fontSize:11,color:'var(--txt2)'}}>
                                {h.challan||<span style={{color:'var(--txt3)',fontStyle:'italic'}}>—</span>}
                              </td>
                              <td style={{padding:'6px 10px'}}>{h.supplier||<span style={{color:'var(--txt3)',fontStyle:'italic'}}>—</span>}</td>
                              <td style={{padding:'6px 10px',textAlign:'right',fontWeight:800,color:'#16A34A',fontSize:13}}>+{h.qty}</td>
                              <td style={{padding:'6px 10px',textAlign:'right'}}>
                                {h.unitCost?<span style={{fontWeight:600}}>{inr(h.unitCost)}</span>
                                  :<span style={{color:'var(--txt3)',fontStyle:'italic',fontSize:11}}>—</span>}
                              </td>
                              <td style={{padding:'6px 10px',textAlign:'right',fontWeight:600}}>
                                {h.totalCost?inr(h.totalCost):'—'}
                              </td>
                            </tr>
                          ))}
                        </tbody>
                        {histData[p.id]&&histData[p.id].length>1&&(
                          <tfoot><tr style={{borderTop:'2px solid var(--card-b)',background:'var(--bg)'}}>
                            <td colSpan={3} style={{padding:'6px 10px',fontWeight:700,fontSize:11}}>TOTAL</td>
                            <td style={{padding:'6px 10px',textAlign:'right',fontWeight:900,color:'#16A34A',fontSize:13}}>
                              +{r2((histData[p.id]||[]).reduce((s,h)=>s+h.qty,0))}
                            </td>
                            <td style={{padding:'6px 10px',textAlign:'right',fontSize:11,color:'var(--txt2)'}}>
                              avg {(()=>{const tot=r2((histData[p.id]||[]).reduce((s,h)=>s+(h.totalCost||0),0));const qty=r2((histData[p.id]||[]).reduce((s,h)=>s+h.qty,0));return tot&&qty?inr(r2(tot/qty)):'—';})()}
                            </td>
                            <td style={{padding:'6px 10px',textAlign:'right',fontWeight:900,color:'var(--orange)'}}>
                              {r2((histData[p.id]||[]).reduce((s,h)=>s+(h.totalCost||0),0))>0?inr(r2((histData[p.id]||[]).reduce((s,h)=>s+(h.totalCost||0),0))):'—'}
                            </td>
                          </tr></tfoot>
                        )}
                      </table>
                    </div>
                  )
                )}
              </td>
            </tr>
          )}
            </React.Fragment>
          ))}
        </tbody>
      </table>
      {filtered.length>PAGE_SZ&&(<div className="pagination">
        <span className="pg-info">{filtered.length} products · Page {page}/{totalPages}</span>
        <div className="pg-btns">
          <button className="pg-btn" onClick={()=>setPage(1)} disabled={page===1}>«</button>
          <button className="pg-btn" onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={page===1}>‹</button>
          <span className="pg-count">{page}</span>
          <button className="pg-btn" onClick={()=>setPage(p=>Math.min(totalPages,p+1))} disabled={page===totalPages}>›</button>
          <button className="pg-btn" onClick={()=>setPage(totalPages)} disabled={page===totalPages}>»</button>
        </div>
      </div>)}
    </div>)}

    {/* ── BULK STOCK ENTRY MODAL ── */}
    {showBulkModal&&(
      <div className="overlay" onClick={()=>!siSaving&&setShowBulkModal(false)}>
        <div onClick={e=>e.stopPropagation()} style={{
          background:'var(--white)',borderRadius:18,width:'100%',maxWidth:760,
          maxHeight:'90vh',overflowY:'auto',padding:28,
          boxShadow:'0 40px 80px rgba(0,0,0,.3)',animation:'modalIn .2s cubic-bezier(.16,1,.3,1)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
            <div>
              <div style={{fontWeight:800,fontSize:17,color:'var(--txt)'}}>Bulk Stock Entry</div>
              <div style={{fontSize:12,color:'var(--txt3)',marginTop:2}}>Add stock for multiple products in one entry</div>
            </div>
            <button onClick={()=>setShowBulkModal(false)} style={{background:'none',border:'none',fontSize:22,cursor:'pointer',color:'var(--txt3)',lineHeight:1}}>&#215;</button>
          </div>
