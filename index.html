              onChange={e=>setAddForm(f=>({...f,product:e.target.value}))}/>
          </div>
          <div className="f-group"><label className="f-label">Unit</label>
            <select className="f-select" value={addForm.unit} onChange={e=>setAddForm(f=>({...f,unit:e.target.value}))}>

        <div className="f-row-3" style={{marginBottom:12}}>
          <div className="f-group"><label className="f-label">GST %</label>

              {[0,3,5,12,18,28].map(r=><option key={r} value={r}>{r}%</option>)}

          </div>
          <div className="f-group"><label className="f-label">MRP (₹)</label>
            <input className="f-input" type="number" value={addForm.mrp||''} onChange={e=>setAddForm(f=>({...f,mrp:e.target.value}))}/>
          </div>
          <div className="f-group"><label className="f-label">HSN Code</label>
            <input className="f-input" value={addForm.hsnCode||''} onChange={e=>setAddForm(f=>({...f,hsnCode:e.target.value}))}/>
          </div>
        </div>
        <div className="f-row" style={{marginBottom:16}}>
          <div className="f-group"><label className="f-label">Current Stock</label>
            <input className="f-input" type="number" value={addForm.currentStock||''} onChange={e=>setAddForm(f=>({...f,currentStock:e.target.value}))}/>
          </div>
          <div className="f-group"><label className="f-label">Floor Location</label>
            <input className="f-input" value={addForm.floorLocation||''} onChange={e=>setAddForm(f=>({...f,floorLocation:e.target.value}))}/>
          </div>
        </div>

        {/* STEP 3 — Generate Code */}
        <div className="section-divider">Step 3 — Fixed Code</div>
        <div style={{background:'var(--bg)',borderRadius:12,padding:'14px 16px',marginBottom:16}}>
          {!addForm.brand||!addForm.category
            ?<div style={{fontSize:13,color:'var(--txt3)',fontWeight:600}}>← Select Brand and Category above to generate code</div>
            :<div style={{display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
              <div>
                <div style={{fontSize:11,color:'var(--txt3)',fontWeight:600,marginBottom:4,textTransform:'uppercase'}}>Generated Code Preview</div>

              </div>
              <div style={{display:'flex',gap:8,alignItems:'center'}}>
                <button onClick={()=>{

                  setCodeGenerated(true);

                }}
                  style={{padding:'8px 18px',background:codeGenerated?'#F0FDF4':'var(--orange)',
                    color:codeGenerated?'#166534':'#fff',border:codeGenerated?'2px solid #BBF7D0':'none',
                    borderRadius:9,fontSize:13,fontWeight:800,cursor:'pointer'}}>

                {codeGenerated&&<button onClick={()=>{setCodeGenerated(false);setAddForm(f=>({...f,fixedCode:''}));}}

                  ↺ Regenerate

                <input value={addForm.fixedCode} onChange={e=>setAddForm(f=>({...f,fixedCode:e.target.value}))}

              </div>}

          <button className="btn-cancel" onClick={()=>{setShowAdd(false);setAddForm(BLANK);setCodeGenerated(false);}}>Cancel</button>

            disabled={saving||!codeGenerated||!addForm.brand||!addForm.category||!addForm.product}>
            {saving?'Adding…':'＋ Add to Master List'}
          </button>
        </div>
      </div>
    </div>)}
  </div>);
}

function validateGSTIN(g){return!g||/^[0-9]{2}[A-Z]{5}[0-9]{4}[A-Z]{1}[1-9A-Z]{1}Z[0-9A-Z]{1}$/.test(g.trim().toUpperCase());}

function PartiesScreen({role,compact,onAddParty}){
  const canEdit=role==='owner'||role==='billing';
  const[parties,setParties]=useState([]);
  const[loading,setLoading]=useState(true);
  const[search,setSearch]=useState('');
  const[fType,setFType]=useState('all');
  const[fStatus,setFStatus]=useState('active');
  const[showForm,setShowForm]=useState(false);
  const[editing,setEditing]=useState(null);
  const[saving,setSaving]=useState(false);
  const[formErr,setFormErr]=useState('');
  const BLANK={name:'',type:'customer',phone:'',address:'',gstin:'',creditLimit:'',notes:'',isActive:true};
  const[form,setForm]=useState(BLANK);

  useEffect(()=>{loadParties();},[]);
  const loadParties=async()=>{
    setLoading(true);
    try{
      const[pSnap,bSnap,paySnap,cnSnap]=await Promise.all([
        db.collection('parties').get(),
        db.collection('bills').get(),
        db.collection('payments').get(),
        db.collection('credit_notes').get(),
      ]);
      // Per-party: outstanding (what they owe) and credit balance (what we owe them)
      const billMap={};      // partyId → sum of balanceDue (outstanding)
      const billedMap={};    // partyId → sum of grandTotal (total invoiced)
      bSnap.docs.forEach(d=>{
        const b=d.data();
        if(b.status==='deleted'||b.status==='superseded'||b.type==='quotation'||b.partyId==='CASH')return;
        billedMap[b.partyId]=r2((billedMap[b.partyId]||0)+b.grandTotal);
        if(['unpaid','partial'].includes(b.paymentStatus))
          billMap[b.partyId]=r2((billMap[b.partyId]||0)+(b.balanceDue||0));
      });
      const paidMap={};      // partyId → sum of positive payments
      paySnap.docs.forEach(d=>{
        const p=d.data();
        if(p.deleted||p.partyId==='CASH'||p.amount<=0)return;
        paidMap[p.partyId]=r2((paidMap[p.partyId]||0)+p.amount);
      });
      const cnMap={};        // partyId → sum of CN credit amounts
      cnSnap.docs.forEach(d=>{
        const cn=d.data();
        if(!cn.partyId||cn.partyId==='CASH')return;
        cnMap[cn.partyId]=r2((cnMap[cn.partyId]||0)+(cn.creditAmount||0));
      });
      const ps=pSnap.docs.map(d=>{
        const pid=d.id;
        const billed=billedMap[pid]||0;
        const paid=paidMap[pid]||0;
        const cnCredit=cnMap[pid]||0;
        const netBal=r2(billed-paid-cnCredit);
        return{...d.data(),id:pid,
          computedOutstanding:r2(billMap[pid]||0),
          creditBalance:netBal<0?r2(Math.abs(netBal)):0,
          netBalance:netBal,
        };
      });
      ps.sort((a,b)=>a.name.localeCompare(b.name));
      setParties(ps);
    }catch(e){console.error(e);}
    setLoading(false);
  };
  const openAdd=()=>{setEditing(null);setForm(BLANK);setFormErr('');setShowForm(true);};
  const openEdit=p=>{setEditing(p);setForm({...BLANK,...p});setFormErr('');setShowForm(true);};
  const save=async()=>{
    if(!form.name.trim())return setFormErr('Name is required.');
    if(form.gstin&&!validateGSTIN(form.gstin.trim().toUpperCase()))return setFormErr('Invalid GSTIN — must be 15 chars e.g. 27AAAAA0000A1ZA');
    if(!editing){
      const dup=parties.find(p=>p.name.toLowerCase().trim()===form.name.toLowerCase().trim());
      if(dup)return setFormErr(`A party named "${dup.name}" already exists. Edit the existing party instead.`);
    }
    setSaving(true);setFormErr('');
    try{
      const data={
        name:form.name.trim(),
        type:form.type||'customer',
        phone:(form.phone||'').trim(),
        address:(form.address||'').trim(),
        gstin:(form.gstin||'').trim().toUpperCase(),
        creditLimit:form.creditLimit?parseFloat(form.creditLimit):null,
        notes:(form.notes||'').trim(),
        isActive:form.isActive!==false,
        outstandingBalance:editing?.outstandingBalance||0,
        updatedAt:new Date()
      };
      if(editing){
        await db.collection('parties').doc(editing.id).update(data);
        setParties(ps=>ps.map(p=>p.id===editing.id?{...p,...data}:p));
        window.__toast(`${data.name} updated`,'success');
      } else {
        data.createdAt=new Date();
        const ref=await db.collection('parties').add(data);
        const np={id:ref.id,...data};
        setParties(ps=>[...ps,np].sort((a,b)=>a.name.localeCompare(b.name)));
        if(onAddParty)onAddParty(np);
        window.__toast(`${data.name} added`,'success');
      }
      setShowForm(false);
    }catch(e){
      const msg=e.message||e.toString()||'Unknown error';
      setFormErr(msg);
      window.__toast('Party save failed: '+msg);
      console.error('Party save error:',e);
    }
    setSaving(false);
  };
  const toggleActive=async p=>{const val=!p.isActive;await db.collection('parties').doc(p.id).update({isActive:val,updatedAt:new Date()});setParties(ps=>ps.map(x=>x.id===p.id?{...x,isActive:val}:x));};
  const filtered=parties.filter(p=>{
    if(fType!=='all'&&p.type!==fType)return false;
    if(fStatus==='active'&&!p.isActive)return false;
    if(fStatus==='inactive'&&p.isActive)return false;
    return multiSearch(search,p,['name','phone','address','gstin','notes']);
  });
  const fp=k=>e=>setForm(v=>({...v,[k]:e.target.value}));
  const stats={total:parties.length,cust:parties.filter(p=>p.type==='customer'&&p.isActive).length,supp:parties.filter(p=>p.type==='supplier'&&p.isActive).length,gstin:parties.filter(p=>p.gstin&&p.isActive).length};
  if(loading)return<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'40vh',flexDirection:'column',gap:16}}><div className="loader-ring"/></div>;
  const formModal=(
    <div className="overlay" onClick={()=>!saving&&setShowForm(false)}>
      <div className="modal modal-lg" onClick={e=>e.stopPropagation()}>
        <div className="modal-head"><h3>{editing?'Edit Party':'Add Party'}</h3><button className="modal-x" onClick={()=>setShowForm(false)}>✕</button></div>
        {formErr&&<div style={{background:'#FEF2F2',border:'1.5px solid #FCA5A5',borderRadius:10,padding:'10px 14px',marginBottom:12,color:'#991B1B',fontWeight:700,fontSize:13}}>⚠ {formErr}</div>}
        <div className="f-row" style={{marginBottom:14}}>
          <div className="f-group"><label className="f-label">Name *</label><input className="f-input" value={form.name} onChange={fp('name')} autoFocus/></div>
          <div className="f-group"><label className="f-label">Type</label><select className="f-select" value={form.type} onChange={fp('type')}><option value="customer">Customer</option><option value="supplier">Supplier</option></select></div>
        </div>
        <div className="f-row" style={{marginBottom:14}}>
          <div className="f-group"><label className="f-label">Phone</label><input className="f-input" value={form.phone} onChange={fp('phone')}/></div>
          <div className="f-group"><label className="f-label">GSTIN <span style={{fontSize:10,color:'var(--txt3)',fontWeight:500}}>(B2B only)</span></label><input className="f-input" value={form.gstin} onChange={e=>setForm(v=>({...v,gstin:e.target.value.trim().toUpperCase()}))} placeholder="27AAAAA0000A1ZA" style={{fontFamily:'Courier New',textTransform:'uppercase'}}/></div>
        </div>
        <div className="f-group" style={{marginBottom:14}}><label className="f-label">Address</label><input className="f-input" value={form.address} onChange={fp('address')}/></div>
        <div className="f-row" style={{marginBottom:14}}>
          <div className="f-group"><label className="f-label">Credit Limit (₹)</label><input className="f-input" type="number" value={form.creditLimit} onChange={fp('creditLimit')} placeholder="0 = no credit"/></div>
          <div className="f-group"><label className="f-label">Notes</label><input className="f-input" value={form.notes} onChange={fp('notes')}/></div>
        </div>
        <div className="modal-foot" style={{justifyContent:'space-between'}}>
          {editing?<button className={`btn-sm ${form.isActive?'deact':'react'}`} onClick={()=>{toggleActive(editing);setShowForm(false);}}>{form.isActive?'Deactivate':'Reactivate'}</button>:<div/>}
          <div style={{display:'flex',gap:10}}><button className="btn-cancel" onClick={()=>setShowForm(false)}>Cancel</button><button className="btn-confirm" onClick={save} disabled={saving||!form.name.trim()}>{saving?'Saving…':editing?'Save Changes':'Add Party'}</button></div>
        </div>
      </div>
    </div>
  );
  if(compact)return(<div>{showForm&&formModal}{!showForm&&<button className="btn-add" onClick={openAdd}>＋ Add New Party</button>}</div>);
  return(<div>
    <div className="pm-stats" style={{marginBottom:16}}>
      <div className="pm-stat"><div className="psl">Total</div><div className="psv">{stats.total}</div></div>
      <div className="pm-stat"><div className="psl">Customers</div><div className="psv" style={{color:'#1D4ED8'}}>{stats.cust}</div></div>
      <div className="pm-stat"><div className="psl">Suppliers</div><div className="psv" style={{color:'#C2410C'}}>{stats.supp}</div></div>
      <div className="pm-stat"><div className="psl">With GSTIN</div><div className="psv">{stats.gstin}</div></div>
    </div>
    <div className="toolbar">
      <input className="tb-search" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search name, phone, GSTIN…"/>
      <select className="tb-select" value={fType} onChange={e=>setFType(e.target.value)}><option value="all">All Types</option><option value="customer">Customers</option><option value="supplier">Suppliers</option></select>
      <select className="tb-select" value={fStatus} onChange={e=>setFStatus(e.target.value)}><option value="active">Active</option><option value="inactive">Inactive</option><option value="all">All</option></select>
      <button className="tb-refresh" onClick={loadParties}>↻</button>
      {canEdit&&<button className="btn-add" onClick={openAdd}>＋ Add Party</button>}
    </div>
    <div style={{background:'#F0FDF4',border:'1px solid #BBF7D0',borderRadius:10,padding:'10px 14px',marginBottom:14,fontSize:12.5,color:'#166534',fontWeight:600}}>
      ℹ Walk-in retail bills use <strong>Cash Customer</strong>. Named parties here are for wholesale/credit accounts.
    </div>
    <div className="pt-wrap">
      <table className="pt-table">
        <thead><tr><th>Name</th><th>Type</th><th>Phone</th><th>GSTIN</th><th>Notes</th><th style={{textAlign:'right'}}>Credit Limit</th><th style={{textAlign:'right'}}>Outstanding</th>{canEdit&&<th style={{textAlign:'center'}}>Edit</th>}</tr></thead>
        <tbody>
          {filtered.length===0?<tr><td colSpan={canEdit?8:7}><div className="no-results"><div className="nr-icon">👥</div><p>No parties found.</p></div></td></tr>
          :filtered.map(p=>(<tr key={p.id} className={!p.isActive?'inactive-row':''}>
            <td><div style={{fontWeight:700,fontSize:13}}>{p.name}</div>{p.address&&<div style={{fontSize:11,color:'var(--txt3)',marginTop:1}}>{p.address}</div>}</td>
            <td><span className={`party-type-pill ${p.type}`}>{p.type}</span></td>
            <td style={{fontSize:12.5,color:'var(--txt2)'}}>{p.phone||'—'}</td>
            <td>{p.gstin?<span className="gstin-mono">{p.gstin}</span>:'—'}</td>
            <td style={{fontSize:12,color:'var(--txt3)',maxWidth:140,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.notes||'—'}</td>
            <td style={{textAlign:'right'}}>{p.creditLimit?<span className="credit-chip">₹{p.creditLimit.toLocaleString('en-IN')}</span>:'—'}</td>
            <td style={{textAlign:'right'}}>{p.creditBalance>0
  ?<span className="bal-chip" style={{background:'#DCFCE7',color:'#166534',border:'1px solid #BBF7D0'}}>Adv ₹{p.creditBalance.toLocaleString('en-IN')}</span>
  :p.computedOutstanding>0
    ?<span className="bal-chip owing">₹{p.computedOutstanding.toLocaleString('en-IN')}</span>
    :<span className="bal-chip clear">₹0</span>}</td>
            {canEdit&&<td style={{textAlign:'center'}}><button className="btn-edit" onClick={()=>openEdit(p)}>Edit</button></td>}
          </tr>))}
        </tbody>
      </table>
    </div>
    {showForm&&formModal}
  </div>);
}

/* NEW BILL */
function NewBillScreen({role,prefill,onBack}){
  const today=new Date().toISOString().slice(0,10);
  const BLANK={productId:'',productName:'',hsnCode:'',unit:'Nos',gstRate:0,qty:1,unitPrice:0,discountPct:0};
  // ── Draft persistence ────────────────────────────────────────────
  const DRAFT_KEY='prakash_billing_draft';
  const _draft=(()=>{try{
    const d=JSON.parse(localStorage.getItem('prakash_billing_draft')||'null');
    // Only restore if draft is less than 24 hours old and not a prefill
    if(!prefill&&d&&d.savedAt>Date.now()-86400000&&d.items&&d.items.some(i=>i.productId))return d;
    return null;
  }catch{return null;}})();

  const[bType,setBType]=useState(prefill?.type||_draft?.bType||'retail_invoice');
  const[party,setParty]=useState(prefill?.party||_draft?.party||{id:'CASH',name:'Cash Customer',gstin:'',address:''});
  const[date,setDate]=useState(prefill?.date||_draft?.date||today);
  const[billGst,setBillGst]=useState(_draft?.billGst??18); // single GST rate for whole bill
  const[items,setItems]=useState(prefill?.items||_draft?.items||[{...BLANK}]);
  const[notes,setNotes]=useState(prefill?.notes||_draft?.notes||'');
  const[parties,setParties]=useState([]);
  const[products,setProducts]=useState([]);
  const[saving,setSaving]=useState(false);
  const[saved,setSaved]=useState(null);
  const[pSearch,setPSearch]=useState('');
  const[srIdx,setSrIdx]=useState(null);
  const[showAddParty,setShowAddParty]=useState(false);
  const[showGstin,setShowGstin]=useState(false);
  const[splitPay,setSplitPay]=useState(()=>{
    // When editing, pre-fill with original payments
    if(prefill?.originalPaymentModes?.length>0)return prefill.originalPaymentModes.map(p=>({mode:p.mode,amount:String(p.amount)}));
    if(prefill?.originalAmountPaid>0)return [{mode:'cash',amount:String(prefill.originalAmountPaid)}];
    return [{mode:'cash',amount:''}];
  });
  const[ddPos,setDdPos]=useState({top:0,left:0,width:300});

  // ── Auto-save cart to localStorage ────────────────────────────
  useEffect(()=>{
    if(saving||saved)return;
    if(!items.some(i=>i.productId))return; // don't save empty cart
    try{localStorage.setItem(DRAFT_KEY,JSON.stringify({bType,party,date,items,notes,billGst,savedAt:Date.now()}));}catch{}
  },[bType,party,date,items,notes]);

  useEffect(()=>{
    db.collection('parties').get({source:'server'}).then(s=>{
      const ps=s.docs.map(d=>({...d.data(),id:d.id})).sort((a,b)=>a.name.localeCompare(b.name));
      setParties([{id:'CASH',name:'Cash Customer',gstin:'',address:''},...ps]);
    });
    getProds().then(setProducts).catch(e=>{console.error('Products load:',e);window.__toast('Failed to load products. Check your connection.','warn');});
  },[]);

  const inter=isInterState(party.gstin);
  const gstExcl=true; // Always tax-exclusive: GST added on top of entered price
  const isRealBill=bType==='retail_invoice'||bType==='tax_invoice'||bType==='quotations_bill';
  const filled=items.filter(i=>i.productId&&parseFloat(i.qty)>0);
  const totals=calcTotals(filled,gstExcl,inter);
  const setItem=(i,k,v)=>setItems(a=>a.map((x,j)=>j===i?{...x,[k]:v}:x));
  const addItem=()=>setItems(a=>[...a,{...BLANK}]);
  const delItem=i=>setItems(a=>a.filter((_,j)=>j!==i));
  const pickProd=(idx,p)=>{setItems(a=>a.map((x,j)=>j===idx?{...x,productId:p.id,productName:p.fullSkuName,hsnCode:p.hsnCode||'',unit:p.unit||'Nos',gstRate:billGst,unitPrice:p.mrp?(billGst>0?r2(p.mrp/(1+(billGst||0)/100)):p.mrp):0}:x));setSrIdx(null);setPSearch('');};
  const handleFocus=(idx,e)=>{setSrIdx(idx);const r=e.target.getBoundingClientRect();setDdPos({top:r.bottom,left:r.left,width:Math.max(r.width,300)});};
  const matches=pSearch.trim()?products.filter(p=>multiSearch(pSearch,p,PSRCH)).slice(0,8):[];

  const save=async(print=false)=>{
    if(!filled.length)return window.__toast('Add at least one product.','warn');
    setSaving(true); // ← set immediately so button disables before any async work
    // Credit limit check
    // Credit limit check
    if(party.id!=='CASH'&&party.creditLimit){
      // Calculate actual credit: total minus what's actually paid in cash/upi/bank/cheque
      const actualPaid=r2(splitPay.filter(p=>p.mode!=='credit').reduce((s,p)=>s+(parseFloat(p.amount)||0),0));
      const creditAmount=r2(totals.grandTotal-actualPaid); // implicit credit even if mode not set to 'credit'
      if(creditAmount>0){
        const existSnap=await db.collection('bills').where('partyId','==',party.id).get();
        const existDue=existSnap.docs
          .filter(d=>d.data().status!=='deleted'&&['unpaid','partial'].includes(d.data().paymentStatus))
          .reduce((s,d)=>s+(d.data().balanceDue||0),0);
        const wouldBe=r2(existDue+creditAmount);
        if(wouldBe>party.creditLimit){
          window.__toast(`⚠ Credit limit: ${party.name} — Limit ${inr(party.creditLimit)}, would reach ${inr(wouldBe)}`,'warn');
          const ok=window.confirm(`${party.name}'s credit limit is ${inr(party.creditLimit)}.

Current outstanding: ${inr(existDue)}
This bill on credit: ${inr(creditAmount)}
Total would be: ${inr(wouldBe)}

Proceed anyway?`);
          if(!ok){setSaving(false);return;}
        }
      }
    }
    // setSaving already set at top of save()
    try{
      const invType=bType==='quotation'?'quotation':bType==='quotations_bill'?'quotations_bill':'tax_invoice';
      const invNum=await generateInvNumber(invType);
      const billNum=prefill?.editSuffix?`${prefill.originalNumber}-${prefill.editSuffix}`:invNum;
      const lineData=filled.map(item=>({...item,...calcLine(item,gstExcl,inter)}));
      const billData={
        billNumber:billNum,type:bType,status:'saved',
        paymentStatus:(()=>{const _tp=splitPay.reduce((s,p)=>s+(parseFloat(p.amount)||0),0);return Math.max(0,r2(totals.grandTotal-_tp))<=0?'paid':_tp>0?'partial':'unpaid';})(),
        amountPaid:r2(splitPay.reduce((s,p)=>s+(parseFloat(p.amount)||0),0)),
        balanceDue:r2(Math.max(0,totals.grandTotal-splitPay.reduce((s,p)=>s+(parseFloat(p.amount)||0),0))),
        paymentModes:splitPay.filter(p=>parseFloat(p.amount)>0).map(p=>({mode:p.mode,amount:r2(parseFloat(p.amount))})),
        showGstin:showGstin,
        partyId:party.id,partyName:party.name,partyGstin:party.gstin||'',partyAddress:party.address||'',
        date,items:lineData,notes,
        subtotal:r2(totals.subtotal),totalDiscount:r2(totals.discount),totalTaxable:r2(totals.taxable),
        cgst:r2(totals.cgst),sgst:r2(totals.sgst),igst:r2(totals.igst),
        grandTotal:r2(totals.grandTotal),
        createdAt:new Date(),updatedAt:new Date(),
        ...(prefill?.editOf?{editOf:prefill.editOf,editOfNumber:prefill.editOfNumber}:{})
      };
      // ── Stock check BEFORE creating bill ──────────────
      if(bType!=='quotation'){
        const stockChecks=await Promise.all(
          lineData.filter(item=>item.productId).map(async item=>{
            const doc=await db.collection('products').doc(item.productId).get();
            const current=doc.exists?(doc.data().currentStock||0):0;
            return{...item,currentStock:current};
          })
        );
        const stockError=stockChecks.find(item=>item.currentStock<(parseFloat(item.qty)||0));
        if(stockError){
          window.__toast(`Insufficient stock for "${stockError.productName}" — available: ${stockError.currentStock}, requested: ${stockError.qty}`,'warn');
          setSaving(false);
          return; // Stop here — bill NOT created
        }
      }

      // ── Stock ok — now create the bill ───────────────
      const ref=await db.collection('bills').add(billData);
      if(bType!=='quotation'){
        const batch=db.batch();
        lineData.forEach(item=>{if(item.productId)batch.update(db.collection('products').doc(item.productId),{currentStock:firebase.firestore.FieldValue.increment(-(parseFloat(item.qty)||0))});});
        // Only track outstanding if on credit
        const _creditBal=r2(Math.max(0,totals.grandTotal-splitPay.reduce((s,p)=>s+(parseFloat(p.amount)||0),0)));
        if(party.id!=='CASH'&&_creditBal>0)batch.update(db.collection('parties').doc(party.id),{outstandingBalance:firebase.firestore.FieldValue.increment(_creditBal)});
        await batch.commit();_prodsCache=null;
      }
      // Save payment record for immediate payments
      const _paidRows=splitPay.filter(p=>parseFloat(p.amount)>0&&p.mode!=='credit');
      for(const pr of _paidRows){
        await db.collection('payments').add({billId:ref.id,partyId:party.id,partyName:party.name,
          amount:r2(parseFloat(pr.amount)),mode:pr.mode,date,ref:'',notes:'Paid at billing',createdAt:new Date()});
      }
      if(prefill?.editOf){
        // Restore stock for original bill's items before superseding
        const origSnap=await db.collection('bills').doc(prefill.editOf).get();
        if(origSnap.exists){
          const origData=origSnap.data();
          if(origData.type!=='quotation'){
            const restoreBatch=db.batch();
            (origData.items||[]).filter(i=>i.productId).forEach(item=>{
              restoreBatch.update(db.collection('products').doc(item.productId),
                {currentStock:firebase.firestore.FieldValue.increment(parseFloat(item.qty)||0)});
            });
            await restoreBatch.commit();
          }
        }
        await db.collection('bills').doc(prefill.editOf).update({status:'superseded',supersededBy:ref.id,supersededAt:new Date()});
      }
      audit('BILL_CREATED',{billId:ref.id,billNumber:billNum,total:totals.grandTotal});
      // Real-time Sheets logging
      try{
        const webhook=await getWebhook();
        if(webhook){
          logToSheets(webhook,'Bills',{
            Date:billData.date,BillNumber:billNum,Party:billData.partyName,
            GSTIN:billData.partyGstin,Type:billData.type,
            Subtotal:billData.subtotal,CGST:billData.cgst,SGST:billData.sgst,
            GrandTotal:billData.grandTotal,AmountPaid:billData.amountPaid,
            BalanceDue:billData.balanceDue,Status:billData.paymentStatus,
            PaymentModes:(billData.paymentModes||[]).map(p=>`${p.mode}:${p.amount}`).join('+'),
            Items:(lineData||[]).map(i=>`${i.productName}(${i.qty})`).join('; '),
            Notes:billData.notes||''
          });
        }
      }catch{}
      const fullBill={id:ref.id,...billData};setSaved(fullBill);
      if(print){const coSnap=await db.collection('settings').doc('company').get();printBill(fullBill,{...COMPANY,...(coSnap.exists?coSnap.data():{})});}
    }catch(e){console.error(e);window.__toast('Error: '+e.message);}
    setSaving(false);
  };

  if(saved)return(<div>
    <div style={{background:'#F0FDF4',border:'1px solid #BBF7D0',borderRadius:12,padding:'16px 20px',marginBottom:20,display:'flex',alignItems:'center',gap:12}}>
      <span style={{fontSize:22}}>✓</span>
      <div style={{flex:1}}><div style={{fontWeight:800,color:'#166534',fontSize:15}}>{saved.billNumber} — Saved</div>
      <div style={{fontSize:12.5,color:'#166534',marginTop:2}}>{inr(saved.grandTotal)} · {saved.partyName}</div></div>
      <button className="btn-cancel" onClick={async()=>{const[cs,ps2]=await Promise.all([db.collection('settings').doc('company').get(),db.collection('settings').doc('print').get()]);printBill(saved,{...COMPANY,...(cs.exists?cs.data():{})},{...(ps2.exists?ps2.data():{})});}}>🖨 Print</button>
      {onBack&&<button className="btn-cancel" onClick={onBack}>← Back</button>}
      <button className="btn-confirm" onClick={()=>{setSaved(null);setItems([{...BLANK}]);setNotes('');}}>＋ New Bill</button>
    </div>
  </div>);

  return(<div>
    {onBack&&<button className="tb-btn" style={{marginBottom:14}} onClick={onBack}>← Back</button>}
    {prefill?.editOf&&prefill?.originalAmountPaid>0&&(
      <div style={{background:'#EFF6FF',border:'1px solid #BFDBFE',borderRadius:10,padding:'10px 16px',marginBottom:12,fontSize:12.5,color:'#1E40AF',fontWeight:600}}>
        ✓ Original bill had <b>{inr(prefill.originalAmountPaid)}</b> already paid — carried forward to this edited bill.
      </div>
    )}
    <div className="bill-header-card">
      <div className="bill-header-row">
        <div className="bh-group"><label className="f-label">Bill Type</label>
          <select className="f-select" value={bType} onChange={e=>setBType(e.target.value)}>
            <option value="retail_invoice">Retail Invoice (B2C)</option>
            <option value="tax_invoice">Tax Invoice (B2B)</option>
            <option value="quotation">Quotation</option>
          <option value="quotations_bill">Quotations (Bill)</option>
          </select>
        </div>
        <div className="bh-group wide">
          <label className="f-label">Party <button style={{fontSize:11,color:'var(--orange)',background:'none',border:'none',cursor:'pointer',fontWeight:700,marginLeft:6}} onClick={()=>setShowAddParty(true)}>＋ New Party</button></label>
          <select className="f-select" value={party.id} onChange={e=>{const p=parties.find(x=>x.id===e.target.value);if(p)setParty(p);}}>
            {parties.map(p=><option key={p.id} value={p.id}>{p.name}{p.gstin?` (${p.gstin})`:''}{p.outstandingBalance>0?` — ${(p.creditBalance||0)>0?'Adv':'Bal'}:₹${(p.creditBalance||0)>0?(p.creditBalance||0):(p.computedOutstanding||p.outstandingBalance||0)}`:''}</option>)}
          </select>
        </div>
        <div className="bh-group"><label className="f-label">Date</label><input className="f-input" type="date" value={date} onChange={e=>setDate(e.target.value)}/></div>
        <div className="bh-group">
          <label className="f-label">GST Rate</label>
          <div style={{display:'flex',gap:6,alignItems:'center'}}>
            <select className="f-select" style={{width:90}} value={billGst}
              onChange={e=>setBillGst(parseFloat(e.target.value))}>
              {[0,5,12,18,28].map(r=><option key={r} value={r}>{r}%</option>)}
            </select>
            <button type="button" onClick={()=>setItems(a=>a.map(x=>({...x,gstRate:billGst})))}
              style={{padding:'8px 12px',background:'var(--orange)',color:'#fff',
                border:'none',borderRadius:8,fontSize:12,fontWeight:700,
                cursor:'pointer',whiteSpace:'nowrap'}}>
              Apply to All
            </button>
          </div>
        </div>
        <div className="bh-group"><label className="f-label">Invoice #</label>
          <div style={{fontFamily:'Courier New',fontSize:11,fontWeight:800,color:'#C2410C',background:'#FFF7ED',padding:'9px 10px',borderRadius:9,border:'1.5px solid #FED7AA',whiteSpace:'nowrap'}}>Auto on save</div>
        </div>
      </div>
      {party.gstin&&<div style={{marginTop:8,fontSize:11.5,color:'var(--txt3)',fontWeight:600}}>GSTIN: <span className="gstin-mono">{party.gstin}</span> · {inter?'Inter-state → IGST':'Intra-state → CGST+SGST'} · {gstExcl?'Exclusive':'Inclusive'}</div>}
    </div>
    <div className="pt-wrap" style={{marginBottom:16}}>
      <table className="pt-table">
        <thead><tr><th style={{width:'38%'}}>Product</th><th style={{textAlign:'center',width:'9%'}}>Qty</th><th style={{textAlign:'right',width:'14%'}}>Price</th><th style={{textAlign:'center',width:'9%'}}>Disc%</th><th style={{textAlign:'right',width:'15%'}}>Taxable Amount</th><th style={{width:'4%'}}></th></tr></thead>
        <tbody>
          {items.map((item,idx)=>{
            const lc=item.productId?calcLine(item,gstExcl,inter):null;
            return(<tr key={idx}>
              <td style={{position:'relative'}}>
                {item.productId
                  ?<div><div style={{fontSize:12.5,fontWeight:700}}>{item.productName}</div><div style={{fontSize:11,color:'var(--txt3)'}}>{item.hsnCode?`HSN:${item.hsnCode} · `:''}{item.unit}</div><button style={{fontSize:10,color:'var(--orange)',background:'none',border:'none',cursor:'pointer',padding:0}} onClick={()=>setItem(idx,'productId','')}>× change</button></div>
                  :<div><input className="f-input" style={{fontSize:12.5}} value={srIdx===idx?pSearch:''} placeholder="Type to search…" onChange={e=>{setPSearch(e.target.value);setSrIdx(idx);}} onFocus={e=>handleFocus(idx,e)} onBlur={()=>setTimeout(()=>setSrIdx(null),200)}/>
                    {srIdx===idx&&matches.length>0&&ReactDOM.createPortal(
                      <div className="prod-dropdown" style={{top:ddPos.top,left:ddPos.left,width:ddPos.width}}>
                        {matches.map(p=><div key={p.id} className="prod-option" onMouseDown={e=>{e.preventDefault();pickProd(idx,p);}}>
                          <div style={{fontWeight:700,fontSize:12}}>{p.fullSkuName}</div>
                          <div style={{fontSize:11,color:'var(--txt3)'}}>{p.fixedCode} · Stock:{p.currentStock||0}{p.mrp?` · ₹${p.mrp}`:''}</div>
                        </div>)}
                      </div>,document.body
                    )}
                  </div>
                }
              </td>
              <td><input className="bill-num-input" type="number" min="1" value={item.qty} onChange={e=>setItem(idx,'qty',e.target.value)}/></td>
              <td><input className="bill-num-input" type="number" min="0" step="0.01" value={item.unitPrice} style={{textAlign:'right'}} onChange={e=>setItem(idx,'unitPrice',e.target.value)}/></td>
              <td><input className="bill-num-input" type="number" min="0" max="100" value={item.discountPct} onChange={e=>setItem(idx,'discountPct',e.target.value)}/></td>
              <td style={{textAlign:'right',fontWeight:800,fontSize:13}}>{lc?inr(lc.taxable):'—'}</td>
              <td>{items.length>1&&<button className="del-row" onClick={()=>delItem(idx)}>✕</button>}</td>
            </tr>);
          })}
        </tbody>
      </table>
      <div style={{padding:'10px 16px',borderTop:'1px solid var(--card-b)'}}><button className="tb-refresh" onClick={addItem}>＋ Add Row</button></div>
    </div>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',background:'var(--white)',border:'1px solid var(--card-b)',borderRadius:10,padding:'12px 16px',marginBottom:12,boxShadow:'var(--shadow)'}}>
      <div>
        <div style={{fontWeight:700,fontSize:13,color:'var(--txt)'}}>GSTIN Info on Invoice</div>
        <div style={{fontSize:11.5,color:'var(--txt3)',marginTop:2}}>Show company GSTIN on printed bill (turn OFF for quotations)</div>
      </div>
      <button className={`toggle-btn ${showGstin?'on':'off'}`} onClick={()=>setShowGstin(g=>!g)}/>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr auto',gap:16,marginBottom:16,alignItems:'start'}}>
      <div><label className="f-label" style={{display:'block',marginBottom:6}}>Notes</label>
        <textarea className="f-input" rows={3} value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Remarks…" style={{resize:'vertical'}}/>
      </div>
      <div className="bill-totals-box">
        <div className="bt-row"><span>Subtotal</span><span>{inr(totals.subtotal)}</span></div>
        {totals.discount>0&&<div className="bt-row" style={{color:'var(--green)'}}><span>Discount</span><span>- {inr(totals.discount)}</span></div>}
        <div className="bt-row"><span>Taxable</span><span>{inr(totals.taxable)}</span></div>
        {!inter&&totals.cgst>0&&<><div className="bt-row sub"><span>CGST</span><span>{inr(totals.cgst)}</span></div><div className="bt-row sub"><span>SGST</span><span>{inr(totals.sgst)}</span></div></>}
        {inter&&totals.igst>0&&<div className="bt-row sub"><span>IGST</span><span>{inr(totals.igst)}</span></div>}
        <div className="bt-row grand"><span>Grand Total</span><span>{inr(totals.grandTotal)}</span></div>
      </div>
    </div>
    {(()=>{
      const MODES=['cash','upi','bank','cheque']; // credit removed — outstanding handled via bill balance
      const totalPaid=splitPay.reduce((s,p)=>s+(parseFloat(p.amount)||0),0);
      const creditAmt=Math.max(0,r2(totals.grandTotal-totalPaid));
      const payStatus=creditAmt<=0?'paid':totalPaid>0?'partial':'unpaid';
      const addRow=()=>setSplitPay(sp=>[...sp,{mode:'cash',amount:''}]);
      const delRow=i=>setSplitPay(sp=>sp.filter((_,j)=>j!==i));
      const setMode=(i,m)=>setSplitPay(sp=>sp.map((p,j)=>j===i?{...p,mode:m}:p));
      const setAmt=(i,v)=>setSplitPay(sp=>sp.map((p,j)=>j===i?{...p,amount:v}:p));
      const fillRem=i=>{
        const others=splitPay.reduce((s,p,j)=>j!==i?s+(parseFloat(p.amount)||0):s,0);
        const rem=Math.max(0,r2(totals.grandTotal-others));
        setSplitPay(sp=>sp.map((p,j)=>j===i?{...p,amount:String(rem)}:p));
      };
      return(
        <div style={{background:'var(--white)',border:'1px solid var(--card-b)',borderRadius:12,padding:'14px 18px',marginBottom:12,boxShadow:'var(--shadow)'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
            <div style={{fontWeight:800,fontSize:13,color:'var(--txt)'}}>Payment at Billing</div>
            <button className="tb-refresh" onClick={addRow} style={{fontSize:12,fontWeight:700}}>＋ Split Payment</button>
          </div>
          {splitPay.map((p,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
              <select value={p.mode} onChange={e=>setMode(i,e.target.value)}
                style={{padding:'7px 10px',border:'1.5px solid var(--card-b)',borderRadius:9,fontFamily:'inherit',fontSize:12.5,fontWeight:700,color:'var(--txt)',background:'var(--white)',outline:'none',cursor:'pointer',minWidth:90}}>
                {MODES.map(m=><option key={m} value={m}>{m.toUpperCase()}</option>)}
              </select>
              <div style={{display:'flex',flex:1,alignItems:'center',border:'1.5px solid var(--card-b)',borderRadius:9,overflow:'hidden',background:'var(--white)'}}>
                <span style={{padding:'0 10px',fontSize:13,fontWeight:700,color:'var(--txt3)',borderRight:'1px solid var(--card-b)'}}>₹</span>
                <input type="number" min="0" step="0.01" placeholder="0.00"
                  value={p.amount} onChange={e=>setAmt(i,e.target.value)}
                  style={{flex:1,border:'none',outline:'none',padding:'7px 10px',fontSize:13,fontWeight:700,fontFamily:'inherit',color:'var(--txt)',background:'transparent'}}/>
                <button onClick={()=>fillRem(i)}
                  style={{padding:'4px 10px',fontSize:11,fontWeight:700,color:'var(--orange)',background:'none',border:'none',borderLeft:'1px solid var(--card-b)',cursor:'pointer',whiteSpace:'nowrap'}}>
                  Fill ₹{r2(Math.max(0,totals.grandTotal-splitPay.reduce((s,pp,j)=>j!==i?s+(parseFloat(pp.amount)||0):s,0)))}
                </button>
              </div>
              {splitPay.length>1&&<button onClick={()=>delRow(i)} style={{color:'var(--red)',background:'none',border:'none',fontSize:18,cursor:'pointer',padding:'0 4px'}}>✕</button>}
            </div>
          ))}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:10,paddingTop:10,borderTop:'1px solid var(--card-b)'}}>
            <div style={{display:'flex',gap:16,fontSize:12.5,fontWeight:700}}>
              <span>Bill Total: <b>{inr(totals.grandTotal)}</b></span>
              {totalPaid>0&&<span style={{color:'var(--green)'}}>Paid Now: <b>{inr(totalPaid)}</b></span>}
              {creditAmt>0&&<span style={{color:'#1D4ED8'}}>On Credit: <b>{inr(creditAmt)}</b></span>}
            </div>
            <span style={{padding:'3px 10px',borderRadius:20,fontSize:11,fontWeight:800,
              background:payStatus==='paid'?'#DCFCE7':payStatus==='partial'?'#FEF3C7':'#EFF6FF',
              color:payStatus==='paid'?'#166534':payStatus==='partial'?'#92400E':'#1D4ED8'}}>
              {payStatus==='paid'?'✓ FULLY PAID':payStatus==='partial'?'⚡ PARTIAL — CREDIT BALANCE':'📋 FULL CREDIT'}
            </span>
          </div>
        </div>
      );
    })()}
    <div style={{display:'flex',justifyContent:'flex-end',gap:12}}>
      <button onClick={()=>{
        if(!items.some(i=>i.productId)||window.confirm('Clear cart and start a fresh bill?')){
          try{localStorage.removeItem(DRAFT_KEY);}catch{}
          setBType('retail_invoice');
          setParty({id:'CASH',name:'Cash Customer',gstin:'',address:''});
          setDate(today);
          setItems([{...BLANK}]);
          setNotes('');
          setSplitPay([{mode:'CASH',amount:''}]);
        }
      }} style={{padding:'9px 18px',background:'var(--bg)',border:'1px solid var(--card-b)',
        borderRadius:9,fontSize:13,fontWeight:600,cursor:'pointer',color:'var(--txt3)',
        marginRight:'auto'}}>
        🗑 Clear Cart
      </button>
      <button className="btn-cancel" onClick={()=>save(false)} disabled={saving}>{saving?'Saving…':'Save'}</button>
      <button className="btn-confirm" onClick={()=>save(true)} disabled={saving}>{saving?'Saving…':'🖨 Save & Print'}</button>
    </div>
    {showAddParty&&(<div className="overlay" onClick={()=>setShowAddParty(false)}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-head"><h3>Add New Party</h3><button className="modal-x" onClick={()=>setShowAddParty(false)}>✕</button></div>
        <PartiesScreen role={role} compact={true} onAddParty={p=>{setParties(ps=>[...ps,p].sort((a,b)=>a.name.localeCompare(b.name)));setParty(p);setShowAddParty(false);}}/>
      </div>
    </div>)}
  </div>);
}

/* BILLS LIST */
function BillsListScreen({filterType,role,setScreen,setPrefill}){
  const[bills,setBills]=useState([]);
  const[loading,setLoading]=useState(true);
  const[search,setSearch]=useState('');
  const[dateFrom,setDateFrom]=useState('');
  const[dateTo,setDateTo]=useState('');
  const[filterBillType,setFilterBillType]=useState('');
  const[view,setView]=useState(null);
  const[coInfo,setCoInfo]=useState(COMPANY);
  const[selected,setSelected]=useState(new Set());
  const[deleting,setDeleting]=useState(false);
  const[confirmDelete,setConfirmDelete]=useState(false);
  const[binMode,setBinMode]=useState(false);
  const[binBills,setBinBills]=useState([]);
  const[binLoading,setBinLoading]=useState(false);
  const[restoring,setRestoring]=useState(null); // billId being restored

  const load=()=>{
    setLoading(true);setSelected(new Set());
    db.collection('bills').orderBy('createdAt','desc').limit(300).get()
      .then(s=>{setBills(s.docs.map(d=>({...d.data(),id:d.id})));setLoading(false);})
      .catch(e=>{window.__toast('Failed to load bills: '+e.message);setLoading(false);});
  };

  const loadBin=()=>{
    setBinLoading(true);
    db.collection('bills').where('status','==','deleted').orderBy('deletedAt','desc').limit(200).get()
      .then(s=>{setBinBills(s.docs.map(d=>({...d.data(),id:d.id})));setBinLoading(false);})
      .catch(()=>{
        // deletedAt index may not exist — fall back to client filter
        db.collection('bills').orderBy('createdAt','desc').limit(300).get()
          .then(s=>{setBinBills(s.docs.map(d=>({...d.data(),id:d.id})).filter(b=>b.status==='deleted'));setBinLoading(false);})
          .catch(e=>{window.__toast('Bin load failed: '+e.message);setBinLoading(false);});
      });
  };

  const restoreBill=async(bill)=>{
    setRestoring(bill.id);
    try{
      const paySnap=await db.collection('payments').where('billId','==',bill.id).get();
      const batch=db.batch();
      // Restore bill status
      batch.update(db.collection('bills').doc(bill.id),{
        status:'saved',deletedAt:null,updatedAt:new Date()
      });
      // Restore payments
      paySnap.docs.forEach(pd=>batch.update(pd.ref,{deleted:false,deletedAt:null}));
      // Re-decrement stock
      if(bill.type!=='quotation'){
        (bill.items||[]).filter(i=>i.productId).forEach(item=>{
          batch.update(db.collection('products').doc(item.productId),
            {currentStock:firebase.firestore.FieldValue.increment(-(parseFloat(item.qty)||0))});
        });
        if(bill.partyId&&bill.partyId!=='CASH'&&bill.balanceDue>0){
          batch.update(db.collection('parties').doc(bill.partyId),
            {outstandingBalance:firebase.firestore.FieldValue.increment(bill.balanceDue)});
        }
      }
      await batch.commit();
      getWebhook().then(wh=>{if(wh)logToSheets(wh,'Bills',{Date:new Date().toISOString().slice(0,10),BillNumber:bill.billNumber,Party:bill.partyName,Status:'RESTORED',Notes:'Restored from bin'});});
      setBinBills(b=>b.filter(x=>x.id!==bill.id));
      window.__toast(`${bill.billNumber} restored`,'success');
    }catch(e){window.__toast('Restore failed: '+e.message);}
    setRestoring(null);
  };

  const permanentDelete=async(bill)=>{
    if(!window.confirm(`Permanently delete ${bill.billNumber}? This cannot be undone.`))return;
    try{
      const paySnap=await db.collection('payments').where('billId','==',bill.id).get();
      const batch=db.batch();
      batch.delete(db.collection('bills').doc(bill.id));
      paySnap.docs.forEach(pd=>batch.delete(pd.ref));
      await batch.commit();
      getWebhook().then(wh=>{if(wh)logToSheets(wh,'Bills',{Date:new Date().toISOString().slice(0,10),BillNumber:bill.billNumber,Party:bill.partyName,Status:'DELETED-PERMANENT',Notes:'Permanently deleted'});});
      setBinBills(b=>b.filter(x=>x.id!==bill.id));
      window.__toast(`${bill.billNumber} permanently deleted`,'success');
    }catch(e){window.__toast('Delete failed: '+e.message);}
  };

  const emptyBin=async()=>{
    if(binBills.length===0)return;
    if(!window.confirm(`Permanently delete all ${binBills.length} bills in Bin? Cannot be undone.`))return;
    try{
      for(const bill of binBills){
        const paySnap=await db.collection('payments').where('billId','==',bill.id).get();
        const batch=db.batch();
        batch.delete(db.collection('bills').doc(bill.id));
        paySnap.docs.forEach(pd=>batch.delete(pd.ref));
        await batch.commit();
      }
      setBinBills([]);
      window.__toast('Bin emptied','success');
    }catch(e){window.__toast('Empty bin failed: '+e.message);}
  };
  useEffect(()=>{
    load();
    db.collection('settings').doc('company').get().then(s=>{if(s.exists)setCoInfo(p=>({...p,...s.data()}));});
  },[]);
  useEffect(()=>{if(binMode)loadBin();},[binMode]);

  const filtered=bills
    .filter(b=>filterType==='quotation'?b.type==='quotation':(b.type!=='quotation'&&b.status!=='superseded'))
    .filter(b=>multiSearch(search,b,['billNumber','partyName','partyGstin','notes']));

  // Selection helpers
  const toggleOne=id=>setSelected(s=>{const n=new Set(s);n.has(id)?n.delete(id):n.add(id);return n;});
  const toggleAll=()=>setSelected(s=>s.size===filtered.length?new Set():new Set(filtered.map(b=>b.id)));
  const allSelected=filtered.length>0&&selected.size===filtered.length;
  const someSelected=selected.size>0&&!allSelected;

  const deleteBills=async()=>{
    if(selected.size===0)return;
    setDeleting(true);
    try{
      const toDelete=bills.filter(b=>selected.has(b.id));
      const paymentSnaps=await Promise.all(
        toDelete.map(b=>db.collection('payments').where('billId','==',b.id).get())
      );
      const batch=db.batch();
      const now=new Date();
      toDelete.forEach((b,i)=>{
        // SOFT DELETE — mark as deleted, do not remove from Firestore
        batch.update(db.collection('bills').doc(b.id),{status:'deleted',deletedAt:now});
        // Mark associated payments as deleted
        paymentSnaps[i].docs.forEach(pd=>batch.update(pd.ref,{deleted:true,deletedAt:now}));
        // Log deletion to Sheets
        getWebhook().then(wh=>{if(wh)logToSheets(wh,'Bills',{
          Date:new Date().toISOString().slice(0,10),
          BillNumber:b.billNumber,Party:b.partyName,GSTIN:b.partyGstin||'',
          Type:b.type,Subtotal:b.subtotal||0,CGST:b.cgst||0,SGST:b.sgst||0,
          GrandTotal:b.grandTotal,AmountPaid:b.amountPaid||0,BalanceDue:b.balanceDue||0,
          Status:'DELETED',PaymentModes:'',Items:'',Notes:'Deleted by user'
        });});
        // Reverse stock for non-quotation bills
        if(b.type!=='quotation'&&b.status!=='superseded'){
          (b.items||[]).filter(i=>i.productId).forEach(item=>{
            batch.update(db.collection('products').doc(item.productId),
              {currentStock:firebase.firestore.FieldValue.increment(parseFloat(item.qty)||0)});
          });
          // Reverse party outstanding if on credit
          if(b.partyId&&b.partyId!=='CASH'&&b.balanceDue>0){
            batch.update(db.collection('parties').doc(b.partyId),
              {outstandingBalance:firebase.firestore.FieldValue.increment(-b.balanceDue)});
          }
        }
      });
      await batch.commit();
      audit('BILLS_DELETED',{count:selected.size,bills:toDelete.map(b=>b.billNumber).join(',')});
      window.__toast(`${selected.size} bill${selected.size>1?'s':''} moved to Bin`,'success');
      // Remove from main view — they'll appear in Bin tab
      setBills(b=>b.filter(bill=>!selected.has(bill.id)));
      setSelected(new Set());
    }catch(e){window.__toast('Delete failed: '+e.message);}
    setDeleting(false);
    setConfirmDelete(false);
  };

  const startEdit=async b=>{
    const m=b.billNumber.match(/-E(\d+)$/);
    const eNum=(m?parseInt(m[1]):0)+1;
    const origNum=b.billNumber.replace(/-E\d+$/,'');
    if(setPrefill&&setScreen){
      // Fetch latest party data so renamed parties show correctly
      let freshParty={id:b.partyId,name:b.partyName,gstin:b.partyGstin,address:b.partyAddress};
      if(b.partyId&&b.partyId!=='CASH'){
        try{
          const pd=await db.collection('parties').doc(b.partyId).get({source:'server'});
          if(pd.exists) freshParty={...pd.data(),id:pd.id};
        }catch{/* fallback to stored name */}
      }
      setPrefill({type:b.type,party:freshParty,
        items:(b.items||[]).map(i=>({...i,discountPct:i.discountPct||0})),
        notes:b.notes,editOf:b.id,editOfNumber:b.billNumber,originalNumber:origNum,editSuffix:`E${eNum}`,
        originalAmountPaid:b.amountPaid||0,originalPaymentModes:b.paymentModes||[]});
      setScreen('new-bill');
    }
  };

  if(loading)return<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'60vh',flexDirection:'column',gap:16}}><div className="loader-ring"/></div>;

  return(<div>
    {/* BIN MODE VIEW */}
    {binMode&&(
      <div>
        <div style={{background:'#FEF2F2',border:'1px solid #FCA5A5',borderRadius:12,padding:'12px 18px',marginBottom:14,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <span style={{fontSize:18}}>🗑</span>
            <div>
              <div style={{fontWeight:800,fontSize:14,color:'#991B1B'}}>Deleted Bills — {binBills.length} item{binBills.length!==1?'s':''}</div>
              <div style={{fontSize:12,color:'#C87A7A'}}>Restore to bring back, or delete forever to remove permanently</div>
            </div>
          </div>
          <div style={{display:'flex',gap:8}}>
            {binBills.length>0&&<button onClick={emptyBin} style={{padding:'6px 14px',background:'#DC2626',color:'#fff',border:'none',borderRadius:8,fontSize:12.5,fontWeight:800,cursor:'pointer'}}>Empty Bin</button>}
            <button onClick={()=>setBinMode(false)} style={{padding:'6px 14px',background:'var(--white)',border:'1px solid var(--card-b)',borderRadius:8,fontSize:12.5,fontWeight:600,cursor:'pointer'}}>← Back</button>
          </div>
        </div>
        {binLoading&&<div style={{textAlign:'center',padding:32}}><div className="loader-ring" style={{margin:'0 auto'}}/></div>}
        {!binLoading&&binBills.length===0&&<div className="no-results"><div className="nr-icon">🗑</div><p>Bin is empty.</p></div>}
        {!binLoading&&binBills.length>0&&(
          <div className="pt-wrap">
            <table className="pt-table">
              <thead><tr><th>Bill #</th><th>Deleted On</th><th>Party</th><th style={{textAlign:'right'}}>Amount</th><th style={{textAlign:'center',width:180}}>Actions</th></tr></thead>
              <tbody>
                {binBills.map(b=>(
                  <tr key={b.id} style={{opacity:0.8}}>
                    <td><span className="pt-code" style={{textDecoration:'line-through',opacity:0.7}}>{b.billNumber}</span></td>
                    <td style={{fontSize:12,color:'var(--txt3)'}}>{b.deletedAt?.toDate?.().toLocaleDateString('en-IN')||'—'}</td>
                    <td style={{fontSize:13}}>{b.partyName}</td>
                    <td style={{textAlign:'right',fontWeight:700}}>{inr(b.grandTotal)}</td>
                    <td style={{textAlign:'center'}}>
                      <div style={{display:'flex',gap:6,justifyContent:'center'}}>
                        <button onClick={()=>restoreBill(b)} disabled={restoring===b.id}
                          style={{padding:'4px 12px',background:'#F0FDF4',border:'1px solid #BBF7D0',borderRadius:7,fontSize:12,fontWeight:700,color:'#166534',cursor:'pointer'}}>
                          {restoring===b.id?'…':'↩ Restore'}
                        </button>
                        <button onClick={()=>permanentDelete(b)}
                          style={{padding:'4px 10px',background:'#FEF2F2',border:'1px solid #FCA5A5',borderRadius:7,fontSize:12,fontWeight:700,color:'#991B1B',cursor:'pointer'}}>
                          ✕ Forever
                        </button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
    )}
    {/* NORMAL BILLS VIEW */}
    {!binMode&&<div>
    <div className="toolbar">
      <input className="tb-search" value={search} onChange={e=>{setSearch(e.target.value);setSelected(new Set());}} placeholder="Search bill #, party…" style={{flex:1,minWidth:160}}/>
      <input type="date" className="f-input" value={dateFrom} onChange={e=>setDateFrom(e.target.value)} style={{width:130,fontSize:12}} title="From date"/>
      <span style={{color:'var(--txt3)',fontSize:12}}>→</span>
      <input type="date" className="f-input" value={dateTo} onChange={e=>setDateTo(e.target.value)} style={{width:130,fontSize:12}} title="To date"/>
      {(dateFrom||dateTo)&&<button onClick={()=>{setDateFrom('');setDateTo('');}} style={{padding:'5px 10px',background:'var(--bg)',border:'1px solid var(--card-b)',borderRadius:7,fontSize:12,cursor:'pointer',color:'var(--txt3)'}}>✕</button>}
      <select className="f-select" value={filterBillType} onChange={e=>setFilterBillType(e.target.value)} style={{width:130,fontSize:12}}>
        <option value="">All Types</option>
        <option value="retail_invoice">Retail Invoice</option>
        <option value="tax_invoice">Tax Invoice</option>
        <option value="quotation">Quotation</option>
        <option value="quotations_bill">Q-Bill</option>
      </select>
      {filterBillType&&<button onClick={()=>setFilterBillType('')} style={{padding:'5px 10px',background:'var(--bg)',border:'1px solid var(--card-b)',borderRadius:7,fontSize:12,cursor:'pointer',color:'var(--txt3)'}}>✕</button>}
      {selected.size>0&&(
        <div style={{display:'flex',alignItems:'center',gap:10,background:'#FEF2F2',border:'1px solid #FCA5A5',borderRadius:9,padding:'6px 14px'}}>
          <span style={{fontSize:13,fontWeight:700,color:'#991B1B'}}>{selected.size} selected</span>
          <button onClick={()=>setConfirmDelete(true)}
            style={{padding:'5px 14px',background:'var(--red)',color:'#fff',border:'none',borderRadius:7,fontSize:12.5,fontWeight:800,cursor:'pointer'}}>
            🗑 Delete {selected.size}
          </button>
          <button onClick={()=>setSelected(new Set())}
            style={{padding:'5px 10px',background:'none',border:'1px solid #FCA5A5',borderRadius:7,fontSize:12,color:'#991B1B',cursor:'pointer'}}>
            ✕ Clear
          </button>
        </div>
      )}
      <button className="tb-refresh" onClick={load} style={{marginLeft:'auto'}}>↻</button>
      <button onClick={()=>setBinMode(true)} style={{marginLeft:8,padding:'6px 12px',background:'var(--bg)',border:'1px solid var(--card-b)',borderRadius:8,fontSize:12.5,fontWeight:600,cursor:'pointer',color:'var(--txt3)',display:'flex',alignItems:'center',gap:5}}>🗑 Bin</button>
    </div>

    <div className="pt-wrap">
      <table className="pt-table">
        <thead>
          <tr>
            <th style={{width:36,textAlign:'center'}}>
              <input type="checkbox" checked={allSelected} ref={el=>{if(el)el.indeterminate=someSelected;}}
                onChange={toggleAll} style={{width:15,height:15,cursor:'pointer'}}/>
            </th>
            <th>Bill #</th><th>Date</th><th>Party</th>
            <th style={{textAlign:'right'}}>Amount</th>
            <th>Payment</th>
            <th style={{textAlign:'center'}}>Actions</th>
          </tr>
        </thead>
        <tbody>
          {filtered.length===0
            ?<tr><td colSpan={7}><div className="no-results"><div className="nr-icon">🧾</div><p>No bills found.</p></div></td></tr>
            :filtered.map(b=>(
              <tr key={b.id} style={{opacity:b.status==='superseded'?0.5:1,background:selected.has(b.id)?'#FFF7ED':''}}>
                <td style={{textAlign:'center'}}>
                  <input type="checkbox" checked={selected.has(b.id)} onChange={()=>toggleOne(b.id)}
                    style={{width:15,height:15,cursor:'pointer'}}/>
                </td>
                <td>
                  <span className="pt-code">{b.billNumber}</span>{b.type==='quotations_bill'&&<span style={{fontSize:10,background:'#FFF7ED',color:'#C2410C',border:'1px solid #FED7AA',borderRadius:4,padding:'1px 5px',marginLeft:5,fontWeight:800}}>Q-Bill</span>}
                  {b.editOf&&<div style={{fontSize:10,color:'#92400E',marginTop:2,fontWeight:700}}>Edited from: {b.editOfNumber}</div>}
                </td>
                <td style={{fontSize:12,color:'var(--txt3)'}}>
                  <div>{b.date}</div>
                  {b.createdAt?.toDate&&<div style={{fontSize:10.5,color:'var(--txt3)',marginTop:1}}>{b.createdAt.toDate().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true})}</div>}
                </td>
                <td style={{fontSize:13,fontWeight:600}}>{b.partyName}</td>
                <td style={{textAlign:'right',fontWeight:800}}>
                  <div>{inr(b.grandTotal)}</div>
                  {b.paymentStatus==='partial'&&(
                    <div style={{marginTop:3,lineHeight:1.6}}>
                      <span style={{fontSize:11,color:'var(--green)',fontWeight:700}}>✓ {inr(b.amountPaid||0)}</span>
                      <br/>
                      <span style={{fontSize:11,color:'var(--red)',fontWeight:700}}>● {inr(b.balanceDue||0)} due</span>
                    </div>
                  )}
                </td>
                <td><span className={`bill-status ${b.paymentStatus||'unpaid'}`}>{b.paymentStatus||'unpaid'}</span></td>
                <td style={{textAlign:'center',display:'flex',gap:6,justifyContent:'center'}}>
                  <button className="btn-edit" onClick={()=>setView(b)}>View</button>
                  {b.status!=='superseded'&&role==='owner'&&<button className="btn-edit" onClick={()=>startEdit(b)}>Edit</button>}
                  {role==='owner'&&<button className="btn-edit"
                    style={{color:'var(--red)',borderColor:'#FCA5A5'}}
                    onClick={()=>{setSelected(new Set([b.id]));setConfirmDelete(true);}}>Del</button>}
                </td>
              </tr>
            ))
          }
        </tbody>
      </table>
    </div>

    </div>}
    {/* Delete confirmation modal */}
    {!binMode&&confirmDelete&&(
      <div className="overlay" onClick={()=>!deleting&&setConfirmDelete(false)}>
        <div className="modal" style={{maxWidth:440}} onClick={e=>e.stopPropagation()}>
          <div className="modal-head">
            <h3 style={{color:'var(--red)'}}>🗑 Delete {selected.size} Bill{selected.size>1?'s':''}</h3>
            <button className="modal-x" onClick={()=>setConfirmDelete(false)}>✕</button>
          </div>
          <div style={{background:'#FEF2F2',border:'1px solid #FCA5A5',borderRadius:10,padding:'14px 16px',marginBottom:16}}>
            <div style={{fontWeight:700,color:'#991B1B',fontSize:13,marginBottom:8}}>This will permanently delete:</div>
            <div style={{maxHeight:150,overflowY:'auto'}}>
              {bills.filter(b=>selected.has(b.id)).map(b=>(
                <div key={b.id} style={{fontSize:12.5,color:'#991B1B',padding:'3px 0',borderBottom:'1px solid #FEE2E2'}}>
                  {b.billNumber} — {b.partyName} — {inr(b.grandTotal)}
                </div>
              ))}
            </div>
          </div>
          <div style={{fontSize:12.5,color:'var(--txt3)',marginBottom:16,lineHeight:1.6}}>
            ⚠ Stock will be restored for deleted bills.<br/>
            A "DELETED" record will be logged to Google Sheets if connected.<br/>
            This cannot be undone.
          </div>
          <div className="modal-foot">
            <button className="btn-cancel" onClick={()=>setConfirmDelete(false)} disabled={deleting}>Cancel</button>
            <button onClick={deleteBills} disabled={deleting}
              style={{padding:'9px 22px',background:'var(--red)',border:'none',borderRadius:9,fontSize:13,fontWeight:800,color:'#fff',cursor:'pointer'}}>
              {deleting?'Deleting…':`Delete ${selected.size} Bill${selected.size>1?'s':''}`}
            </button>
          </div>
        </div>
      </div>
    )}

    {/* View modal */}
    {!binMode&&view&&(
      <div className="overlay" onClick={()=>setView(null)}>
        <div className="modal" style={{maxWidth:800}} onClick={e=>e.stopPropagation()}>
          <div className="modal-head">
            <h3>{view.billNumber}</h3>
            <div style={{display:'flex',gap:8}}>
              <button className="btn-cancel" onClick={async()=>{const ps2=await db.collection('settings').doc('print').get();printBill(view,coInfo,ps2.exists?ps2.data():{});}}>🖨 Print</button>
              <button className="modal-x" onClick={()=>setView(null)}>✕</button>
            </div>
          </div>
          <div style={{fontFamily:'Arial,sans-serif',fontSize:12,padding:4}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:12}}>
              <div><strong>{view.partyName}</strong>{view.partyGstin&&<div style={{fontSize:11,color:'var(--txt3)'}}>{view.partyGstin}</div>}</div>
              <div style={{textAlign:'right'}}><div style={{fontSize:16,fontWeight:900}}>{inr(view.grandTotal)}</div><div style={{fontSize:12,color:'var(--txt3)'}}>{view.date}</div></div>
            </div>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
              <thead><tr>{['#','Product','Qty','Price','Total'].map(h=><th key={h} style={{padding:'6px 8px',background:'var(--bg)',borderBottom:'2px solid var(--card-b)',fontSize:10,fontWeight:800,textTransform:'uppercase'}}>{h}</th>)}</tr></thead>
              <tbody>{(view.items||[]).filter(i=>i.productId).map((item,i)=>(
                <tr key={i}>
                  <td style={{padding:'6px 8px',borderBottom:'1px solid var(--card-b)',textAlign:'center'}}>{i+1}</td>
                  <td style={{padding:'6px 8px',borderBottom:'1px solid var(--card-b)'}}>{item.productName}</td>
                  <td style={{padding:'6px 8px',borderBottom:'1px solid var(--card-b)',textAlign:'center'}}>{item.qty}</td>
                  <td style={{padding:'6px 8px',borderBottom:'1px solid var(--card-b)',textAlign:'right'}}>{inr(item.unitPrice)}</td>
                  <td style={{padding:'6px 8px',borderBottom:'1px solid var(--card-b)',textAlign:'right',fontWeight:700}}>{inr(item.lineTotal||0)}</td>
                </tr>
              ))}</tbody>
            </table>
            <div style={{textAlign:'right',marginTop:10,fontWeight:900,fontSize:14}}>Grand Total: {inr(view.grandTotal)}</div>
          </div>
        </div>
      </div>
    )}
  </div>);
}
function OutstandingScreen(){
  const[parties,setParties]=useState([]);
  const[bills,setBills]=useState([]);
  const[loading,setLoading]=useState(true);
  const[selParty,setSelParty]=useState(null);
  const[selBill,setSelBill]=useState(null);
  const[payForm,setPayForm]=useState({amount:'',mode:'cash',date:new Date().toISOString().slice(0,10),ref:'',notes:''});
  const[saving,setSaving]=useState(false);
  const[search,setSearch]=useState('');

  useEffect(()=>{
    db.collection('bills').where('paymentStatus','in',['unpaid','partial']).limit(300).get()
    .then(bs=>{
      const bList=bs.docs.map(d=>({...d.data(),id:d.id})).filter(b=>b.type!=='quotation'&&b.status!=='deleted'&&b.status!=='superseded'); // exclude quotations, deleted and superseded (edited) bills

      bList.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
      setBills(bList);
      const pm={};
      bList.forEach(b=>{
        if(!b.partyId||b.partyId==='CASH')return;
        if(!pm[b.partyId])pm[b.partyId]={id:b.partyId,name:b.partyName,outstandingBalance:0};
        pm[b.partyId].outstandingBalance=r2(pm[b.partyId].outstandingBalance+(b.balanceDue||0));
      });
      setParties(Object.values(pm).sort((a,b)=>b.outstandingBalance-a.outstandingBalance));
      setLoading(false);
    }).catch(e=>{console.error('Outstanding load error:',e);setLoading(false);});
  },[]);

  const partyBills=selParty?bills.filter(b=>b.partyId===selParty.id).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0)):[];
  const totalOut=bills.reduce((s,b)=>s+r2(b.balanceDue||0),0);

  const recordPayment=async()=>{
    if(!selBill||!payForm.amount)return;
    const amt=parseFloat(payForm.amount);
    if(isNaN(amt)||amt<=0)return window.__toast('Enter a valid amount','warn');
    setSaving(true);
    try{
      const newPaid=r2((selBill.amountPaid||0)+amt);
      const newBal=r2(selBill.grandTotal-newPaid);
      const status=newBal<=0?'paid':newPaid>0?'partial':'unpaid';
      const batch=db.batch();
      batch.update(db.collection('bills').doc(selBill.id),{amountPaid:newPaid,balanceDue:Math.max(0,newBal),paymentStatus:status,updatedAt:new Date()});
      await db.collection('payments').add({billId:selBill.id,partyId:selParty.id,partyName:selParty.name,amount:amt,mode:payForm.mode,date:payForm.date,ref:payForm.ref,notes:payForm.notes,createdAt:new Date()});
      // Update party outstanding balance
      if(selParty.id&&selParty.id!=='CASH'){
        const partyBills=await db.collection('bills')
          .where('partyId','==',selParty.id)
          .where('paymentStatus','in',['unpaid','partial']).get();
        const newOutstanding=r2(partyBills.docs.reduce((s,d)=>s+(d.data().balanceDue||0),0)-amt);
        batch.update(db.collection('parties').doc(selParty.id),{outstandingBalance:Math.max(0,newOutstanding)});
      }
      await batch.commit();
      audit('PAYMENT',{billId:selBill.id,amount:amt});
      try{
        const webhook=await getWebhook();
        if(webhook)logToSheets(webhook,'Payments',{
          Date:payForm.date,BillNumber:selBill.billNumber,
          Party:selParty.name,Amount:amt,Mode:payForm.mode,
          Reference:payForm.ref||'',Notes:payForm.notes||''
        });
      }catch{}
      const updatedBills=bills.map(b=>b.id===selBill.id?{...b,amountPaid:newPaid,balanceDue:Math.max(0,newBal),paymentStatus:status}:b).filter(b=>b.paymentStatus!=='paid');
      setBills(updatedBills);
      const pm={};
      updatedBills.forEach(b=>{
        if(!b.partyId||b.partyId==='CASH')return;
        if(!pm[b.partyId])pm[b.partyId]={id:b.partyId,name:b.partyName,outstandingBalance:0};
        pm[b.partyId].outstandingBalance=r2(pm[b.partyId].outstandingBalance+(b.balanceDue||0));
      });
      setParties(Object.values(pm).sort((a,b)=>b.outstandingBalance-a.outstandingBalance));
      setSelBill(null);
      setPayForm({amount:'',mode:'cash',date:new Date().toISOString().slice(0,10),ref:'',notes:''});
      window.__toast('Payment recorded','success');
    }catch(e){window.__toast('Error: '+e.message);}
    setSaving(false);
  };

  const fp=parties.filter(p=>p.outstandingBalance>0&&multiSearch(search,p,['name','phone','gstin']));

  if(loading)return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'60vh',flexDirection:'column',gap:16}}>
      <div className="loader-ring"/>
    </div>
  );

  return(
    <div>
      <div className="pm-stats" style={{marginBottom:16}}>
        <div className="pm-stat"><div className="psl">Total Outstanding</div><div className="psv" style={{color:'var(--red)',fontSize:20}}>{inr(totalOut)}</div></div>
        <div className="pm-stat"><div className="psl">Parties with dues</div><div className="psv">{parties.filter(p=>p.outstandingBalance>0).length}</div></div>
        <div className="pm-stat"><div className="psl">Unpaid Bills</div><div className="psv">{bills.filter(b=>b.paymentStatus==='unpaid').length}</div></div>
        <div className="pm-stat"><div className="psl">Partial Bills</div><div className="psv" style={{color:'#92400E'}}>{bills.filter(b=>b.paymentStatus==='partial').length}</div></div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'280px 1fr',gap:16}}>
        <div>
          <input className="tb-search" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search party…" style={{width:'100%',marginBottom:10}}/>
          <div className="pt-wrap">
            {fp.length===0
              ?<div className="no-results"><div className="nr-icon">💰</div><p>No outstanding dues.</p></div>
              :fp.map(p=>(
                <div key={p.id} onClick={()=>setSelParty(p)}
                  style={{padding:'12px 14px',cursor:'pointer',borderBottom:'1px solid var(--card-b)',background:selParty?.id===p.id?'#FFF7ED':'var(--white)'}}>
                  <div style={{fontWeight:700,fontSize:13}}>{p.name}</div>
                  <div style={{fontSize:12,color:'var(--red)',fontWeight:800,marginTop:2}}>₹{(p.outstandingBalance||0).toLocaleString('en-IN')}</div>
                </div>
              ))
            }
          </div>
        </div>
        <div>
          {!selParty&&<div className="no-results"><div className="nr-icon">←</div><p>Select a party to see their bills</p></div>}
          {selParty&&(
            <div>
              <div style={{marginBottom:12,display:'flex',alignItems:'center',gap:12}}>
                <h3 style={{fontWeight:800,fontSize:15}}>{selParty.name}</h3>
                <span style={{fontSize:13,color:'var(--red)',fontWeight:800}}>₹{(selParty.outstandingBalance||0).toLocaleString('en-IN')}</span>
              </div>
              <div className="pt-wrap">
                <table className="pt-table">
                  <thead><tr><th>Bill #</th><th>Date</th><th style={{textAlign:'right'}}>Total</th><th style={{textAlign:'right'}}>Paid</th><th style={{textAlign:'right'}}>Balance</th><th>Status</th><th style={{textAlign:'center'}}>Pay</th></tr></thead>
                  <tbody>
                    {partyBills.length===0
                      ?<tr><td colSpan={7}><div className="no-results"><p>No pending bills.</p></div></td></tr>
                      :partyBills.map(b=>(
                        <tr key={b.id}>
                          <td><span className="pt-code">{b.billNumber}</span></td>
                          <td style={{fontSize:12,color:'var(--txt3)'}}><div>{b.date}</div>{b.createdAt?.toDate&&<div style={{fontSize:10.5,color:'var(--txt3)',marginTop:1}}>{b.createdAt.toDate().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true})}</div>}</td>
                          <td style={{textAlign:'right',fontWeight:700}}>{inr(b.grandTotal)}</td>
                          <td style={{textAlign:'right',color:'var(--green)',fontWeight:700}}>{inr(b.amountPaid||0)}</td>
                          <td style={{textAlign:'right',color:'var(--red)',fontWeight:800}}>{inr(b.balanceDue||b.grandTotal)}</td>
                          <td><span className={`bill-status ${b.paymentStatus||'unpaid'}`}>{b.paymentStatus||'unpaid'}</span></td>
                          <td style={{textAlign:'center'}}>
                            <button className="btn-confirm" style={{padding:'4px 12px',fontSize:12}}
                              onClick={()=>{setSelBill(b);setPayForm(f=>({...f,amount:r2(b.balanceDue||b.grandTotal)+''}));}}>
                              Pay
                            </button>
                          </td>
                        </tr>
                      ))
                    }
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </div>
      </div>
      {selBill&&(
        <div className="overlay" onClick={()=>setSelBill(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-head">
              <h3>Record Payment — {selBill.billNumber}</h3>
              <button className="modal-x" onClick={()=>setSelBill(null)}>✕</button>
            </div>
            <div style={{background:'var(--bg)',borderRadius:10,padding:'12px 14px',marginBottom:16,fontSize:13,fontWeight:600}}>
              Total: <b>{inr(selBill.grandTotal)}</b> · Paid: <b style={{color:'var(--green)'}}>{inr(selBill.amountPaid||0)}</b> · Balance: <b style={{color:'var(--red)'}}>{inr(selBill.balanceDue||selBill.grandTotal)}</b>
            </div>
            <div className="f-row" style={{marginBottom:14}}>
              <div className="f-group"><label className="f-label">Amount (₹) *</label><input className="f-input" type="number" value={payForm.amount} onChange={e=>setPayForm(p=>({...p,amount:e.target.value}))} style={{fontWeight:800,fontSize:16}}/></div>
              <div className="f-group"><label className="f-label">Date</label><input className="f-input" type="date" value={payForm.date} onChange={e=>setPayForm(p=>({...p,date:e.target.value}))}/></div>
            </div>
            <div className="f-group" style={{marginBottom:14}}>
              <label className="f-label">Payment Mode</label>
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                {['cash','upi','bank','cheque'].map(m=>(
                  <button key={m} className={`pay-mode-btn${payForm.mode===m?' sel':''}`} onClick={()=>setPayForm(p=>({...p,mode:m}))}>{m.toUpperCase()}</button>
                ))}
              </div>
            </div>
            <div className="f-row" style={{marginBottom:14}}>
              <div className="f-group"><label className="f-label">Reference #</label><input className="f-input" value={payForm.ref} onChange={e=>setPayForm(p=>({...p,ref:e.target.value}))}/></div>
              <div className="f-group"><label className="f-label">Notes</label><input className="f-input" value={payForm.notes} onChange={e=>setPayForm(p=>({...p,notes:e.target.value}))}/></div>
            </div>
            <div className="modal-foot">
              <button className="btn-cancel" onClick={()=>setSelBill(null)}>Cancel</button>
              <button className="btn-confirm" onClick={recordPayment} disabled={saving||!payForm.amount}>{saving?'Saving…':'✓ Record Payment'}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
