function downloadCSV(filename,rows,headers){
  const esc=v=>{const s=String(v===null||v===undefined?'':v);return s.includes(',')||s.includes('"')||s.includes('\n')?`"${s.replace(/"/g,'""')}"`:s;};
  const csv=[headers.join(','),...rows.map(r=>headers.map(h=>esc(r[h])).join(','))].join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;a.click();
  setTimeout(()=>URL.revokeObjectURL(url),5000);
}

async function exportAllData(){
  window.__toast('Preparing export…','success');
  try{
    const[billSnap,partySnap,paySnap,prodSnap,cnSnap]=await Promise.all([
      db.collection('bills').get(),db.collection('parties').get(),
      db.collection('payments').get(),db.collection('products').get(),
      db.collection('credit_notes').get(),
    ]);
    const bills=billSnap.docs.map(d=>{const b=d.data();return{'Bill Number':b.billNumber,'Date':b.date,'Party':b.partyName,'Party GSTIN':b.partyGstin||'','Type':b.type,'Grand Total':b.grandTotal,'Amount Paid':b.amountPaid||0,'Balance Due':b.balanceDue||0,'Payment Status':b.paymentStatus||'unpaid','Items Count':(b.items||[]).filter(i=>i.productId).length,'Notes':b.notes||''};}).sort((a,b)=>a['Date'].localeCompare(b['Date']));
    downloadCSV(`bills_${new Date().toISOString().slice(0,10)}.csv`,bills,['Bill Number','Date','Party','Party GSTIN','Type','Grand Total','Amount Paid','Balance Due','Payment Status','Items Count','Notes']);
    const items=[];
    billSnap.docs.forEach(d=>{const b=d.data();(b.items||[]).filter(i=>i.productId).forEach(item=>{items.push({'Bill Number':b.billNumber,'Date':b.date,'Party':b.partyName,'Product':item.productName,'HSN':item.hsnCode||'','Unit':item.unit||'','Qty':item.qty,'Unit Price':item.unitPrice,'GST %':item.gstRate||0,'Line Total':item.lineTotal||0});});});
    setTimeout(()=>downloadCSV(`bill_items_${new Date().toISOString().slice(0,10)}.csv`,items,['Bill Number','Date','Party','Product','HSN','Unit','Qty','Unit Price','GST %','Line Total']),500);
    const parties=partySnap.docs.map(d=>{const p=d.data();return{'Name':p.name,'Type':p.type,'Phone':p.phone||'','Address':p.address||'','GSTIN':p.gstin||'','Credit Limit':p.creditLimit||'','Outstanding':p.outstandingBalance||0,'Active':p.isActive?'Yes':'No','Notes':p.notes||''};}).sort((a,b)=>a.Name.localeCompare(b.Name));
    setTimeout(()=>downloadCSV(`parties_${new Date().toISOString().slice(0,10)}.csv`,parties,['Name','Type','Phone','Address','GSTIN','Credit Limit','Outstanding','Active','Notes']),1000);
    const pays=paySnap.docs.map(d=>{const p=d.data();return{'Date':p.date||'','Party':p.partyName||'','Bill Number':p.billId||'','Amount':p.amount,'Mode':p.mode||'','Type':p.type||'payment','Reference':p.ref||'','Notes':p.notes||''};}).sort((a,b)=>a.Date.localeCompare(b.Date));
    setTimeout(()=>downloadCSV(`payments_${new Date().toISOString().slice(0,10)}.csv`,pays,['Date','Party','Bill Number','Amount','Mode','Type','Reference','Notes']),1500);
    const prods=prodSnap.docs.map(d=>{const p=d.data();return{'Fixed Code':p.fixedCode||d.id,'Brand':p.brand||'','Category':p.category||'','Full Name':p.fullSkuName||'','Unit':p.unit||'','HSN':p.hsnCode||'','GST %':p.gstRate!=null?p.gstRate:'','MRP':p.mrp||'','Current Stock':p.currentStock||0,'Floor':p.floorLocation||'','Active':p.isActive?'Yes':'No'};}).sort((a,b)=>a['Full Name'].localeCompare(b['Full Name']));
    setTimeout(()=>downloadCSV(`stock_${new Date().toISOString().slice(0,10)}.csv`,prods,['Fixed Code','Brand','Category','Full Name','Unit','HSN','GST %','MRP','Current Stock','Floor','Active']),2000);
    if(cnSnap.docs.length>0){const cns=cnSnap.docs.map(d=>{const c=d.data();return{'CN Number':c.cnNumber,'Date':c.date,'Against Bill':c.originalBillNumber,'Party':c.partyName,'Credit Amount':c.creditAmount,'Settlement':c.settlementType,'Refund Mode':c.refundMode||''};});setTimeout(()=>downloadCSV(`credit_notes_${new Date().toISOString().slice(0,10)}.csv`,cns,['CN Number','Date','Against Bill','Party','Credit Amount','Settlement','Refund Mode']),2500);}
    setTimeout(()=>window.__toast(`Export complete — ${bills.length} bills, ${parties.length} parties, ${pays.length} payments, ${prods.length} products`,'success'),3000);
  }catch(e){window.__toast('Export failed: '+e.message);}
}

async function logToSheets(webhookUrl,sheetTab,rowData){
  if(!webhookUrl)return;
  try{
    // text/plain avoids CORS preflight — Apps Script receives it fine
    await fetch(webhookUrl,{
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({tab:sheetTab,data:rowData})
    });
  }catch(e){console.warn('Sheets log failed:',e);}
}

function ReportsScreen({role}){
  const today=new Date().toISOString().slice(0,10);
  const firstOfMonth=new Date(new Date().getFullYear(),new Date().getMonth(),1).toISOString().slice(0,10);

  const[tab,setTab]=useState('sales');
  const[from,setFrom]=useState(firstOfMonth);
  const[to,setTo]=useState(today);
  const[loading,setLoading]=useState(false);
  const[data,setData]=useState(null);
  const[selParty,setSelParty]=useState('');
  const[parties,setParties]=useState([]);
  const[stockFilter,setStockFilter]=useState('all');
  const[coInfo,setCoInfo]=useState(COMPANY);

  useEffect(()=>{
    db.collection('settings').doc('company').get().then(s=>{if(s.exists)setCoInfo(p=>({...p,...s.data()}));});
    db.collection('parties').get().then(s=>{
      const ps=s.docs.map(d=>({...d.data(),id:d.id})).sort((a,b)=>a.name.localeCompare(b.name));
      setParties(ps);
    });
  },[]);

  useEffect(()=>{loadReport();},[tab,from,to,selParty,stockFilter]);

  const loadReport=async()=>{
    setLoading(true);setData(null);
    try{
      if(tab==='sales')       await loadSales();
      else if(tab==='ledger') await loadLedger();
      else if(tab==='stock')  await loadStock();
      else if(tab==='payments') await loadPayments();
      else if(tab==='products') await loadProducts();
      else if(tab==='outstanding') await loadOutstanding();
    }catch(e){console.error(e);}
    setLoading(false);
  };

  const inRange=dateStr=>dateStr>=from&&dateStr<=to;

  const loadSales=async()=>{
    const snap=await db.collection('bills').get();
    const bills=snap.docs.map(d=>({...d.data(),id:d.id}))
      .filter(b=>b.status!=='superseded'&&b.status!=='deleted'&&b.type!=='quotation'&&inRange(b.date));
    const total=r2(bills.reduce((s,b)=>s+b.grandTotal,0));
    const paid=r2(bills.filter(b=>b.paymentStatus==='paid').reduce((s,b)=>s+b.grandTotal,0));
    const unpaid=r2(bills.filter(b=>b.paymentStatus==='unpaid').reduce((s,b)=>s+b.grandTotal,0));
    const partial=r2(bills.filter(b=>b.paymentStatus==='partial').reduce((s,b)=>s+b.grandTotal,0));
    const byDay={};
    bills.forEach(b=>{
      if(!byDay[b.date])byDay[b.date]={date:b.date,count:0,total:0,paid:0};
      byDay[b.date].count++;
      byDay[b.date].total=r2(byDay[b.date].total+b.grandTotal);
      if(b.paymentStatus==='paid')byDay[b.date].paid=r2(byDay[b.date].paid+b.grandTotal);
    });
    const days=Object.values(byDay).sort((a,b)=>b.date.localeCompare(a.date));
    setData({type:'sales',summary:{total,paid,unpaid,partial,count:bills.length},days,bills});
  };

  const loadLedger=async()=>{
    if(!selParty){setData({type:'ledger',entries:[],party:null});return;}
    const party=parties.find(p=>p.id===selParty);
    const[bSnap,pSnap,cnSnap]=await Promise.all([
      db.collection('bills').get(),
      db.collection('payments').get(),
      db.collection('credit_notes').where('partyId','==',selParty).get(),
    ]);
    const bills=bSnap.docs.map(d=>({...d.data(),id:d.id,_type:'bill'}))
      .filter(b=>b.status!=='deleted')
      .filter(b=>b.partyId===selParty&&b.status!=='superseded');
    // Payments — exclude credit_adj type (CNs handled separately below)
    const pays=pSnap.docs.map(d=>({...d.data(),id:d.id,_type:'payment'}))
      .filter(p=>p.partyId===selParty&&p.type!=='credit_adj');
    // Credit notes as CR entries
    const cns=cnSnap.docs.map(d=>({...d.data(),id:d.id,_type:'creditnote'}));
    const entries=[...bills,...pays,...cns].sort((a,b)=>{
      const da=a.date||a.createdAt?.toDate?.()?.toISOString?.()?.slice(0,10)||'';
      const db2=b.date||b.createdAt?.toDate?.()?.toISOString?.()?.slice(0,10)||'';
      return db2.localeCompare(da);
    });
    const totalBilled=r2(bills.reduce((s,b)=>s+b.grandTotal,0));
    const totalPaid=r2(pays.filter(p=>p.amount>0).reduce((s,p)=>s+p.amount,0));
    const totalRefund=r2(pays.filter(p=>p.amount<0).reduce((s,p)=>s+Math.abs(p.amount),0));
    // CN credits: credit adj CNs reduce balance, cash refund CNs also reduce balance
    const totalCNCredit=r2(cns.reduce((s,cn)=>s+(cn.creditAmount||0),0));
    setData({type:'ledger',party,entries,totalBilled,totalPaid,totalRefund,totalCNCredit,
      balance:r2(totalBilled-totalPaid-totalRefund-totalCNCredit)}); // refund reduces what customer owes
  };

  const loadStock=async()=>{
    const snap=await db.collection('products').get();
    let prods=snap.docs.map(d=>({...d.data(),id:d.id})).filter(p=>p.isActive);
    if(stockFilter==='low') prods=prods.filter(p=>p.currentStock>0&&p.currentStock<=10);
    else if(stockFilter==='zero') prods=prods.filter(p=>p.currentStock===0);
    prods.sort((a,b)=>a.currentStock-b.currentStock);
    const zero=prods.filter(p=>p.currentStock===0).length;
    const low=prods.filter(p=>p.currentStock>0&&p.currentStock<=10).length;
    setData({type:'stock',prods,zero,low,total:prods.length});
  };

  const loadPayments=async()=>{
    const snap=await db.collection('payments').get();
    const pays=snap.docs.map(d=>({...d.data(),id:d.id}))
      .filter(p=>!p.deleted) // exclude soft-deleted payments
      .filter(p=>{
        const d=p.date||p.createdAt?.toDate?.()?.toISOString?.()?.slice(0,10)||'';
        return d>=from&&d<=to&&p.amount>0;
      });
    const byMode={};
    pays.forEach(p=>{
      const m=p.mode||'unknown';
      if(!byMode[m])byMode[m]={mode:m,count:0,total:0};
      byMode[m].count++;byMode[m].total=r2(byMode[m].total+p.amount);
    });
    const total=r2(pays.reduce((s,p)=>s+p.amount,0));
    pays.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    setData({type:'payments',pays,byMode:Object.values(byMode),total});
  };

  const loadProducts=async()=>{
    const snap=await db.collection('bills').get();
    const bills=snap.docs.map(d=>({...d.data(),id:d.id}))
      .filter(b=>b.status!=='superseded'&&b.status!=='deleted'&&b.type!=='quotation'&&inRange(b.date));
    const prodMap={};
    bills.forEach(b=>{
      (b.items||[]).filter(i=>i.productId).forEach(item=>{
        if(!prodMap[item.productId])prodMap[item.productId]={id:item.productId,name:item.productName,qty:0,revenue:0,txns:0};
        prodMap[item.productId].qty=r2(prodMap[item.productId].qty+(parseFloat(item.qty)||0));
        prodMap[item.productId].revenue=r2(prodMap[item.productId].revenue+(item.lineTotal||0));
        prodMap[item.productId].txns++;
      });
    });
    const prods=Object.values(prodMap).sort((a,b)=>b.revenue-a.revenue);
    setData({type:'products',prods,totalRevenue:r2(prods.reduce((s,p)=>s+p.revenue,0))});
  };

  const loadOutstanding=async()=>{
    const[snap,paySnap,cnSnap,pSnap]=await Promise.all([
      db.collection('bills').get(),
      db.collection('payments').get(),
      db.collection('credit_notes').get(),
      db.collection('parties').get(),
    ]);
    const bills=snap.docs.map(d=>({...d.data(),id:d.id}))
      .filter(b=>b.status!=='superseded'&&b.status!=='deleted'&&b.type!=='quotation'&&b.paymentStatus!=='paid'&&b.partyId!=='CASH');
    const partyMap={};
    bills.forEach(b=>{
      if(!partyMap[b.partyId])partyMap[b.partyId]={id:b.partyId,name:b.partyName,bills:[],total:0};
      partyMap[b.partyId].bills.push(b);
      partyMap[b.partyId].total=r2(partyMap[b.partyId].total+(b.balanceDue||0));
    });
    const partiesOut=Object.values(partyMap).sort((a,b)=>b.total-a.total);
    const grandTotal=r2(partiesOut.reduce((s,p)=>s+p.total,0));
    // Compute credit balances
    const allBills=snap.docs.map(d=>({...d.data(),id:d.id})).filter(b=>b.status!=='deleted'&&b.status!=='superseded'&&b.partyId!=='CASH');
    const dBilled={},dPaid={},dCN={};
    allBills.forEach(b=>{dBilled[b.partyId]=(dBilled[b.partyId]||0)+b.grandTotal;});
    paySnap.docs.forEach(d=>{const p=d.data();if(!p.deleted&&p.amount>0&&p.partyId!=='CASH')dPaid[p.partyId]=(dPaid[p.partyId]||0)+p.amount;});
    cnSnap.docs.forEach(d=>{const cn=d.data();if(cn.partyId&&cn.partyId!=='CASH')dCN[cn.partyId]=(dCN[cn.partyId]||0)+(cn.creditAmount||0);});
    const creditParties=pSnap.docs.map(d=>({...d.data(),id:d.id})).map(p=>{
      const net=r2((dBilled[p.id]||0)-(dPaid[p.id]||0)-(dCN[p.id]||0));
      return{...p,creditBalance:net<0?r2(Math.abs(net)):0};
    }).filter(p=>p.creditBalance>0);
    setData({type:'outstanding',partiesOut,grandTotal,creditParties});
  };

  const printReport=()=>{
    if(!data)return;
    let rows='',title='',summary='';
    if(data.type==='sales'){
      title='Sales Report';
      summary=`Period: ${from} to ${to} | Bills: ${data.summary.count} | Total: ${inr(data.summary.total)} | Paid: ${inr(data.summary.paid)} | Unpaid: ${inr(data.summary.unpaid)}`;
      rows=data.days.map(d=>`<tr><td>${d.date}</td><td align="center">${d.count}</td><td align="right">${inr(d.total)}</td><td align="right">${inr(d.paid)}</td><td align="right">${inr(r2(d.total-d.paid))}</td></tr>`).join('');
      rows=`<tr><th>Date</th><th>Bills</th><th align="right">Total Sales</th><th align="right">Paid</th><th align="right">Unpaid</th></tr>${rows}`;
    } else if(data.type==='ledger'&&data.party){
      title=`Party Ledger — ${data.party.name}`;
      summary=`Total Billed: ${inr(data.totalBilled)} | Total Paid: ${inr(data.totalPaid)} | Balance: ${inr(data.balance)}`;
      rows=data.entries.map(e=>e._type==='bill'
        ?`<tr><td>${e.date}</td><td>${e.billNumber}</td><td>Bill</td><td align="right">${inr(e.grandTotal)}</td><td align="right">—</td><td align="right">${inr(e.balanceDue||0)}</td></tr>`
        :`<tr style="color:green"><td>${e.date||''}</td><td>${e.mode?.toUpperCase()||''}</td><td>Payment</td><td align="right">—</td><td align="right">${inr(e.amount)}</td><td align="right">—</td></tr>`
      ).join('');
      rows=`<tr><th>Date</th><th>Ref</th><th>Type</th><th align="right">Billed</th><th align="right">Paid</th><th align="right">Balance</th></tr>${rows}`;
    } else if(data.type==='stock'){
      title='Stock Report';
      summary=`Total: ${data.total} | Zero Stock: ${data.zero} | Low Stock: ${data.low}`;
      rows=data.prods.map(p=>`<tr><td>${p.fixedCode||''}</td><td>${p.fullSkuName||p.brand}</td><td align="center" style="color:${p.currentStock===0?'red':p.currentStock<=10?'orange':'green'}">${p.currentStock}</td><td>${p.unit||''}</td><td>${p.floorLocation||''}</td></tr>`).join('');
      rows=`<tr><th>Code</th><th>Product</th><th align="center">Stock</th><th>Unit</th><th>Location</th></tr>${rows}`;
    } else if(data.type==='payments'){
      title='Payment Collection Report';
      summary=`Period: ${from} to ${to} | Total Collected: ${inr(data.total)}`;
      rows=data.pays.map(p=>`<tr><td>${p.date||''}</td><td>${p.partyName||'—'}</td><td>${p.mode?.toUpperCase()||''}</td><td align="right">${inr(p.amount)}</td><td>${p.notes||''}</td></tr>`).join('');
      rows=`<tr><th>Date</th><th>Party</th><th>Mode</th><th align="right">Amount</th><th>Notes</th></tr>${rows}`;
    } else if(data.type==='products'){
      title='Product Performance Report';
      summary=`Period: ${from} to ${to} | Total Revenue: ${inr(data.totalRevenue)}`;
      rows=data.prods.map((p,i)=>`<tr><td>${i+1}</td><td>${p.name}</td><td align="center">${p.qty}</td><td align="center">${p.txns}</td><td align="right">${inr(p.revenue)}</td></tr>`).join('');
      rows=`<tr><th>#</th><th>Product</th><th align="center">Qty Sold</th><th align="center">Transactions</th><th align="right">Revenue</th></tr>${rows}`;
    } else if(data.type==='outstanding'){
      title='Outstanding Report';
      summary=`Total Outstanding: ${inr(data.grandTotal)}`;
      rows=data.partiesOut.map(p=>`<tr><td>${p.name}</td><td align="center">${p.bills.length}</td><td align="right" style="color:red;font-weight:bold">${inr(p.total)}</td></tr>`).join('');
      rows=`<tr><th>Party</th><th align="center">Bills</th><th align="right">Amount Due</th></tr>${rows}`;
    }
    const html=`<!DOCTYPE html><html><head><title>${title}</title>
    <style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif;font-size:11px;padding:20px}
    h2{font-size:16px;font-weight:900;margin-bottom:4px}
    .summary{font-size:10.5px;color:#555;margin-bottom:14px;padding:8px 12px;background:#F8F8F8;border-radius:4px}
    table{width:100%;border-collapse:collapse}
    th{background:#F0F0F0;border:1px solid #CCC;padding:6px 8px;font-size:9.5px;font-weight:800;text-transform:uppercase}
    td{border:1px solid #DDD;padding:5px 8px;font-size:10.5px}
    .co{font-size:10px;color:#666;margin-bottom:12px}
    @media print{@page{size:A4;margin:15mm}body{padding:0}}
    </style></head><body>
    <div class="co">${coInfo.name} | ${coInfo.address} | GSTIN: ${coInfo.gstin}</div>
    <h2>${title}</h2>
    <div class="summary">${summary}</div>
    <table><tbody>${rows}</tbody></table>
    <script>window.onload=()=>setTimeout(()=>window.print(),400);<\/script>
    </body></html>`;
    try{const blob=new Blob([html],{type:'text/html;charset=utf-8'});const url=URL.createObjectURL(blob);window.open(url,'_blank');setTimeout(()=>URL.revokeObjectURL(url),30000);}
    catch(e){alert('Print error: '+e.message);}
  };

  const quickRange=(q)=>{
    const d=new Date();
    if(q==='today'){setFrom(today);setTo(today);}
    else if(q==='yesterday'){const y=new Date(d-86400000).toISOString().slice(0,10);setFrom(y);setTo(y);}
    else if(q==='week'){const w=new Date(d-6*86400000).toISOString().slice(0,10);setFrom(w);setTo(today);}
    else if(q==='month'){setFrom(firstOfMonth);setTo(today);}
    else if(q==='lastmonth'){
      const lm=new Date(d.getFullYear(),d.getMonth()-1,1);
      const lme=new Date(d.getFullYear(),d.getMonth(),0);
      setFrom(lm.toISOString().slice(0,10));setTo(lme.toISOString().slice(0,10));
    }
  };

  const TABS=[
    {id:'sales',label:'Sales Summary',icon:'📊'},
    {id:'ledger',label:'Party Ledger',icon:'📒'},
    {id:'stock',label:'Stock Report',icon:'📦'},
    {id:'payments',label:'Payments',icon:'💰'},
    {id:'products',label:'Products',icon:'🏆'},
    {id:'outstanding',label:'Outstanding',icon:'⚠'},
  ];

  return(
    <div>
      {/* Tab bar */}
      <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:18}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)}
            style={{padding:'8px 14px',border:`1.5px solid ${tab===t.id?'var(--orange)':'var(--card-b)'}`,borderRadius:10,fontSize:12.5,fontWeight:700,
              background:tab===t.id?'var(--orange)':'var(--white)',color:tab===t.id?'#fff':'var(--txt2)',cursor:'pointer',transition:'all .15s',display:'flex',alignItems:'center',gap:6}}>
            <span>{t.icon}</span>{t.label}
          </button>
        ))}
      </div>

      {/* Filters row */}
      <div style={{background:'var(--white)',border:'1px solid var(--card-b)',borderRadius:12,padding:'12px 16px',marginBottom:16,boxShadow:'var(--shadow)',display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
        {/* Date range — only for date-based reports */}
        {['sales','payments','products'].includes(tab)&&(<>
          <span style={{fontSize:12,fontWeight:700,color:'var(--txt3)'}}>Period:</span>
          {['today','yesterday','week','month','lastmonth'].map(q=>(
            <button key={q} onClick={()=>quickRange(q)}
              style={{padding:'5px 11px',border:'1.5px solid var(--card-b)',borderRadius:8,fontSize:12,fontWeight:700,color:'var(--txt2)',background:'var(--bg)',cursor:'pointer'}}>
              {q==='today'?'Today':q==='yesterday'?'Yesterday':q==='week'?'This Week':q==='month'?'This Month':'Last Month'}
            </button>
          ))}
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <input type="date" value={from} onChange={e=>setFrom(e.target.value)} className="f-input" style={{padding:'5px 8px',fontSize:12,width:130}}/>
            <span style={{fontSize:12,color:'var(--txt3)'}}>to</span>
            <input type="date" value={to} onChange={e=>setTo(e.target.value)} className="f-input" style={{padding:'5px 8px',fontSize:12,width:130}}/>
          </div>
        </>)}

        {/* Party selector for ledger */}
        {tab==='ledger'&&(
          <select className="f-select" value={selParty} onChange={e=>setSelParty(e.target.value)} style={{minWidth:220}}>
            <option value="">— Select Party —</option>
            {parties.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
          </select>
        )}

        {/* Stock filter */}
        {tab==='stock'&&(
          <div style={{display:'flex',gap:8}}>
            {['all','low','zero'].map(f=>(
              <button key={f} onClick={()=>setStockFilter(f)}
                style={{padding:'5px 13px',border:`1.5px solid ${stockFilter===f?'var(--orange)':'var(--card-b)'}`,borderRadius:8,fontSize:12,fontWeight:700,
                  background:stockFilter===f?'var(--orange)':'var(--bg)',color:stockFilter===f?'#fff':'var(--txt2)',cursor:'pointer'}}>
                {f==='all'?'All Stock':f==='low'?'Low (1–10)':'Zero Stock'}
              </button>
            ))}
          </div>
        )}

        <button className="btn-cancel" onClick={loadReport} style={{marginLeft:'auto'}}>↻ Refresh</button>
        {data&&<button className="btn-confirm" onClick={printReport}>🖨 Print Report</button>}
      </div>

      {/* Report content */}
      {loading&&<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'40vh',flexDirection:'column',gap:16}}><div className="loader-ring"/><p style={{color:'var(--txt3)',fontSize:13,fontWeight:600}}>Loading report…</p></div>}

      {!loading&&data&&(

        <div>
          {/* SALES SUMMARY */}
          {data.type==='sales'&&(<div>
            <div className="pm-stats" style={{marginBottom:16}}>
              <div className="pm-stat"><div className="psl">Total Sales</div><div className="psv" style={{fontSize:22}}>{inr(data.summary.total)}</div><div className="pss">{data.summary.count} bills</div></div>
              <div className="pm-stat"><div className="psl">Collected</div><div className="psv" style={{fontSize:22,color:'var(--green)'}}>{inr(data.summary.paid)}</div></div>
              <div className="pm-stat"><div className="psl">Unpaid</div><div className="psv" style={{fontSize:22,color:'var(--red)'}}>{inr(data.summary.unpaid)}</div></div>
              <div className="pm-stat"><div className="psl">Partial</div><div className="psv" style={{fontSize:22,color:'#92400E'}}>{inr(data.summary.partial)}</div></div>
            </div>
            <div className="pt-wrap">
              <table className="pt-table">
                <thead><tr><th>Date</th><th style={{textAlign:'center'}}>Bills</th><th style={{textAlign:'right'}}>Total Sales</th><th style={{textAlign:'right'}}>Collected</th><th style={{textAlign:'right'}}>Pending</th></tr></thead>
                <tbody>
                  {data.days.length===0?<tr><td colSpan={5}><div className="no-results"><div className="nr-icon">📊</div><p>No sales in this period.</p></div></td></tr>
                  :data.days.map(d=>(
                    <tr key={d.date}>
                      <td style={{fontWeight:700}}>{new Date(d.date+'T00:00:00').toLocaleDateString('en-IN',{weekday:'short',day:'2-digit',month:'short'})}</td>
                      <td style={{textAlign:'center',fontWeight:600}}>{d.count}</td>
                      <td style={{textAlign:'right',fontWeight:800}}>{inr(d.total)}</td>
                      <td style={{textAlign:'right',color:'var(--green)',fontWeight:700}}>{inr(d.paid)}</td>
                      <td style={{textAlign:'right',color:r2(d.total-d.paid)>0?'var(--red)':'var(--txt3)',fontWeight:700}}>{inr(r2(d.total-d.paid))}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>)}

          {/* PARTY LEDGER */}
          {data.type==='ledger'&&(
            <div>
              {!data.party?<div className="no-results"><div className="nr-icon">📒</div><p>Select a party above to view their ledger.</p></div>
              :<div>
                <div className="pm-stats" style={{marginBottom:16}}>
                  <div className="pm-stat"><div className="psl">Total Billed</div><div className="psv" style={{fontSize:20}}>{inr(data.totalBilled)}</div></div>
                  <div className="pm-stat"><div className="psl">Total Paid</div><div className="psv" style={{fontSize:20,color:'var(--green)'}}>{inr(data.totalPaid)}</div></div>
                  <div className="pm-stat"><div className="psl">Balance Due</div><div className="psv" style={{fontSize:20,color:data.balance>0?'var(--red)':data.balance<0?'#166534':'var(--green)'}}>
                    {data.balance<0
                      ?<span>Credit Bal: {inr(Math.abs(data.balance))}</span>
                      :<span>{inr(data.balance)}</span>
                    }
                  </div>
                  {data.balance<0&&<div style={{fontSize:11,color:'#166534',marginTop:3,fontWeight:600}}>Party has advance / overpaid</div>}
                </div></div>
                <div className="pt-wrap">
                  <table className="pt-table">
                    <thead><tr><th>Date</th><th>Reference</th><th>Type</th><th style={{textAlign:'right'}}>Billed (Dr)</th><th style={{textAlign:'right'}}>Paid (Cr)</th></tr></thead>
                    <tbody>
                      {data.entries.map((e,i)=>(
                        <tr key={i} style={{background:e._type==='payment'?'#F0FDF4':'var(--white)'}}>
                          <td style={{fontSize:12,color:'var(--txt3)'}}>{e.date||e.createdAt?.toDate?.()?.toLocaleDateString('en-IN')||'—'}</td>
                          <td style={{fontWeight:700}}>{e._type==='bill'?e.billNumber:(e.mode?.toUpperCase()||'PAYMENT')}</td>
                          <td><span style={{fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:12,background:e._type==='bill'?'#EFF6FF':e._type==='creditnote'?'#FEF9EC':'#DCFCE7',
                              color:e._type==='bill'?'#1D4ED8':e._type==='creditnote'?'#92400E':'#166534'}}>
                            {e._type==='bill'?'Invoice':e._type==='creditnote'?'Credit Note':'Payment'}
                          </span></td>
                          <td style={{textAlign:'right',fontWeight:700,color:'var(--txt)'}}>
                            {e._type==='bill'?inr(e.grandTotal):'—'}
                          </td>
                          <td style={{textAlign:'right',fontWeight:700,color:'var(--green)'}}>
                            {e._type==='payment'
                              ?<span style={{color:e.amount>=0?'var(--green)':'var(--red)'}}>{inr(Math.abs(e.amount))}{e.amount<0?' (refund)':''}</span>
                              :e._type==='creditnote'
                                ?<span title={`CN: ${e.cnNumber||''}`}>{inr(e.creditAmount)}</span>
                                :'—'}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>}
            </div>
          )}

          {/* STOCK REPORT */}
          {data.type==='stock'&&(
            <div>
              <div className="pm-stats" style={{marginBottom:16}}>
                <div className="pm-stat"><div className="psl">Showing</div><div className="psv">{data.total}</div><div className="pss">products</div></div>
                <div className="pm-stat"><div className="psl">Zero Stock</div><div className="psv" style={{color:'var(--red)'}}>{data.zero}</div></div>
                <div className="pm-stat"><div className="psl">Low Stock</div><div className="psv" style={{color:'#92400E'}}>{data.low}</div></div>
              </div>
              <div className="pt-wrap">
                <table className="pt-table">
                  <thead><tr><th>Code</th><th>Product</th><th style={{textAlign:'center'}}>Stock</th><th>Unit</th><th>Location</th><th style={{textAlign:'right'}}>MRP</th></tr></thead>
                  <tbody>
                    {data.prods.length===0?<tr><td colSpan={6}><div className="no-results"><div className="nr-icon">📦</div><p>No products match filter.</p></div></td></tr>
                    :data.prods.map(p=>(
                      <tr key={p.id}>
                        <td><span className="pt-code">{p.fixedCode}</span></td>
                        <td><div style={{fontWeight:600,fontSize:12.5}}>{p.fullSkuName}</div></td>
                        <td style={{textAlign:'center'}}>
                          <span className={`stock-badge ${p.currentStock===0?'zero':p.currentStock<=10?'low':'good'}`}>{p.currentStock}</span>
                        </td>
                        <td style={{fontSize:12,color:'var(--txt3)'}}>{p.unit||'—'}</td>
                        <td style={{fontSize:12,color:'var(--txt3)'}}>{p.floorLocation||'—'}</td>
                        <td style={{textAlign:'right',fontWeight:600}}>{p.mrp?`₹${p.mrp}`:'—'}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {/* PAYMENT COLLECTION */}
          {data.type==='payments'&&(
            <div>
              <div className="pm-stats" style={{marginBottom:16}}>
                <div className="pm-stat"><div className="psl">Total Collected</div><div className="psv" style={{fontSize:20,color:'var(--green)'}}>{inr(data.total)}</div><div className="pss">{data.pays.length} transactions</div></div>
                {data.byMode.map(m=>(
                  <div key={m.mode} className="pm-stat">
                    <div className="psl">{m.mode.toUpperCase()}</div>
                    <div className="psv" style={{fontSize:20}}>{inr(m.total)}</div>
                    <div className="pss">{m.count} transactions</div>
                  </div>
                ))}
              </div>
              <div className="pt-wrap">
                <table className="pt-table">
                  <thead><tr><th>Date</th><th>Party</th><th>Mode</th><th style={{textAlign:'right'}}>Amount</th><th>Notes</th></tr></thead>
                  <tbody>
                    {data.pays.length===0?<tr><td colSpan={5}><div className="no-results"><div className="nr-icon">💰</div><p>No payments in this period.</p></div></td></tr>
                    :data.pays.map(p=>(
                      <tr key={p.id}>
                        <td style={{fontSize:12,color:'var(--txt3)'}}>{p.date||'—'}</td>
                        <td style={{fontWeight:600}}>{p.partyName||'—'}</td>
                        <td><span style={{fontSize:11,fontWeight:800,padding:'2px 8px',borderRadius:12,background:'#DCFCE7',color:'#166534'}}>{(p.mode||'').toUpperCase()}</span></td>
                        <td style={{textAlign:'right',fontWeight:800,color:'var(--green)'}}>{inr(p.amount)}</td>
                        <td style={{fontSize:12,color:'var(--txt3)'}}>{p.notes||'—'}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {/* PRODUCT PERFORMANCE */}
          {data.type==='products'&&(
            <div>
              <div className="pm-stats" style={{marginBottom:16}}>
                <div className="pm-stat"><div className="psl">Products Sold</div><div className="psv">{data.prods.length}</div></div>
                <div className="pm-stat"><div className="psl">Total Revenue</div><div className="psv" style={{fontSize:20}}>{inr(data.totalRevenue)}</div></div>
              </div>
              <div className="pt-wrap">
                <table className="pt-table">
                  <thead><tr><th>#</th><th>Product</th><th style={{textAlign:'center'}}>Qty Sold</th><th style={{textAlign:'center'}}>Transactions</th><th style={{textAlign:'right'}}>Revenue</th></tr></thead>
                  <tbody>
                    {data.prods.length===0?<tr><td colSpan={5}><div className="no-results"><div className="nr-icon">🏆</div><p>No sales data in this period.</p></div></td></tr>
                    :data.prods.map((p,i)=>(
                      <tr key={p.id}>
                        <td style={{fontWeight:800,color:i<3?'var(--orange)':'var(--txt3)',fontSize:13}}>{i+1}</td>
                        <td style={{fontWeight:600,fontSize:12.5}}>{p.name}</td>
                        <td style={{textAlign:'center',fontWeight:700}}>{p.qty}</td>
                        <td style={{textAlign:'center',color:'var(--txt3)',fontSize:12}}>{p.txns}</td>
                        <td style={{textAlign:'right',fontWeight:800}}>{inr(p.revenue)}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {/* OUTSTANDING */}
          {data.type==='outstanding'&&(
            <div>
              <div className="pm-stats" style={{marginBottom:16}}>
                <div className="pm-stat"><div className="psl">Total Outstanding</div><div className="psv" style={{fontSize:20,color:'var(--red)'}}>{inr(data.grandTotal)}</div></div>
                <div className="pm-stat"><div className="psl">Parties with Dues</div><div className="psv">{data.partiesOut.length}</div></div>
              </div>
              <div className="pt-wrap">
                <table className="pt-table">
                  <thead><tr><th>Party</th><th style={{textAlign:'center'}}>Unpaid Bills</th><th style={{textAlign:'right'}}>Amount Due</th></tr></thead>
                  <tbody>
                    {data.partiesOut.length===0?<tr><td colSpan={3}><div className="no-results"><div className="nr-icon">✓</div><p>No outstanding dues.</p></div></td></tr>
                    :data.partiesOut.map(p=>(
                      <tr key={p.id}>
                        <td style={{fontWeight:700,fontSize:13}}>{p.name}</td>
                        <td style={{textAlign:'center',fontWeight:600}}>{p.bills.length}</td>
                        <td style={{textAlign:'right',fontWeight:900,fontSize:14,color:'var(--red)'}}>{inr(p.total)}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </div>
      )}

      {!loading&&!data&&<div className="no-results" style={{marginTop:40}}><div className="nr-icon">📊</div><p>Select a report above to get started.</p></div>}
    </div>
  );
}

function CreditNotesScreen({role}){
  const isOwner=role==='owner'||role==='billing';
  const[tab,setTab]=useState('new');
  const[expandedCN,setExpandedCN]=useState(null); // CN id expanded to show items // new | history
  const[step,setStep]=useState(1); // 1=select bill, 2=select items, 3=settlement
  const[billSearch,setBillSearch]=useState('');
  const[allBills,setAllBills]=useState([]);
  const[billsLoading,setBillsLoading]=useState(true);
  const[selBill,setSelBill]=useState(null);
  const[returnItems,setReturnItems]=useState([]); // [{...item, returnQty}]
  const[settlementType,setSettlementType]=useState('credit'); // credit | refund
  const[refundMode,setRefundMode]=useState('cash');
  const[cnNotes,setCnNotes]=useState('');
  const[saving,setSaving]=useState(false);
  const[saved,setSaved]=useState(null);
  const[history,setHistory]=useState([]);
  const[histLoading,setHistLoading]=useState(false);
  const[viewCN,setViewCN]=useState(null);
  const[coInfo,setCoInfo]=useState(COMPANY);

  useEffect(()=>{
    db.collection('settings').doc('company').get().then(s=>{if(s.exists)setCoInfo(p=>({...p,...s.data()}));});
    // Load all bills upfront for instant search
    db.collection('bills').get()
      .then(s=>{
        const b=s.docs.map(d=>({...d.data(),id:d.id}))
          .filter(b=>b.status!=='superseded'&&b.status!=='deleted')
          .sort((a,b2)=>(b2.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
        setAllBills(b);
      })
      .catch(e=>console.error('Bills load:',e))
      .finally(()=>setBillsLoading(false));
  },[]);

  useEffect(()=>{if(tab==='history')loadHistory();},[tab]);

  const deleteCN=async(cn)=>{
    if(!window.confirm(`Delete ${cn.cnNumber}? This will:
• Restore the original bill balance
• Re-decrement returned stock
• Remove associated payment records

Cannot be undone.`))return;
    try{
      const batch=db.batch();
      // 1. Restore original bill balance
      const billSnap=await db.collection('bills').doc(cn.originalBillId).get();
      if(billSnap.exists){
        const bill=billSnap.data();
        const restoredBal=r2((bill.balanceDue||0)+(cn.creditAmount||0));
        const restoredStatus=restoredBal<=0?'paid':bill.amountPaid>0?'partial':'unpaid';
        batch.update(db.collection('bills').doc(cn.originalBillId),{
          balanceDue:restoredBal,
          paymentStatus:restoredStatus,
          hasCreditNote:false,
          creditNoteId:null,
          creditNoteNumber:null,
          updatedAt:new Date(),
        });
      }
      // 2. Re-decrement stock for returned items
      (cn.items||[]).filter(i=>i.productId&&i.qty).forEach(item=>{
        batch.update(db.collection('products').doc(item.productId),
          {currentStock:firebase.firestore.FieldValue.increment(-(parseFloat(item.qty)||0))});
      });
      // 3. Delete CN payment records (cash refund or credit adj)
      const paySnap=await db.collection('payments').where('cnId','==',cn.id).get();
      paySnap.docs.forEach(d=>batch.delete(d.ref));
      // 4. Delete the CN document
      batch.delete(db.collection('credit_notes').doc(cn.id));
      await batch.commit();
      setHistory(h=>h.filter(x=>x.id!==cn.id));
      window.__toast(`${cn.cnNumber} deleted — bill balance restored`,'success');
    }catch(e){window.__toast('Delete CN failed: '+e.message);}
  };

  const loadHistory=async()=>{
    setHistLoading(true);
    try{
      const[cnSnap,billSnap]=await Promise.all([
        db.collection('credit_notes').limit(200).get(),
        db.collection('bills').get()
      ]);
      // Build set of soft-deleted bill IDs
      const deletedBillIds=new Set(billSnap.docs
        .filter(d=>d.data().status==='deleted')
        .map(d=>d.id));
      // Build set of all existing bill IDs (to detect permanently deleted)
      const existingBillIds=new Set(billSnap.docs.map(d=>d.id));
      const data=cnSnap.docs.map(d=>({...d.data(),id:d.id}))
        .filter(cn=>{
          const bid=cn.originalBillId||cn.billId;
          if(!bid) return true; // keep if no bill reference
          if(deletedBillIds.has(bid)) return false; // hide if bill in bin
          return true; // show even if bill permanently deleted (orphaned CN still valid record)
        });
      data.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
      setHistory(data);
    }catch(e){console.error(e);}
    setHistLoading(false);
  };

  // Filtered bills — live as user types
  const filteredBills=billSearch.trim()
    ?allBills.filter(b=>multiSearch(billSearch,b,['billNumber','partyName','partyGstin'])).slice(0,20)
    :allBills.slice(0,10); // show 10 most recent by default

  const selectBill=async(b)=>{
    setSelBill(b);
    setStep(2);
    // Check prior CNs for this bill to calculate remaining returnable qty
    try{
      const priorCNs=await db.collection('credit_notes')
        .where('originalBillId','==',b.id).get();
      const alreadyReturned={};
      priorCNs.docs.forEach(d=>{
        (d.data().items||[]).forEach(item=>{
          if(item.productId)
            alreadyReturned[item.productId]=(alreadyReturned[item.productId]||0)+(parseFloat(item.qty)||0);
        });
      });
      setReturnItems((b.items||[]).filter(i=>i.productId).map(i=>{
        const alreadyDone=alreadyReturned[i.productId]||0;
        const remaining=Math.max(0,(parseFloat(i.qty)||0)-alreadyDone);
        return{...i,returnQty:0,maxQty:remaining,alreadyReturned:alreadyDone};
      }));
    }catch{
      // Fallback — use full qty
      setReturnItems((b.items||[]).filter(i=>i.productId).map(i=>({...i,returnQty:0,maxQty:parseFloat(i.qty)||0})));
    }
  };

  const setRQty=(idx,v)=>{
    const val=Math.min(Math.max(0,parseFloat(v)||0),returnItems[idx].maxQty);
    setReturnItems(ri=>ri.map((x,i)=>i===idx?{...x,returnQty:val}:x));
  };

  const hasReturns=returnItems.some(i=>i.returnQty>0);

  const creditAmount=r2(returnItems.reduce((s,item)=>{
    if(!item.returnQty)return s;
    const lc=calcLine(item,true,isInterState(selBill?.partyGstin)); // always tax-exclusive
    return s+r2(lc.lineTotal*(item.returnQty/item.maxQty));
  },0));

  const saveCN=async()=>{
    if(!hasReturns)return;
    setSaving(true);
    try{
      const cnNum=await generateInvNumber('credit_note');
      const returnedItems=returnItems.filter(i=>i.returnQty>0).map(item=>{
        const lc=calcLine(item,true,isInterState(selBill?.partyGstin)); // always tax-exclusive
        const ratio=item.returnQty/item.maxQty;
        return{...item,qty:item.returnQty,lineTotal:r2(lc.lineTotal*ratio),
          taxable:r2(lc.taxable*ratio),cgst:r2(lc.cgst*ratio),sgst:r2(lc.sgst*ratio),igst:r2(lc.igst*ratio)};
      });

      const cnData={
        cnNumber:cnNum,
        originalBillId:selBill.id,
        originalBillNumber:selBill.billNumber,
        partyId:selBill.partyId,
        partyName:selBill.partyName,
        partyGstin:selBill.partyGstin||'',
        partyAddress:selBill.partyAddress||'',
        date:new Date().toISOString().slice(0,10),
        items:returnedItems,
        creditAmount,
        settlementType,
        refundMode:settlementType==='refund'?refundMode:null,
        notes:cnNotes,
        status:'issued',
        createdAt:new Date(),
      };

      const ref=await db.collection('credit_notes').add(cnData);

      const batch=db.batch();

      // Return stock for each item
      returnedItems.forEach(item=>{
        if(item.productId){
          batch.update(db.collection('products').doc(item.productId),
            {currentStock:firebase.firestore.FieldValue.increment(item.returnQty)});
        }
      });

      // Update original bill — balance and status
      const newBillBal=r2(Math.max(0,(selBill.balanceDue||0)-creditAmount));
      const newBillStatus=newBillBal<=0?'paid':(selBill.amountPaid||0)>0?'partial':'unpaid';
      batch.update(db.collection('bills').doc(selBill.id),{
        hasCreditNote:true,
        creditNoteId:ref.id,
        creditNoteNumber:cnNum,
        balanceDue:newBillBal,
        paymentStatus:newBillStatus,
        updatedAt:new Date(),
      });
      // For credit adjustment: create payment record so party ledger shows it
      if(settlementType==='credit'){ // 'credit' = credit against outstanding
        const adjRef=db.collection('payments').doc();
        batch.set(adjRef,{
          billId:selBill.id,
          partyId:selBill.partyId,
          partyName:selBill.partyName,
          amount:r2(creditAmount), // full CN amount — ledger may go negative (credit balance)
          mode:'credit_adj',
          type:'credit_adj',
          notes:`Credit note ${cnNum} — adjustment`,
          date:new Date().toISOString().slice(0,10),
          createdAt:new Date(),
          cnId:ref.id,
          cnNumber:cnNum,
          deleted:false,
        });
      }

      if(settlementType==='credit'){
        // Reduce outstanding balance
        if(selBill.partyId&&selBill.partyId!=='CASH'){
          const curSnap=await db.collection('bills').where('partyId','==',selBill.partyId).where('paymentStatus','in',['unpaid','partial']).get();
          const totalDue=curSnap.docs.reduce((s,d)=>s+(d.data().balanceDue||0),0);
          const newBal=Math.max(0,r2(totalDue-creditAmount));
          batch.update(db.collection('parties').doc(selBill.partyId),{outstandingBalance:newBal});
        }
      } else {
        // Cash refund — record as negative payment
        await db.collection('payments').add({
          billId:selBill.id,
          cnId:ref.id,
          partyId:selBill.partyId,
          partyName:selBill.partyName,
          amount:-creditAmount, // negative = refund
          mode:refundMode,
          type:'refund',
          date:new Date().toISOString().slice(0,10),
          notes:`Refund for ${cnNum}`,
          createdAt:new Date(),
        });
      }

      await batch.commit();
      audit('CN_CREATED',{cnId:ref.id,cnNumber:cnNum,amount:creditAmount,type:settlementType});
      try{
        const webhook=await getWebhook();
        if(webhook)logToSheets(webhook,'CreditNotes',{
          Date:cnData.date,CNNumber:cnNum,
          OriginalBill:selBill.billNumber,Party:selBill.partyName,
          CreditAmount:creditAmount,Settlement:settlementType,
          RefundMode:settlementType==='refund'?refundMode:'',
          Notes:cnNotes||''
        });
      }catch{}
      setSaved({id:ref.id,...cnData});
    }catch(e){console.error(e);alert('Error: '+e.message);}
    setSaving(false);
  };

  const printCN=async(cn)=>{
    const inter=isInterState(cn.partyGstin);
    const date=new Date(cn.date+'T00:00:00').toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
    const rows=(cn.items||[]).map((item,i)=>`
      <tr>
        <td>${i+1}</td><td>${item.productName}</td><td>${item.hsnCode||'—'}</td>
        <td align="center">${item.returnQty||item.qty} ${item.unit||'Nos'}</td>
        <td align="right">${inr(item.unitPrice||0)}</td>
        <td align="right">${inr(item.lineTotal||0)}</td>
      </tr>`).join('');

    const prSnap=await db.collection('settings').doc('print').get();
    const pr=prSnap.exists?prSnap.data():{};
    const logoSz={small:30,medium:50,large:70,xlarge:90};
    const logoH=logoSz[pr.logoSize||'medium']||50;

    const html=`<!DOCTYPE html><html><head><title>${cn.cnNumber}</title>
    <style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif;font-size:11px;color:#000;padding:20px}

    .logo-img{display:block;background:#000;border-radius:4px;height:${logoH}mm;width:auto;max-width:110mm;object-fit:contain}
    .co-dtl{font-size:10px;color:#333;line-height:1.6;margin-top:6px}
    .bm{text-align:right}.bt{font-size:20px;font-weight:900;color:#DC2626}
    .bn{font-size:13px;font-weight:800;margin-top:4px;color:#DC2626}
    .orig{font-size:10px;color:#555;margin-top:3px}
    .pty{background:#FFF5F5;border:1px solid #FCA5A5;border-radius:6px;padding:10px 14px;margin-bottom:12px}
    .ptl{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.06em;color:#666;margin-bottom:4px}
    .ptn{font-size:13px;font-weight:800}
    .settle{background:#F0FDF4;border:1px solid #BBF7D0;border-radius:6px;padding:8px 14px;margin-bottom:12px;font-size:11px;font-weight:700;color:#166534}
    table{width:100%;border-collapse:collapse;margin-bottom:10px}
    th{background:#FEF2F2;border:1px solid #FCA5A5;padding:6px 8px;font-size:9.5px;font-weight:800;text-transform:uppercase}
    td{border:1px solid #FEE2E2;padding:6px 8px;font-size:10.5px;vertical-align:top}
    .total-row{float:right;width:240px;margin-bottom:12px}
    .total-row td{border:none;padding:3px 6px;font-size:11px}
    .total-row tr:last-child{border-top:2px solid #DC2626;font-size:14px;font-weight:900}
    .ft{clear:both;display:flex;justify-content:space-between;border-top:1px solid #CCC;padding-top:12px;margin-top:12px;font-size:10px}
    .sig-line{margin-top:36px;font-size:10px}
    @media print{@page{size:A4;margin:15mm}body{padding:0}}
    </style></head><body>
    <div class="hdr">
      <div><img src="${LOGO_PNG_B64}" class="logo-img" alt="Prakash Electricals"/>
      <div class="co-dtl">${coInfo.address}<br/>${coInfo.phone?'Phone: '+coInfo.phone:''}</div>
      <div style="font-size:10.5px;font-weight:700;margin-top:3px">GSTIN: ${coInfo.gstin} | State: ${coInfo.state} (${coInfo.stateCode})</div></div>
      <div class="bm">
        <div class="bt">CREDIT NOTE</div>
        <div class="bn">${cn.cnNumber}</div>
        <div class="orig">Against: ${cn.originalBillNumber}</div>
        <div style="font-size:10px;color:#555;margin-top:4px">Date: ${date}</div>
      </div>
    </div>
    <div class="pty"><div class="ptl">Bill To</div><div class="ptn">${cn.partyName}</div>
    ${cn.partyAddress?`<div style="font-size:10px;color:#555;margin-top:2px">${cn.partyAddress}</div>`:''}
    ${cn.partyGstin?`<div style="font-size:10.5px;font-weight:700;margin-top:3px">GSTIN: ${cn.partyGstin}</div>`:''}</div>
    <div class="settle">${cn.settlementType==='refund'?`💰 Cash Refund via ${cn.refundMode?.toUpperCase()} — ₹${cn.creditAmount} to be returned to customer`:`✓ Credit adjusted against outstanding balance`}</div>
    <table><thead><tr><th>#</th><th>Description</th><th>HSN</th><th>Qty Returned</th><th>Rate</th><th align="right">Credit Amount</th></tr></thead>
    <tbody>${rows}</tbody></table>
    <table class="total-row"><tbody>
      <tr style="font-size:14px;font-weight:900;color:#DC2626"><td>Total Credit Amount</td><td align="right">${inr(cn.creditAmount)}</td></tr>
    </tbody></table>
    ${cn.notes?`<div style="clear:both;background:#FFF5F5;border:1px solid #FCA5A5;border-radius:4px;padding:8px 12px;font-size:10.5px;margin-bottom:12px"><b>Notes:</b> ${cn.notes}</div>`:''}
    <div class="ft">
      <div><div style="font-size:9px;font-weight:800;text-transform:uppercase;color:#666;margin-bottom:4px">Terms</div>
      <div style="font-size:9px;color:#555">This is a valid credit note. ${cn.settlementType==='refund'?'Refund will be processed in the stated mode.':'Credit will be adjusted against future invoices.'}</div></div>
      <div style="text-align:right"><div style="font-size:9px;font-weight:800;text-transform:uppercase;color:#666">For ${coInfo.name}</div><div class="sig-line">Authorised Signatory</div></div>
    </div>
    <script>window.onload=()=>setTimeout(()=>window.print(),400);<\/script>
    </body></html>`;
    try{const blob=new Blob([html],{type:'text/html;charset=utf-8'});const url=URL.createObjectURL(blob);window.open(url,'_blank');setTimeout(()=>URL.revokeObjectURL(url),30000);}
    catch(e){alert('Print error: '+e.message);}
  };

  if(saved)return(
    <div>
      <div style={{background:'#FFF5F5',border:'1px solid #FCA5A5',borderRadius:12,padding:'18px 20px',marginBottom:20,display:'flex',alignItems:'center',gap:14}}>
        <span style={{fontSize:28}}>✓</span>
        <div style={{flex:1}}>
          <div style={{fontWeight:800,color:'#991B1B',fontSize:15}}>{saved.cnNumber} — Credit Note Issued</div>
          <div style={{fontSize:13,color:'#991B1B',marginTop:3}}>
            Credit Amount: <b>{inr(saved.creditAmount)}</b> · {saved.settlementType==='refund'?`Cash Refund via ${saved.refundMode?.toUpperCase()}`:'Adjusted against outstanding'}
          </div>
          <div style={{fontSize:12,color:'#991B1B',marginTop:2}}>Against: {saved.originalBillNumber} · Stock returned to inventory</div>
        </div>
        <button className="btn-cancel" onClick={()=>printCN(saved)}>🖨 Print CN</button>
        <button className="btn-confirm" style={{background:'#DC2626',boxShadow:'0 3px 10px rgba(220,38,38,.35)'}}
          onClick={()=>{setSaved(null);setStep(1);setSelBill(null);setReturnItems([]);setBillSearch('');setBills([]);}}>
          ＋ New CN
        </button>
      </div>
    </div>
  );

  return(
    <div>
      {/* Tab bar */}
      <div className="s-tabs" style={{marginBottom:20}}>

        <button className={`s-tab${tab==='history'?' active':''}`} onClick={()=>setTab('history')}>📋 CN History</button>
      </div>

      {tab==='history'&&(
        <div>
          {histLoading?<div style={{textAlign:'center',padding:32}}><div className="loader-ring" style={{margin:'0 auto'}}/></div>

          :<div className="pt-wrap">

              <tbody>
                {history.map(cn=>{return(
                  <React.Fragment key={cn.id}>
                  <tr>
                    <td><span className="pt-code" style={{color:'#DC2626',background:'#FFF5F5'}}>{cn.cnNumber}</span></td>
                    <td style={{fontSize:12,color:'var(--txt3)'}}>{cn.originalBillNumber}</td>
                    <td style={{fontWeight:600}}>{cn.partyName}</td>
                    <td style={{fontSize:12,color:'var(--txt3)'}}>{cn.date}</td>
                    <td style={{textAlign:'right',fontWeight:800,color:'#DC2626'}}>{inr(cn.creditAmount)}</td>
                    <td><span style={{fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:12,background:cn.settlementType==='refund'?'#DCFCE7':'#EFF6FF',color:cn.settlementType==='refund'?'#166534':'#1D4ED8'}}>

                        style={{padding:'4px 10px',background:'#FEF2F2',border:'1px solid #FCA5A5',borderRadius:7,fontSize:12,fontWeight:700,color:'#991B1B',cursor:'pointer'}}>
                        ✕ Del
                      </button>
                    </td>
                  </tr>
                  </React.Fragment>
                );})}
              </tbody>
            </table>
          </div>}
        </div>
      )}

      {tab==='new'&&(<div>
        {/* Step indicator */}
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:20}}>
          {[{n:1,l:'Select Bill'},{n:2,l:'Select Items'},{n:3,l:'Settlement'}].map((s,i)=>(
            <React.Fragment key={s.n}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <div style={{width:28,height:28,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:900,
                  background:step>s.n?'var(--green)':step===s.n?'var(--orange)':'var(--card-b)',

                  {step>s.n?'✓':s.n}
                </div>
                <span style={{fontSize:12.5,fontWeight:700,color:step>=s.n?'var(--txt)':'var(--txt3)'}}>{s.l}</span>

            </React.Fragment>
          ))}
        </div>

        {/* Step 1: Select Bill */}
        {step===1&&(
          <div>
            <div style={{background:'var(--white)',border:'1px solid var(--card-b)',borderRadius:14,padding:'18px 20px',boxShadow:'var(--shadow)'}}>
              <h3 style={{fontWeight:800,fontSize:14,marginBottom:14,color:'var(--txt)'}}>Search Original Bill</h3>
              <input className="tb-search" value={billSearch} onChange={e=>setBillSearch(e.target.value)}
                placeholder="Type bill number or party name to search…" style={{width:'100%',marginBottom:14}}/>
              {billsLoading&&<div style={{textAlign:'center',padding:16}}><div className="loader-ring" style={{margin:'0 auto'}}/></div>}
              {!billsLoading&&(
                <div className="pt-wrap">
                  <table className="pt-table">
                    <thead><tr><th>Bill #</th><th>Party</th><th>Date</th><th style={{textAlign:'right'}}>Total</th><th>Status</th><th style={{textAlign:'center'}}>Select</th></tr></thead>
                    <tbody>
                      {filteredBills.map(b=>(
                        <tr key={b.id}>
                          <td><span className="pt-code">{b.billNumber}</span></td>
                          <td style={{fontWeight:600}}>{b.partyName}</td>

                          <td style={{textAlign:'right',fontWeight:700}}>{inr(b.grandTotal)}</td>
                          <td><span className={`bill-status ${b.paymentStatus||'unpaid'}`}>{b.paymentStatus||'unpaid'}</span></td>
                          <td style={{textAlign:'center'}}><button className="btn-confirm" style={{padding:'5px 14px',fontSize:12}} onClick={()=>selectBill(b)}>Select</button></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
              {!billsLoading&&filteredBills.length===0&&<div className="no-results" style={{padding:24}}><div className="nr-icon">🧾</div><p>{billSearch.trim()?'No bills match. Try a different search.':'No bills found.'}</p></div>}
            </div>
          </div>
        )}

        {/* Step 2: Select Items */}
        {step===2&&selBill&&(
          <div>
            <div style={{background:'#FFF5F5',border:'1px solid #FCA5A5',borderRadius:12,padding:'12px 16px',marginBottom:14,fontSize:13,fontWeight:600,color:'#991B1B',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span>Returning from: <b>{selBill.billNumber}</b> · {selBill.partyName} · {inr(selBill.grandTotal)}</span>
              <button className="btn-cancel" style={{fontSize:12}} onClick={()=>{setStep(1);setSelBill(null);}}>← Back</button>
            </div>
            <div className="pt-wrap" style={{marginBottom:14}}>
              <table className="pt-table">
                <thead><tr><th>Product</th><th style={{textAlign:'center'}}>Billed Qty</th><th style={{textAlign:'center',width:140}}>Return Qty</th><th style={{textAlign:'right'}}>Unit Price</th><th style={{textAlign:'right'}}>Credit Value</th></tr></thead>
                <tbody>
                  {returnItems.map((item,idx)=>{
                    const lc=calcLine(item,selBill.type==='tax_invoice',isInterState(selBill.partyGstin));
                    const ratio=item.returnQty/item.maxQty;
                    const credit=r2(lc.lineTotal*ratio);
                    return(
                      <tr key={idx}>
                        <td><div style={{fontWeight:600,fontSize:12.5}}>{item.productName}</div><div style={{fontSize:11,color:'var(--txt3)'}}>{item.unit}</div></td>
                        <td style={{textAlign:'center',fontWeight:700}}>{item.maxQty}</td>
                        <td style={{textAlign:'center'}}>
                          <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
                            <button onClick={()=>setRQty(idx,item.returnQty-1)} style={{width:26,height:26,border:'1.5px solid var(--card-b)',borderRadius:6,background:'var(--bg)',fontWeight:800,fontSize:14,cursor:'pointer'}}>−</button>
                            <input type="number" min="0" max={item.maxQty} value={item.returnQty}
                              onChange={e=>setRQty(idx,e.target.value)}
                              style={{width:48,padding:'4px',border:'1.5px solid var(--card-b)',borderRadius:7,textAlign:'center',fontWeight:800,fontSize:13,fontFamily:'inherit'}}/>
                            <button onClick={()=>setRQty(idx,item.returnQty+1)} style={{width:26,height:26,border:'1.5px solid var(--card-b)',borderRadius:6,background:'var(--bg)',fontWeight:800,fontSize:14,cursor:'pointer'}}>+</button>
                            <button onClick={()=>setRQty(idx,item.maxQty)} style={{fontSize:10,color:'var(--orange)',background:'none',border:'none',cursor:'pointer',fontWeight:700}}>All</button>
                          </div>
                        </td>
                        <td style={{textAlign:'right',fontWeight:600}}>{inr(item.unitPrice||0)}</td>
                        <td style={{textAlign:'right',fontWeight:800,color:credit>0?'#DC2626':'var(--txt3)'}}>{credit>0?inr(credit):'—'}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 16px',borderTop:'1px solid var(--card-b)',background:'var(--bg)'}}>
                <span style={{fontSize:13,fontWeight:600,color:'var(--txt3)'}}>Total Credit Amount</span>
                <span style={{fontSize:18,fontWeight:900,color:'#DC2626'}}>{inr(creditAmount)}</span>
              </div>
            </div>
            <div style={{display:'flex',justifyContent:'flex-end'}}>
              <button className="btn-confirm" style={{background:'#DC2626',boxShadow:'0 3px 10px rgba(220,38,38,.3)'}}
                disabled={!hasReturns} onClick={()=>setStep(3)}>
                Next → Settlement
              </button>
            </div>
          </div>
        )}

        {/* Step 3: Settlement */}
        {step===3&&(
          <div>
            <div style={{background:'#FFF5F5',border:'1px solid #FCA5A5',borderRadius:12,padding:'12px 16px',marginBottom:16,fontSize:13,fontWeight:600,color:'#991B1B',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span>Credit Amount: <b style={{fontSize:18}}>{inr(creditAmount)}</b></span>
              <button className="btn-cancel" style={{fontSize:12}} onClick={()=>setStep(2)}>← Back</button>
            </div>
            <div style={{background:'var(--white)',border:'1px solid var(--card-b)',borderRadius:14,padding:'20px',boxShadow:'var(--shadow)',marginBottom:16}}>
              <h3 style={{fontWeight:800,fontSize:14,marginBottom:16,color:'var(--txt)'}}>How is this settled?</h3>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:16}}>
                <div onClick={()=>setSettlementType('credit')}
                  style={{padding:'16px',border:`2px solid ${settlementType==='credit'?'#1D4ED8':'var(--card-b)'}`,borderRadius:12,cursor:'pointer',background:settlementType==='credit'?'#EFF6FF':'var(--white)',transition:'all .15s'}}>
                  <div style={{fontWeight:800,fontSize:13,color:settlementType==='credit'?'#1D4ED8':'var(--txt)',marginBottom:4}}>📋 Credit Against Outstanding</div>
                  <div style={{fontSize:12,color:'var(--txt3)',lineHeight:1.5}}>Customer purchased on credit. Reduce what they owe by {inr(creditAmount)}.</div>
                </div>
                <div onClick={()=>setSettlementType('refund')}
                  style={{padding:'16px',border:`2px solid ${settlementType==='refund'?'#166534':'var(--card-b)'}`,borderRadius:12,cursor:'pointer',background:settlementType==='refund'?'#F0FDF4':'var(--white)',transition:'all .15s'}}>
                  <div style={{fontWeight:800,fontSize:13,color:settlementType==='refund'?'#166534':'var(--txt)',marginBottom:4}}>💰 Cash Refund</div>
                  <div style={{fontSize:12,color:'var(--txt3)',lineHeight:1.5}}>Customer paid upfront. Hand back {inr(creditAmount)} in cash/UPI/bank.</div>
                </div>
              </div>
              {settlementType==='refund'&&(
                <div style={{marginBottom:16}}>
                  <label className="f-label" style={{marginBottom:8,display:'block'}}>Refund Mode</label>
                  <div style={{display:'flex',gap:8}}>
                    {['cash','upi','bank','cheque'].map(m=>(
                      <button key={m} onClick={()=>setRefundMode(m)}
                        style={{padding:'8px 16px',border:`1.5px solid ${refundMode===m?'var(--green)':'var(--card-b)'}`,borderRadius:9,fontSize:12.5,fontWeight:700,
                          background:refundMode===m?'#DCFCE7':'var(--white)',color:refundMode===m?'#166534':'var(--txt2)',cursor:'pointer',transition:'all .15s'}}>
                        {m.toUpperCase()}
                      </button>
                    ))}
                  </div>
                </div>
              )}
              <div className="f-group">
                <label className="f-label">Notes (optional)</label>
                <input className="f-input" value={cnNotes} onChange={e=>setCnNotes(e.target.value)} placeholder="Reason for return…"/>
              </div>
            </div>
            <div style={{display:'flex',justifyContent:'flex-end',gap:12}}>
              <button className="btn-cancel" onClick={()=>setStep(2)}>← Back</button>
              <button className="btn-confirm" style={{background:'#DC2626',boxShadow:'0 3px 10px rgba(220,38,38,.3)'}} onClick={saveCN} disabled={saving}>
                {saving?'Issuing…':'↩ Issue Credit Note'}
              </button>
            </div>
          </div>
        )}
      </div>)}
    </div>
  );
}

function BarcodesScreen(){
  const[products,setProducts]=useState([]);
  const[loading,setLoading]=useState(true);
  const[search,setSearch]=useState('');
  const[queue,setQueue]=useState([]); // [{product, qty, cost}]
  const[stickerW,setStickerW]=useState(52.5);
  const[stickerH,setStickerH]=useState(29.7);
  const[history,setHistory]=useState([]);
  const[showHistory,setShowHistory]=useState(false);
  const[histLoading,setHistLoading]=useState(false);
  const barcodeRefs=useRef({});

  // A4 = 210×297mm, 5mm margins each side
  const A4_W=200, A4_H=287;
  const cols=Math.max(1,Math.floor(A4_W/stickerW));
  const rows=Math.max(1,Math.floor(A4_H/stickerH));
  const perSheet=cols*rows;
  const totalLabels=queue.reduce((s,i)=>s+i.qty,0);
  const sheets=Math.ceil(totalLabels/perSheet)||0;

  useEffect(()=>{getProds().then(ps=>{setProducts(ps);setLoading(false);}).catch(e=>{console.error('Products load:',e);setLoading(false);});},[]);

  const loadHistory=async()=>{
    setHistLoading(true);
    try{
      const doc=await db.collection('settings').doc('barcode_history').get();
      if(doc.exists&&doc.data().entries){
        setHistory(doc.data().entries);
      } else {
        setHistory([]);
      }
    }catch(e){console.error('Barcode history load error:',e);setHistory([]);}
    setHistLoading(false);
  };
  useEffect(()=>{loadHistory();},[]);

  const matches=search.trim()?products.filter(p=>multiSearch(search,p,PSRCH)).slice(0,10):[];

  const addQ=p=>{
    if(queue.find(q=>q.product.id===p.id)){
      setQueue(qq=>qq.map(q=>q.product.id===p.id?{...q,qty:q.qty+1}:q));
    } else {
      setQueue(qq=>[...qq,{product:p,qty:1,cost:''}]);
    }
    setSearch('');
  };
  const removeQ=id=>setQueue(qq=>qq.filter(q=>q.product.id!==id));
  const setQty=(id,v)=>setQueue(qq=>qq.map(q=>q.product.id===id?{...q,qty:Math.max(1,parseInt(v)||1)}:q));
  const setCost=(id,v)=>setQueue(qq=>qq.map(q=>q.product.id===id?{...q,cost:v}:q));

  const buildSerial=item=>{
    const cost=parseFloat(item.cost||0);
    if(!cost)return item.product.fixedCode;
    const d=new Date();
    return `${item.product.fixedCode}-${String(d.getMonth()+1).padStart(2,'0')}${cost*2}${String(d.getFullYear()).slice(-2)}`;
  };

  // Regenerate barcodes when queue or cost changes
  useEffect(()=>{
    queue.forEach(item=>{
      const serial=buildSerial(item);
      const el=barcodeRefs.current[item.product.id];
      if(el&&serial&&typeof JsBarcode!=='undefined'){
        try{JsBarcode(el,serial,{format:'CODE128',width:1.5,height:35,displayValue:false,margin:4});}catch{}
      }
    });
  },[queue]);

  const printLabels=async()=>{
    if(!queue.length)return;
    const labelData=queue.flatMap(item=>{
      const serial=buildSerial(item);
      const el=barcodeRefs.current[item.product.id];
      const svgStr=el?new XMLSerializer().serializeToString(el):'';
      // truncate name to fit label
      const name=item.product.fullSkuName.length>45?item.product.fullSkuName.slice(0,42)+'…':item.product.fullSkuName;
      return Array(item.qty).fill({name,serial,svgStr});
    });

    const labelHTML=labelData.map(l=>`
      <div class="lbl">
        <div class="ln">${l.name}</div>
        <div class="ls">${l.serial}</div>
        ${l.svgStr?`<div class="lb">${l.svgStr}</div>`:''}
      </div>`).join('');

    const html=`<!DOCTYPE html><html><head><title>Barcode Labels</title>
    <style>
      *{box-sizing:border-box;margin:0;padding:0}
      body{font-family:Arial,sans-serif;background:white}
      @page{size:A4 portrait;margin:5mm}
      .sheet{display:grid;grid-template-columns:repeat(${cols},${stickerW}mm);width:${cols*stickerW}mm}
      .lbl{width:${stickerW}mm;height:${stickerH}mm;overflow:hidden;border:0.3pt solid #CCC;padding:1mm;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.5mm;page-break-inside:avoid}
      .ln{font-size:6pt;font-weight:700;text-align:center;line-height:1.2;max-height:${stickerH*0.25}mm;overflow:hidden}
      .ls{font-family:'Courier New',monospace;font-size:5.5pt;color:#444}
      .lb{display:flex;align-items:center;justify-content:center;flex:1;max-width:100%;overflow:hidden}
      .lb svg{max-width:100%;max-height:${stickerH*0.55}mm}
    </style></head><body>
    <div class="sheet">${labelHTML}</div>
    <script>window.onload=()=>setTimeout(()=>window.print(),500);<\/script>
    </body></html>`;

    // Save history into settings doc (covered by existing Firestore rules)
    try{
      const newEntry={
        printedAt:new Date().toISOString(),
        items:queue.map(item=>({productId:item.product.id,productName:item.product.fullSkuName,serial:buildSerial(item),qty:item.qty})),
        totalLabels,stickerW,stickerH,perSheet
      };
      const histDoc=await db.collection('settings').doc('barcode_history').get();
      const existing=histDoc.exists?(histDoc.data().entries||[]):[];
      const updated=[newEntry,...existing].slice(0,30); // keep last 30
      await db.collection('settings').doc('barcode_history').set({entries:updated},{merge:true});
    }catch(e){console.error('History save error:',e);}

    try{
      const blob=new Blob([html],{type:'text/html;charset=utf-8'});
      const url=URL.createObjectURL(blob);
      const w=window.open(url,'_blank');
      if(!w)window.__toast('Allow popups to print labels. Check browser settings.','warn');
      setTimeout(()=>URL.revokeObjectURL(url),30000);
    }catch(e){window.__toast('Print error: '+e.message);}
    loadHistory();
  };

  if(loading)return<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'60vh',flexDirection:'column',gap:16}}><div className="loader-ring"/></div>;

  return(<div>
    {/* Sticker Size Controls */}
    <div style={{background:'var(--white)',border:'1px solid var(--card-b)',borderRadius:12,padding:'14px 18px',marginBottom:16,boxShadow:'var(--shadow)'}}>
      <div style={{display:'flex',alignItems:'center',gap:16,flexWrap:'wrap'}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:12,fontWeight:800,color:'var(--txt3)',textTransform:'uppercase',letterSpacing:'.06em'}}>Sticker Size</span>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <input type="number" className="f-input" style={{width:70,padding:'6px 8px',fontSize:13,textAlign:'center'}} value={stickerW} onChange={e=>setStickerW(parseFloat(e.target.value)||52.5)} step="0.5"/>
            <span style={{fontSize:12,color:'var(--txt3)',fontWeight:600}}>×</span>
            <input type="number" className="f-input" style={{width:70,padding:'6px 8px',fontSize:13,textAlign:'center'}} value={stickerH} onChange={e=>setStickerH(parseFloat(e.target.value)||29.7)} step="0.5"/>
            <span style={{fontSize:12,color:'var(--txt3)',fontWeight:600}}>mm</span>
          </div>
          <button className="tb-refresh" onClick={()=>{setStickerW(52.5);setStickerH(29.7);}}>Reset</button>
        </div>
        <div style={{display:'flex',gap:12,fontSize:12,fontWeight:700,color:'var(--txt2)'}}>
          <span style={{background:'var(--bg)',padding:'4px 10px',borderRadius:7,border:'1px solid var(--card-b)'}}>Layout: {cols} × {Math.floor(A4_H/stickerH)} = <b>{perSheet} labels/sheet</b></span>
          {totalLabels>0&&<span style={{background:'#FFF7ED',padding:'4px 10px',borderRadius:7,border:'1px solid #FED7AA',color:'#92400E'}}>Queue: {totalLabels} labels · {sheets} sheet{sheets!==1?'s':''}</span>}
        </div>
        <button className="tb-refresh" style={{marginLeft:'auto'}} onClick={()=>setShowHistory(h=>!h)}>
          {showHistory?'Hide History':'📋 Print History'}
        </button>
      </div>
    </div>

    {/* Print History */}
    {showHistory&&(<div style={{background:'var(--white)',border:'1px solid var(--card-b)',borderRadius:12,padding:'14px 18px',marginBottom:16,boxShadow:'var(--shadow)'}}>
      <h4 style={{fontWeight:800,fontSize:13,marginBottom:12,color:'var(--txt)'}}>Print History</h4>
      {histLoading?<div style={{textAlign:'center',padding:16}}><div className="loader-ring" style={{margin:'0 auto'}}/></div>
      :history.length===0?<p style={{color:'var(--txt3)',fontSize:13,fontWeight:600}}>No print history yet.</p>
      :<div style={{maxHeight:300,overflowY:'auto'}}>
        {history.map(h=>(
          <div key={h.id} style={{padding:'10px 0',borderBottom:'1px solid var(--card-b)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div>
                <div style={{fontWeight:700,fontSize:13}}>{h.totalLabels} labels · {h.items?.length} product{h.items?.length!==1?'s':''}</div>
                <div style={{fontSize:11,color:'var(--txt3)',marginTop:2}}>{h.stickerW}×{h.stickerH}mm · {h.perSheet} per sheet</div>
              </div>
              <div style={{fontSize:11,color:'var(--txt3)',textAlign:'right'}}>
                {h.printedAt?new Date(h.printedAt).toLocaleString('en-IN',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit',hour12:true}):'—'}
              </div>
            </div>
            <div style={{marginTop:6,display:'flex',flexWrap:'wrap',gap:4}}>
              {(h.items||[]).map((item,i)=>(
                <span key={i} style={{fontSize:10,background:'var(--bg)',padding:'2px 8px',borderRadius:5,border:'1px solid var(--card-b)',fontWeight:600}}>
                  {item.serial} × {item.qty}
                </span>
              ))}
            </div>
          </div>
        ))}
      </div>}
    </div>)}

    {/* Search */}
    <div style={{marginBottom:16,position:'relative'}}>
      <label className="f-label" style={{display:'block',marginBottom:8}}>Search and add products to queue</label>
      <input className="tb-search" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Type product name, brand, or code…" style={{width:'100%'}}/>
      {matches.length>0&&(<div className="prod-dropdown" style={{position:'absolute',top:'100%',left:0,right:0}}>
        {matches.map(p=><div key={p.id} className="prod-option" onClick={()=>addQ(p)}>
          <div style={{fontWeight:700,fontSize:12}}>{p.fullSkuName}</div>
          <div style={{fontSize:11,color:'var(--txt3)'}}>{p.fixedCode} · Stock:{p.currentStock||0}</div>
        </div>)}
      </div>)}
    </div>

    {/* Queue */}
    {queue.length>0&&(<div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <h3 style={{fontWeight:800,fontSize:14,color:'var(--txt)'}}>Label Queue ({queue.length} product{queue.length!==1?'s':''})</h3>
        <div style={{display:'flex',gap:10}}>
          <button className="btn-cancel" onClick={()=>setQueue([])}>Clear All</button>
          <button className="btn-confirm" onClick={printLabels}>🖨 Print {totalLabels} Labels ({sheets} sheet{sheets!==1?'s':''})</button>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:14}}>
        {queue.map(item=>(<div key={item.product.id} className="barcode-label" style={{padding:14,gap:10}}>
          <div className="bl-name" style={{fontSize:12}}>{item.product.fullSkuName}</div>

          {/* Quantity + Cost row */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,width:'100%'}}>
            <div>
              <div style={{fontSize:10,fontWeight:800,color:'var(--txt3)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:4}}>Quantity</div>
              <div style={{display:'flex',alignItems:'center',gap:4}}>
                <button onClick={()=>setQty(item.product.id,item.qty-1)} style={{width:28,height:28,border:'1.5px solid var(--card-b)',borderRadius:6,background:'var(--bg)',fontWeight:800,fontSize:14,cursor:'pointer'}}>−</button>
                <input type="number" min="1" value={item.qty} onChange={e=>setQty(item.product.id,e.target.value)} className="f-input" style={{width:50,padding:'4px 6px',fontSize:14,textAlign:'center',fontWeight:800}}/>
                <button onClick={()=>setQty(item.product.id,item.qty+1)} style={{width:28,height:28,border:'1.5px solid var(--card-b)',borderRadius:6,background:'var(--bg)',fontWeight:800,fontSize:14,cursor:'pointer'}}>+</button>
              </div>
            </div>
            <div>
              <div style={{fontSize:10,fontWeight:800,color:'var(--txt3)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:4}}>Cost Price ₹</div>
              <input type="number" placeholder="0.00" style={{width:'100%',padding:'6px 8px',border:'1.5px solid var(--card-b)',borderRadius:7,fontSize:13,fontFamily:'inherit',fontWeight:700,color:'var(--txt)',background:'var(--white)',outline:'none'}} value={item.cost||''} onChange={e=>setCost(item.product.id,e.target.value)}/>
            </div>
          </div>

          {/* Serial preview */}
          <div style={{width:'100%',background:'var(--bg)',borderRadius:7,padding:'6px 10px',textAlign:'center'}}>
            <div style={{fontSize:9,fontWeight:700,color:'var(--txt3)',marginBottom:2}}>SERIAL CODE</div>
            <div className="bl-serial" style={{fontSize:11,color:'var(--txt)',fontWeight:800}}>{buildSerial(item)}</div>
          </div>

          {/* Barcode preview */}
          <svg ref={el=>barcodeRefs.current[item.product.id]=el} style={{maxWidth:'100%'}}/>

          <button style={{fontSize:11,color:'var(--red)',background:'none',border:'none',cursor:'pointer',fontWeight:700}} onClick={()=>removeQ(item.product.id)}>✕ Remove from queue</button>
        </div>))}
      </div>
    </div>)}

    {queue.length===0&&(<div className="no-results">
      <div className="nr-icon">▤</div>
      <p>Search and add products above to generate barcode labels.</p>
      <p style={{fontSize:12,marginTop:8,color:'var(--txt3)'}}>Default sticker size: 52.5 × 29.7mm · 27 labels per A4 sheet. Adjust dimensions above if your sticker sheet is different.</p>
    </div>)}
</div>);
}

/* USERS */
function UsersScreen({myUid}){
  const[users,setUsers]=useState([]);
  const[busy,setBusy]=useState(true);
  const[showAdd,setShowAdd]=useState(false);
  const[form,setForm]=useState({name:'',email:'',pass:'',role:'billing'});
  const[addErr,setAddErr]=useState('');
  const[addOk,setAddOk]=useState('');
  const[saving,setSaving]=useState(false);
  const[upd,setUpd]=useState(null);
  useEffect(()=>{const unsub=db.collection('users').orderBy('createdAt','desc').onSnapshot(s=>{setUsers(s.docs.map(d=>({...d.data(),id:d.id})));setBusy(false);});return()=>unsub();},[]);
  const changeRole=async(uid,role)=>{setUpd(uid);await db.collection('users').doc(uid).update({role});audit('ROLE_CHANGED',{target:uid,newRole:role});setUpd(null);};
  const toggleActive=async(uid,cur)=>{await db.collection('users').doc(uid).update({isActive:!cur});audit(cur?'DEACTIVATED':'REACTIVATED',{target:uid});};
  const createUser=async()=>{
    setAddErr('');setSaving(true);
    try{
